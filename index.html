'use strict';
/* =====================================================================
   RUSH HOUR — a game about prioritization under pressure.
   Single-file HTML5 game. Canvas rendering, procedural WebAudio,
   hidden panic system, dynamic difficulty director.
   Modules (in order): Utils, Audio, Save/Meta, Particles, Art,
   Entities, Input/Drag, Director, Update, Render, Screens, Boot.
   ===================================================================== */

/* ============================ UTILS ============================ */
const TAU = Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndi=(a,b)=>Math.floor(rnd(a,b+1));
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const dist=(x1,y1,x2,y2)=>Math.hypot(x2-x1,y2-y1);
const eo=t=>1-Math.pow(1-t,3);                 // ease out cubic
const eb=t=>{const c=1.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}; // back
const fmt$=n=>'$'+Math.round(n);
function fmtClock(t){ // game-day clock: 1 real sec = 3 game minutes, opens 08:00
  const mins=8*60+Math.floor(t*3);
  const h=Math.floor(mins/60)%24, m=mins%60;
  return (h<10?'0':'')+h+':' + (m<10?'0':'')+m;
}
function fmtTime(t){const m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s}

/* Canvas setup — logical portrait 480×854, letterboxed */
const W=480,H=854;
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let viewScale=1,viewOX=0,viewOY=0;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const ww=window.innerWidth, wh=window.innerHeight;
  viewScale=Math.min(ww/W, wh/H);
  cv.width=Math.floor(W*viewScale*dpr); cv.height=Math.floor(H*viewScale*dpr);
  cv.style.width=Math.floor(W*viewScale)+'px'; cv.style.height=Math.floor(H*viewScale)+'px';
  viewOX=(ww-W*viewScale)/2;
  cv.style.marginLeft=viewOX+'px'; cv.style.marginTop=Math.max(0,(wh-H*viewScale)/2)+'px';
  cx.setTransform(viewScale*dpr,0,0,viewScale*dpr,0,0);
}
window.addEventListener('resize',resize); resize();

function rr(x,y,w,h,r){ // rounded rect path
  r=Math.min(r,w/2,h/2);
  cx.beginPath();
  cx.moveTo(x+r,y);
  cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r);
  cx.closePath();
}
function txt(s,x,y,size,color,align='center',weight=800,alpha=1){
  cx.save(); cx.globalAlpha=alpha;
  cx.font=weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif';
  cx.textAlign=align; cx.textBaseline='middle';
  cx.fillStyle=color; cx.fillText(s,x,y); cx.restore();
}
function txtFit(s,x,y,size,color,maxW,align='center',weight=800){
  cx.font=weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif';
  while(size>7&&cx.measureText(s).width>maxW){
    size-=0.5;
    cx.font=weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif';
  }
  txt(s,x,y,size,color,align,weight);
}
function txtO(s,x,y,size,color,outline,align='center',weight=900){ // outlined text
  cx.save();
  cx.font=weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif';
  cx.textAlign=align; cx.textBaseline='middle';
  cx.lineJoin='round'; cx.lineWidth=size*0.18; cx.strokeStyle=outline;
  cx.strokeText(s,x,y); cx.fillStyle=color; cx.fillText(s,x,y);
  cx.restore();
}

/* ============================ AUDIO ============================ */
/* All sound is synthesized — zero assets. Music intensity follows panic. */
const A={
  ctx:null, master:null, musGain:null, on:true,
  step:0, nextT:0,
  init(){
    if(this.ctx) { if(this.ctx.state==='suspended') this.ctx.resume(); return; }
    try{
      this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain(); this.master.gain.value=0.5; this.master.connect(this.ctx.destination);
      this.musGain=this.ctx.createGain(); this.musGain.gain.value=0.32; this.musGain.connect(this.master);
      this.sfxG=this.ctx.createGain(); this.sfxG.connect(this.master);
      this.ambG=this.ctx.createGain(); this.ambG.connect(this.master);
      this.applyVol();
      this.nextT=this.ctx.currentTime+0.1;
    }catch(e){}
  },
  _noise(){ // cached noise buffer
    if(this._nb) return this._nb;
    const b=this.ctx.createBuffer(1,this.ctx.sampleRate*0.5,this.ctx.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    return this._nb=b;
  },
  tone(f,dur,type='sine',vol=0.2,slide=0,delay=0,gainNode){
    if(!this.ctx||!this.on)return;
    if(!gainNode) f*=0.965+Math.random()*0.07; // humanize sfx, keep music in tune
    const t=this.ctx.currentTime+delay;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f,t);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide),t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(gainNode||this.sfxG||this.master);
    o.start(t);o.stop(t+dur+0.02);
  },
  applyVol(){
    if(!this.ctx)return;
    const st=(typeof SETT==='function')?SETT():{volM:1,volMu:1,volS:1,volA:1};
    this.master.gain.value=0.9*st.volM;
    this.musGain.gain.value=0.32*st.volMu;
    if(this.sfxG)this.sfxG.gain.value=st.volS;
    if(this.ambG)this.ambG.gain.value=st.volA;
  },
  hiss(dur,vol=0.2,hp=800,delay=0,gainNode){
    if(!this.ctx||!this.on)return;
    const t=this.ctx.currentTime+delay;
    const s=this.ctx.createBufferSource();s.buffer=this._noise();s.loop=true;
    const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    s.connect(f);f.connect(g);g.connect(gainNode||this.sfxG||this.master);
    s.start(t);s.stop(t+dur+0.02);
  },
  sfx(n){
    if(!this.ctx||!this.on)return;
    switch(n){
      case 'click': this.tone(600,0.06,'square',0.10); break;
      case 'pop':   this.tone(320,0.08,'sine',0.22,260); break;
      case 'pick':  this.tone(480,0.06,'sine',0.15,120); break;
      case 'ding':  this.tone(880,0.25,'sine',0.20); this.tone(1320,0.3,'sine',0.10,0,0.05); break;
      case 'coin':  this.tone(988,0.09,'square',0.12); this.tone(1319,0.22,'square',0.12,0,0.08); break;
      case 'buzz':  this.tone(160,0.22,'sawtooth',0.16,-70); break;
      case 'sizzle':this.hiss(0.5,0.08,2500); break;
      case 'pour': this.hiss(0.35,0.05,4200); this.tone(1200,0.06,'sine',0.05,60,0.08); break;
      case 'fix':   [440,554,659,880].forEach((f,i)=>this.tone(f,0.1,'square',0.10,0,i*0.06)); break;
      case 'splash':this.hiss(0.25,0.16,600); this.tone(220,0.15,'sine',0.12,-120); break;
      case 'foam':  this.hiss(0.6,0.22,1200); break;
      case 'fire':  this.hiss(0.8,0.12,300); this.tone(90,0.5,'sawtooth',0.08,40); break;
      case 'squeak':this.tone(1400,0.08,'sine',0.14,500); this.tone(1800,0.08,'sine',0.12,600,0.09); break;
      case 'thud':  this.tone(120,0.12,'sine',0.25,-60); break;
      case 'bell':  this.tone(1175,0.3,'triangle',0.16); this.tone(1568,0.4,'triangle',0.10,0,0.02); break;
      case 'slip':  this.tone(900,0.28,'sine',0.14,-620); break;
      case 'angry': this.tone(220,0.16,'sawtooth',0.16,-80); this.tone(180,0.22,'sawtooth',0.14,-90,0.12); break;
      case 'heart': this.tone(300,0.3,'sawtooth',0.2,-160); this.hiss(0.2,0.1,400); break;
      case 'combo': this.tone(700,0.1,'square',0.12,300); this.tone(1050,0.16,'square',0.12,300,0.07); break;
      case 'crash': this.hiss(0.4,0.25,150); this.tone(80,0.3,'sawtooth',0.2,-30); break;
      case 'over':  [523,392,330,262].forEach((f,i)=>this.tone(f,0.32,'triangle',0.16,0,i*0.22)); break;
      case 'achieve':[659,784,1046,1318].forEach((f,i)=>this.tone(f,0.18,'triangle',0.14,0,i*0.09)); break;
      case 'photo': this.tone(2000,0.05,'square',0.1); this.hiss(0.06,0.12,3000,0.03); break;
      case 'whistle': this.tone(2093,0.12,'sine',0.14); this.tone(2093,0.12,'sine',0.14,0,0.16); break;
      case 'note':  this.tone(1174,0.08,'sine',0.09); this.tone(1568,0.14,'sine',0.08,0,0.06); break;
      case 'cheer': [784,988,1175,1568].forEach((f,i)=>this.tone(f,0.12,'triangle',0.09,0,i*0.05)); break;
      case 'buy':   this.tone(988,0.09,'square',0.1); this.tone(1319,0.1,'square',0.1,0,0.08); this.tone(1568,0.2,'square',0.1,0,0.16); break;
      case 'laugh': [880,740,880,740].forEach((f,i)=>this.tone(f,0.07,'square',0.07,120,i*0.09)); break;
      case 'clap':  [0,0.09,0.2].forEach(d=>this.hiss(0.045,0.13,2200,d)); break;
      case 'gasp':  this.hiss(0.18,0.1,900); this.tone(500,0.14,'sine',0.07,350); break;
      case 'chirp': this.tone(2200,0.06,'sine',0.1,400); this.tone(2500,0.07,'sine',0.09,300,0.09); break;
      case 'squee': [1500,1800,2100].forEach((f,i)=>this.tone(f,0.06,'sine',0.1,200,i*0.06)); break;
      case 'mumble':this.tone(300,0.07,'sine',0.05,40); this.tone(340,0.07,'sine',0.05,-30,0.1); break;
      case 'steam': this.hiss(0.35,0.12,3000); break;
      case 'beat': this.tone(72,0.14,'sine',0.22,-24); this.tone(66,0.1,'sine',0.14,-20,0.16); break;
      case 'quack': this.tone(520,0.1,'sawtooth',0.12,-120); this.tone(470,0.12,'sawtooth',0.1,-100,0.11); break;
    }
  },
  ambT:2,
  ambient(dt,crowd,cams,cooking){
    if(!this.ctx||!this.on)return;
    this.ambT-=dt;
    if(this.ambT>0)return;
    this.ambT=rnd(2.2,4.5);
    if(crowd<2)return;
    const roll=Math.random();
    if(roll<0.34) this.sfx('mumble');                                  // soft chatter
    else if(roll<0.52){ this.tone(2350,0.05,'sine',0.045); this.tone(2350,0.04,'sine',0.035,0,0.07); } // dishes clink
    else if(roll<0.66&&crowd>=3) [900,760].forEach((f,i)=>this.tone(f,0.05,'square',0.03,90,i*0.08)); // distant giggle
    else if(roll<0.76&&cams) this.sfx('photo');                        // a camera somewhere
    else if(roll<0.9&&cooking) this.hiss(0.3,0.04,2800,0,this.ambG);               // something steams
  },
  /* Adaptive music: kick+bass always; hats, arp, siren layer in with panic. */
  BASS:[0,0,7,0,10,7,5,3],
  ARP:[0,3,7,10,12,10,7,3],
  music(panic,playing){
    if(!this.ctx||!this.on)return;
    const bpm=96+panic*72;
    const spb=60/bpm/2; // 8th notes
    while(this.nextT<this.ctx.currentTime+0.15){
      const s=this.step, t=this.nextT-this.ctx.currentTime;
      if(playing){
        if(s%2===0){ // kick on beats
          this.tone(130,0.12,'sine',0.5,-95,Math.max(0,t),this.musGain);
        }
        const b=110*Math.pow(2,this.BASS[s%8]/12)/2;
        this.tone(b,spb*0.9,'triangle',0.30,0,Math.max(0,t),this.musGain);
        if(panic>0.22) this.hiss(0.04,0.05+panic*0.06,6000,Math.max(0,t+spb/2));
        if(panic>0.45 && s%1===0){
          const a=220*Math.pow(2,this.ARP[(s*2)%8]/12);
          this.tone(a,spb*0.5,'square',0.06+panic*0.05,0,Math.max(0,t),this.musGain);
        }
        if(panic<0.35&&(typeof S!=='undefined')&&S.data.owned&&S.data.owned.jukebox&&s%4===2){
          const mel=440*Math.pow(2,this.ARP[(s>>2)%8]/12);
          this.tone(mel,spb*1.6,'triangle',0.06,0,Math.max(0,t),this.musGain);
        }
        if(panic>0.8 && s%8===0){
          this.tone(660,spb*4,'sine',0.05,220,Math.max(0,t),this.musGain);
        }
      }
      this.nextT+=spb; this.step++;
    }
  }
};

/* ============================ SAVE / META ============================ */
/* Persists via the artifact storage API when available; falls back to memory. */
const S={
  data:{ bestScore:0,bestTime:0,totalServed:0,totalMoney:0,runs:0,
         ach:{}, theme:'diner', skin:'rookie', sound:true,
         coins:0, owned:{}, souv:{}, set:null, papers:[], kikiOutfit:'classic',
         tut:{cook:false,serve:false,plates:false} },
  ready:false,
  async load(){
    try{
      if(window.storage){
        const r=await window.storage.get('rushhour:save');
        if(r&&r.value) Object.assign(this.data, JSON.parse(r.value));
      }
    }catch(e){}
    this.ready=true; A.on=this.data.sound;
  },
  save(){
    try{ if(window.storage) window.storage.set('rushhour:save', JSON.stringify(this.data)); }catch(e){}
  }
};

/* ============================ PARTICLES / FLOATERS ============================ */
const parts=[]; const MAXP=320;
function puff(x,y,color,n=8,spd=90,size=6,life=0.6,grav=0){ n=Math.max(1,Math.round(n*SETT().parts));
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    const a=rnd(0,TAU),v=rnd(spd*0.4,spd);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,g:grav,s:rnd(size*0.5,size),l:0,ml:rnd(life*0.6,life),c:color,shape:'c'});
  }
}
function sparkle(x,y,color,n=6){ n=Math.max(1,Math.round(n*SETT().parts));
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    const a=rnd(0,TAU),v=rnd(30,110);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-40,g:60,s:rnd(3,6),l:0,ml:rnd(0.4,0.8),c:color,shape:'star'});
  }
}
function smokePuff(x,y,n=3){
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    parts.push({x:x+rnd(-8,8),y,vx:rnd(-12,12),vy:rnd(-55,-30),g:-10,s:rnd(7,13),l:0,ml:rnd(0.8,1.4),c:'rgba(90,90,100,0.5)',shape:'c'});
  }
}
function heartPop(x,y,n=4){
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    parts.push({x:x+rnd(-14,14),y:y+rnd(-6,6),vx:rnd(-25,25),vy:rnd(-90,-50),g:40,s:rnd(6,10),l:0,ml:rnd(0.6,1),c:'#ff6b8a',shape:'heart'});
  }
}
function coinBurst(x,y,n=4){
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    parts.push({x,y,vx:rnd(-70,70),vy:rnd(-190,-110),g:420,s:rnd(6,8),l:0,ml:rnd(0.7,1),c:'#ffd93d',shape:'coin'});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.l+=dt; if(p.l>=p.ml){parts[i]=parts[parts.length-1];parts.pop();continue}
    p.vy+=p.g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
  }
}
function drawParts(){
  for(const p of parts){
    const k=1-p.l/p.ml;
    cx.globalAlpha=k;
    cx.fillStyle=p.c;
    if(p.shape==='c'){ cx.beginPath();cx.arc(p.x,p.y,p.s*k,0,TAU);cx.fill(); }
    else if(p.shape==='coin'){ cx.beginPath();cx.arc(p.x,p.y,p.s,0,TAU);cx.fill(); cx.fillStyle='#e8a500';cx.beginPath();cx.arc(p.x,p.y,p.s*0.55,0,TAU);cx.fill(); }
    else if(p.shape==='heart'){ drawHeart(p.x,p.y,p.s*k,p.c); }
    else if(p.shape==='star'){ drawStar(p.x,p.y,p.s*k,p.c); }
  }
  cx.globalAlpha=1;
}
const floaters=[];
function floater(x,y,s,color='#fff',size=22){
  floaters.push({x,y,s,c:color,size,t:0});
}
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.t+=dt; f.y-=40*dt;
    if(f.t>1.1)floaters.splice(i,1);
  }
}
function drawFloaters(){
  for(const f of floaters){
    const k=f.t<0.15?f.t/0.15:1, a=f.t>0.7?1-(f.t-0.7)/0.4:1;
    cx.save(); cx.globalAlpha=a; cx.translate(f.x,f.y); cx.scale(0.6+0.4*eb(Math.min(1,k)),0.6+0.4*eb(Math.min(1,k)));
    txtO(f.s,0,0,f.size,f.c,'rgba(30,30,60,0.85)');
    cx.restore();
  }
  cx.globalAlpha=1;
}

/* ============================ ART HELPERS ============================ */
function drawHeart(x,y,s,c){
  cx.fillStyle=c; cx.beginPath();
  cx.moveTo(x,y+s*0.9);
  cx.bezierCurveTo(x-s*1.3,y-s*0.1,x-s*0.6,y-s*1.1,x,y-s*0.3);
  cx.bezierCurveTo(x+s*0.6,y-s*1.1,x+s*1.3,y-s*0.1,x,y+s*0.9);
  cx.fill();
}
function drawStar(x,y,s,c){
  cx.fillStyle=c; cx.beginPath();
  for(let i=0;i<5;i++){
    const a=-Math.PI/2+i*TAU/5, a2=a+TAU/10;
    cx.lineTo(x+Math.cos(a)*s,y+Math.sin(a)*s);
    cx.lineTo(x+Math.cos(a2)*s*0.45,y+Math.sin(a2)*s*0.45);
  }
  cx.closePath(); cx.fill();
}
/* Food icons — chunky sticker style */
function drawFood(kind,x,y,s=1,burnt=false){

  }else if(kind==='fries'){

function drawPlate(x,y,s=1){

  cx.fillStyle='#b9c4d0';cx.beginPath();cx.arc(-4,-3,2.5,0,TAU);cx.arc(5,-1,2,0,TAU);cx.fill();

function drawTool(kind,x,y,s=1,ang=0){
  cx.save();cx.translate(x,y);cx.rotate(ang);cx.scale(s,s);
  const ink=TH().ink; cx.lineWidth=2.6;cx.strokeStyle=ink;cx.lineJoin='round';
  if(kind==='mop'){
    cx.fillStyle='#c98a4b'; rr(-3,-26,6,38,3);cx.fill();cx.stroke();
    cx.fillStyle='#6ec6ff'; cx.beginPath();
    cx.moveTo(-12,10);cx.quadraticCurveTo(-14,26,-8,26);cx.quadraticCurveTo(-4,20,0,26);
    cx.quadraticCurveTo(4,20,8,26);cx.quadraticCurveTo(14,26,12,10);cx.closePath();cx.fill();cx.stroke();
  }else if(kind==='ext'){
    cx.fillStyle=owned('goldExt')?'#ffd24d':'#ff5a5f'; rr(-9,-16,18,34,8);cx.fill();cx.stroke();
    if(owned('goldExt')){cx.fillStyle='rgba(255,255,255,0.55)'; rr(-6,-13,5,24,3);cx.fill();}
    cx.fillStyle='#2f3061'; rr(-4,-24,8,9,3);cx.fill();
    cx.beginPath();cx.moveTo(0,-20);cx.quadraticCurveTo(14,-22,15,-12);cx.lineWidth=3.5;cx.stroke();
    cx.fillStyle='#fff'; rr(-6,-8,12,12,3);cx.fill();
  }else if(kind==='wrench'){
    // reference: single open-end jaw, diagonal, handle lower-left -> head upper-right
    cx.save();cx.rotate(0.83);
    cx.fillStyle='#c3ccd8';cx.lineWidth=2.6;cx.lineJoin='round';cx.strokeStyle=ink;
    // rounded pill handle
    rr(-5.5,-4,11,34,5.5); cx.fill(); cx.stroke();
    // head: a thick ring with one open jaw (drawn after, so it caps the handle's top seam)
    const hcx=0,hcy=-13,R=12.5,rI=6,gapHalf=0.66,gc=-Math.PI/2;
    const gA=gc-gapHalf, gB=gc+gapHalf;
    cx.beginPath();
    cx.arc(hcx,hcy,R,gB,gA+TAU,false);
    cx.arc(hcx,hcy,rI,gA+TAU,gB,true);
    cx.closePath();
    cx.fill(); cx.stroke();
    cx.restore();
  }
  cx.restore();
}

}

/* ---------------- Customers ---------------- */
function pickCustomerType(){
  const t=G.t;
  const pool=[['student',20],['tourist',16],['grandma',14],['biz',14],['influencer',10]];
  if(t>40) pool.push(['couple',9]);
  if(t>50) pool.push(['family',10]);
  if(t>60) pool.push(['blogger',7]);
  if(t>80) pool.push(['critic',6]);
  // word gets around: angry departures attract a tougher, twitchier crowd
  const br=Math.min(G.badReviews,4);
  if(br>0){
    pool.push(['biz',br*6]);
    if(t>100) pool.push(['vip',br*3]);
    if(t>80) pool.push(['critic',br*2]);
  }
  return weighted(pool);
}
function weighted(pool){
  let sum=0; for(const p of pool)sum+=p[1];
  let r=Math.random()*sum;
  for(const p of pool){ r-=p[1]; if(r<=0)return p[0]; }
  return pool[0][0];
}
function spawnCustomer(forceType){
  const inQueue=G.customers.filter(c=>c.state==='queue').length;
  if(inQueue>=QUEUE.length) return null;
  const type=forceType||pickCustomerType();
  const def=CTYPES[type];
  const nOrders=def.orders||1;
  const orders=[];
  const keys=Object.keys(FOODS);
  for(let i=0;i<nOrders;i++){
    let f=pick(keys);
    if(nOrders>1 && orders.includes(f)) f=keys[(keys.indexOf(f)+1)%keys.length];
    orders.push(f);
  }
  const c={
    type, def, orders, priceSum:orders.reduce((a,f)=>a+FOODS[f].price,0),
    x:DOOR.x, y:DOOR.y, tx:DOOR.x, ty:DOOR.y,
    state:'queue', table:null, patience:def.patience, maxPat:def.patience,
    eatT:0, thinkT:rnd(0.5,1.0), payT:0, bob:rnd(0,TAU), slipCd:0, photoT:0,
    orderT:0, // time waiting since order shown
    leaveT:0, mood:'ok', witness:false, alerted:false, squash:0,
    blinkIn:rnd(1.5,4.5), blinkP:0, waveT:0,
    idleIn:rnd(2.5,6), idleK:null, idleT:0, pointCd:rnd(2,5), candyCd:6, snapCd:rnd(6,12),
    hairStyle: ['student','influencer','tourist','critic','vip','blogger','couple'].includes(type) ? pick(HAIR_STYLES) : null,
    hairColor: pick(HAIR_COLORS),
  };
  G.customers.push(c);
  A.sfx('bell');
  if(def.vip){ banner('★ VIP ARRIVED! ★','#ffd24d'); addStory('A VIP swept through the doors.',2); }
  if(def.critic){ banner('THE FOOD CRITIC IS HERE','#8d86c9'); addStory('The food critic came to judge you.',2); }
  return c;
}
function freeTable(){
  return G.tables.find(t=>!t.customer && t.plates===0 && !fireOn('table',t));
}
function fireOn(type,ref){ return G.fires.find(f=>f.ttype===type&&f.ref===ref); }

function seatCustomers(){
  if(G.box) return; // delivery blocks the door
  const q=G.customers.filter(c=>c.state==='queue');
  for(const c of q){
    const t=freeTable();
    if(!t)break;
    t.customer=c; c.table=t; c.state='walk';
    c.tx=t.x; c.ty=t.y-62;

    if(G.combo%3===0) triggerCalm(); // rhythm becomes recovery
  } else G.combo=0;
  const saved=patPre/c.maxPat<0.18; // saved at the brink
  c.clutch=patPre<1.2; // ...saved at the LAST second
  if(c.clutch){
    G.hitstop=Math.max(G.hitstop,0.4*SETT().hit); hap(28);

  puff(c.x,c.y-14,'rgba(255,255,255,0.85)',6,140,3,0.3);
  if(c.table)c.table.bump=1;
  G.glow=Math.min(1,(G.glow||0)+0.3); // the room warms up when service flows
  const nb=G.customers.find(o=>o!==c&&(o.state==='waiting'||o.state==='eat')&&dist(o.x,o.y,c.x,c.y)<170);
  if(nb&&Math.random()<0.6)floater(nb.x,nb.y-58,'👀','rgba(255,255,255,0.7)',12);
  if(saved){
    G.gray=0; // color snaps back — relief you can see
    floater(c.x,c.y-96,'PHEW!','#7cf2c0',20);
    confetti(c.x,c.y-30,8); A.sfx('cheer');

  }

  if(c.type==='couple'){ floater(c.x-8,c.y-60,'❤','#f4a9b8',15); floater(c.x+22,c.y-52,'❤','#f4a9b8',13); A.sfx('cheer'); }

/* ---------------- Hazards ---------------- */
function startFire(ttype,ref){
  if(fireOn(ttype,ref))return;
  const pos=hazardPos(ttype,ref);
  G.fires.push({ttype,ref,x:pos.x,y:pos.y,age:0,spread:6+rnd(0,3),size:0.6});
  G.mem.fireN=(G.mem.fireN||0)+1; G.mem.lastFireClock=fmtClock(G.t);
  banner('FIRE!!','#ff5a3c'); shake(8,0.4); A.sfx('fire');
  addStory('Something caught fire.',2);
  G.disasters++;
}
function hazardPos(ttype,ref){
  if(ttype==='station')return{x:ref.x,y:ref.y-34};
  if(ttype==='table')return{x:ref.x,y:ref.y-10};
  return{x:BIN.x,y:BIN.y-30};
}
function spreadFire(f){
  if(G.fires.length>=3)return;
  // choose a neighbor target
  const cands=[];
  for(const s of G.stations) if(!fireOn('station',s)) cands.push({ttype:'station',ref:s,d:dist(f.x,f.y,s.x,616)});
  for(const t of G.tables) if(!fireOn('table',t)) cands.push({ttype:'table',ref:t,d:dist(f.x,f.y,t.x,t.y)});
  cands.sort((a,b)=>a.d-b.d);
  if(cands[0]&&cands[0].d<260){
    const c=cands[0];
    const pos=hazardPos(c.ttype,c.ref);
    G.fires.push({ttype:c.ttype,ref:c.ref,x:pos.x,y:pos.y,age:0,spread:6+rnd(0,3),size:0.5});
    A.sfx('fire'); addStory('The fire is spreading!',2);
  }
}
function extinguishFire(f){
  const i=G.fires.indexOf(f); if(i<0)return;
  G.fires.splice(i,1);
  puff(f.x,f.y,'#eef3f8',14,120,8,0.7);
  puff(f.x,f.y,'#cfd8e3',10,80,10,0.9);
  A.sfx('foam'); G.hitstop=Math.max(G.hitstop,0.05*SETT().hit); shake(2,0.1);
  // PARTIAL PROGRESS: remaining fires lose momentum
  for(const f2 of G.fires){ f2.spread+=4; f2.size=Math.max(0.3,f2.size-0.15); }
  if(G.fires.length)floater(f.x,f.y-44,'spread slowed!','#bfe4ff',14);
  // SPRINT 4: the crowd cheers
  let cheered=false;
  for(const c of G.customers){
    if((c.state==='waiting'||c.state==='eat'||c.state==='sit')&&dist(c.x,c.y,f.x,f.y)<240){
      c.patience=Math.min(c.maxPat,c.patience+c.maxPat*0.08);
      c.squash=Math.max(c.squash,0.7);
      if(!cheered||Math.random()<0.5)floater(c.x,c.y-64,'🎉','#ffd93d',16);
      cheered=true;
    }
  }
  if(cheered){A.sfx('cheer'); if(Math.random()<0.4)addStory('The whole room cheered when the fire died.',2);}
  G.firesOut++; G.money+=25;
  floater(f.x,f.y-20,'CRISIS AVERTED +$25','#7cf2c0',18);
  if(f.age<6 && G.fires.length===0){
    G.morale=12;
    note('💪 Morale boost! Cooking faster','#7cf2c0');
    addStory('You killed the fire before it spread. The kitchen roared back.',2);
  } else {
    addStory('You beat back the flames.',2);
    // CAUSAL: a long fight means a lot of foam — it leaves a slick
    if(f.age>5&&G.puddles.length<3){
      const px=clamp(f.x,60,420), py=clamp(f.y+44,240,520);
      G.puddles.push({x:px,y:py,s:0.5,t:0});
      G.mem.leakRecent=G.t;
      floater(px,py-14,'foam slick!','#bfe4ff',14);
      addStory('The extinguisher foam left a slick behind.',1);
    }
  }
  noteGood(f.x,f.y);
  if(G.firesOut>=3){ unlockAch('fire'); earnSouv('emptyExt'); }
}

/* EMOTION: the whole room watches the same story unfold */
function crowdReact(x,y,kind,radius=240){
  if(G.reactCd>0)return;
  G.reactCd=1.3;
  let shown=0,sfxDone=false;
  for(const c of G.customers){
    if(shown>=5)break;
    if(!(c.state==='waiting'||c.state==='sit'||c.state==='eat'||c.state==='queue'))continue;
    if(dist(c.x,c.y,x,y)>radius)continue;
    shown++;
    c.squash=Math.max(c.squash,0.55);
    let em;
    if(kind==='gasp'){ em=c.type==='biz'?'tsk.':'😱'; if(!sfxDone){A.sfx('gasp');sfxDone=true;} }
    else if(kind==='clap'){ em=c.type==='biz'?'hm.':'👏'; if(!sfxDone){A.sfx('clap');sfxDone=true;} }
    else if(kind==='point'){ em=c.type==='influencer'?'📱':'👉'; if(!sfxDone){A.sfx('laugh');sfxDone=true;} }
    else { // laugh
      if(c.type==='biz')em='hmph.';
      else if(c.type==='grandma')em='👏';
      else if(c.type==='influencer')em='📱';
      else if(c.type==='tourist'){em='📷';sparkle(c.x+14,c.y-20,'#ffffff',3);}
      else if(c.type==='family')em='HA HA!';
      else em='HA!';
      if(!sfxDone){A.sfx('laugh');sfxDone=true;}
    }
    floater(c.x+rnd(-6,6),c.y-62,em,c.type==='biz'?'#aab4c0':'#ffd93d',c.type==='family'?15:14);
  }
}

/* ============================ INPUT & DRAG ============================ */
let pointer={x:0,y:0,down:false,sx:0,sy:0,moved:0};
let drag=null; // {type, ref, food?, offx, offy}
let dragVis={x:0,y:0}; // lagged visual position for dragged items
let tweens=[]; // spring-back animations for foods
const uiRects=[]; // rebuilt each frame by drawBtn

function evtPos(e){
  const r=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);
  return {x:(t.clientX-r.left)/viewScale, y:(t.clientY-r.top)/viewScale};
}
cv.addEventListener('pointerdown',e=>{e.preventDefault();A.init();onDown(evtPos(e));},{passive:false});
cv.addEventListener('pointermove',e=>{e.preventDefault();onMove(evtPos(e));},{passive:false});
cv.addEventListener('pointerup',e=>{e.preventDefault();onUp(evtPos(e));},{passive:false});
cv.addEventListener('pointercancel',e=>{onUp(evtPos(e));},{passive:false});

function onDown(p){
  pointer.down=true; pointer.x=p.x;pointer.y=p.y; pointer.sx=p.x;pointer.sy=p.y; pointer.moved=0;
  if(screen!=='game'||paused||!G||G.over) return;
  p=s2w(p);
  drag=pickDraggable(p.x,p.y);
  if(drag){ A.sfx('pick'); dragVis.x=p.x; dragVis.y=p.y-10; puff(p.x,p.y,'rgba(255,255,255,0.7)',4,110,2.5,0.22); }
}
function onMove(p){
  pointer.moved+=dist(pointer.x,pointer.y,p.x,p.y);
  pointer.x=p.x;pointer.y=p.y;
  if(drag){
    const wp=s2w(p);
    if(drag.type==='tool'){drag.ref.x=wp.x;drag.ref.y=wp.y;}
    else if(drag.type==='bin'){drag.ref.dx=wp.x;drag.ref.dy=wp.y;}
    else if(drag.type==='box'){drag.ref.x=wp.x;drag.ref.y=wp.y;}
  }
}
function onUp(p){
  pointer.down=false;
  const isTap=pointer.moved<12;
  if(drag){ const wp=s2w(p); resolveDrop(drag,wp.x,wp.y); drag=null; return; }
  // UI buttons (all screens)
  if(isTap){
    for(let i=uiRects.length-1;i>=0;i--){
      const b=uiRects[i];
      if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ A.sfx('click'); hap(6); b.cb(); return; }
    }
    if(screen==='game'&&!paused&&G&&!G.over){ const wp=s2w(p); gameTap(wp.x,wp.y); }
  }
}

function pickDraggable(x,y){

    if(t.plates>0 && dist(x,y,t.x,t.y-6)<44) return {type:'plates',ref:t};

  }
  else if(d.type==='tool'){

        G.puddles.splice(G.puddles.indexOf(pd),1);

      if(!used) for(const m of G.messes){ if(dist(x,y,m.x,m.y)<46){

  else if(d.type==='bin'){

function scareRat(r){

/* ============================ DRAMA ENGINE ============================ */
/* The director doesn't roll dice. It remembers, foreshadows, and composes.
   Beats: calm → build → crisis → aftermath → (escalate, repeat).
   Every event has a cause the player can learn to read. */

/* schedule(delay, fn, omenText, ref): foreshadow, then make it happen. */
function schedule(delay,fn,omenText,ref){
  G.plan.push({at:G.t+delay,fn,omen:omenText||null,ref:ref||null,born:G.t});
}
function pendingOmen(){
  let best=null;
  for(const p of G.plan) if(p.omen&&(!best||p.at<best.at)) best=p;
  return best;
}
/* the director's memory of this run */
function noteWear(id){ G.mem.wear[id]=(G.mem.wear[id]||0)+1; }
function maxWearStation(){
  let best=G.stations[0],bw=-1;
  for(const s of G.stations){ const w=G.mem.wear[s.id]||0; if(w>bw&&s.state!=='broken'){bw=w;best=s;} }
  return best;
}
function dirtLevel(){
  return G.tables.filter(t=>t.plates>0).length+G.messes.length+G.puddles.length
       +(G.bin.fill>=G.bin.cap?2:0);
}
function severeCount(){
  return G.fires.length+G.rats.filter(r=>!r.ally&&r.state!=='flee').length
       +G.stations.filter(s=>s.state==='broken').length;
}

/* ---- crisis scenes: causally composed set-pieces ---- */
function composeCrisis(){
  const cyc=G.cycle, dirt=dirtLevel();
  let scene;
  if(G.mem.burnRecent&&G.t-G.mem.burnRecent<40) scene='meltdown';        // you burned food — the kitchen remembers
  else if(dirt>=3||G.mem.ratFed) scene='infestation';                    // filth invites teeth
  else if(G.puddles.length>0||G.mem.leakRecent) scene='flood';           // water finds the wiring
  else if(G.money>200&&!G.mem.paparazziDone) scene='paparazzi';          // success attracts cameras
  else scene=pick(['meltdown','flood','infestation'].concat(cyc>=2?['blackout']:[]));
  G.sceneName=scene;
  if(scene==='meltdown'){
    const s=maxWearStation();
    schedule(3.5,()=>{ if(s.state!=='broken')breakStation(s); },'The '+s.label.toLowerCase()+' is rattling ominously...',s);
    if(cyc>=1||G.t>110){
      schedule(9,()=>{ const o=G.stations.find(x=>x!==s&&!fireOn('station',x)); if(o)startFire('station',o); },'Something smells like it\u2019s scorching...');
    }
    addStory('The overworked kitchen began to give out.',1);
  }
  else if(scene==='infestation'){
    schedule(3,()=>spawnRat(),'Scratching sounds from the walls...');
    schedule(7.5,()=>spawnRat());
    if((G.mem.reported||MOD().id==='inspection')&&!G.inspector){
      schedule(13,()=>spawnInspector(),'A clipboard glints outside the window...');
      G.mem.reported=false;
    }
  }
  else if(scene==='flood'){
    schedule(3,()=>spawnPuddle(),'You hear dripping somewhere...');
    schedule(8,()=>spawnPuddle());
    if(cyc>=1||G.t>150){
      schedule(12.5,()=>startBlackout(),'The lights are flickering...'); // water + wiring
      addStory('The leak reached the wiring.',2);
    }
  }
  else if(scene==='blackout'){
    schedule(3.5,()=>startBlackout(),'The lights are flickering...');
    schedule(9,()=>{ const st=maxWearStation(); if(st&&st.state!=='broken')breakStation(st); },'Something just popped in the fuse box...');
    addStory('The power gave out mid-shift. Cooking by phone-light.',2);
  }
  else if(scene==='paparazzi'){
    G.mem.paparazziDone=true;
    schedule(3,()=>spawnCustomer('vip'),'Cameras are gathering outside...');
    schedule(4.5,()=>spawnCustomer('influencer'));
    addStory('A VIP arrived with an influencer in tow. No pressure.',2);
  }
}
/* a small causal beat for the BUILD phase */
function buildEvent(){
  const dirt=dirtLevel();
  if(G.mem.reported&&!G.inspector&&Math.random()<0.6){
    schedule(4,()=>spawnInspector(),'A clipboard glints outside the window...');
    G.mem.reported=false; return;
  }
  const w=maxWearStation();
  if((G.mem.wear[w.id]||0)>=5){ schedule(3.5,()=>{if(w.state!=='broken')breakStation(w);},'The '+w.label.toLowerCase()+' is rattling ominously...',w); G.mem.wear[w.id]=0; return; }
  if(dirt>=2&&G.rats.length===0){ schedule(3,()=>spawnRat(),'Scratching sounds from the walls...'); return; }
  if(MOD().id==='rainy'&&G.puddles.length<2){ schedule(3,()=>spawnPuddle(),'You hear dripping somewhere...'); return; }
  if(G.puddles.length===0&&MOD().id!=='sunny'&&Math.random()<0.5){ schedule(3,()=>spawnPuddle(),'You hear dripping somewhere...'); return; }
  if(!G.box&&G.boostT<=0){ schedule(3,()=>spawnBox(),'A delivery van is backing up outside...'); return; }
  schedule(3,()=>spawnCustomer('critic'),'Someone with a notepad is reading the menu outside...');
}

function director(dt){
  const t=G.t;
  /* ---- scripted rush hours: the clock is a promise the player learns ---- */
  if(!G.rushed.noon&&t>72){ G.rushed.noon=true;
    schedule(8,()=>lunchRush('LUNCH RUSH!!'),'It\u2019s almost noon. Brace yourself...');
  }
  if(!G.rushed.dinner&&t>192){ G.rushed.dinner=true;
    schedule(8,()=>lunchRush('DINNER RUSH!!'),'The dinner crowd is gathering outside...');
  }

  /* ---- run the plan (frozen during a Last Stand — pure showdown) ---- */
  if(G.lastStand>0){ for(const p of G.plan)p.at+=dt; }
  for(let i=G.plan.length-1;i>=0;i--){
    const p=G.plan[i];
    if(p.ref)p.ref.wob=Math.max(p.ref.wob,0.18); // the object itself trembles
    if(G.t>=p.at){ G.plan.splice(i,1); try{p.fn();}catch(e){} }
  }

  /* ---- dramatic beats ---- */
  G.beatT+=dt;
  const mercy=G.panicSm>0.75; // more interesting, never just harder
  if(G.beat==='calm'){
    if(t>30){ G.beat='build'; G.beatT=0; }
  } else if(G.beat==='build'){
    if(G.beatT>2&&!G.builtEvent&&!mercy){ G.builtEvent=true; buildEvent(); }
    const buildLen=15-Math.min(6,G.cycle*1.5);
    if(G.beatT>buildLen&&!mercy){ G.beat='crisis'; G.beatT=0; G.crisisLoss=0; G.builtEvent=false; composeCrisis(); }
  } else if(G.beat==='crisis'){
    const resolved=severeCount()===0&&G.plan.length===0&&G.beatT>10;
    if(resolved||G.beatT>32){
      const clean=resolved&&G.crisisLoss===0;
      G.beat='aftermath'; G.beatT=0;
      if(clean){
        G.kindness=true; // survived clean — the director rewards nerve
        addStory('You held the line through the whole crisis.',2);
        confetti(240,470,16); crowdReact(240,400,'clap',400);
        note('🎉 WE SURVIVED!','#7cf2c0');
        for(const st of G.stations)st.wob=1; // the kitchen does a little hop
        G.chefWipe=1.6; // and the chef wipes their forehead, dramatically
        A.sfx('cheer');
      }
    }
  } else if(G.beat==='aftermath'){
    if(G.kindness&&G.beatT>3){ G.kindness=false;
      if(!G.box)schedule(2,()=>spawnBox(),'A delivery van is backing up outside...');
    }
    if(G.beatT>13){ G.beat='build'; G.beatT=0; G.cycle++; }
  }

  /* ---- customer spawning paced by beat ---- */
  G.spawnT-=dt;
  const baseIv={calm:9.5,build:6.8,crisis:5.6,aftermath:9.5}[G.beat];
  const interval=Math.max(3.4,(baseIv-G.cycle*0.5)*(1-G.flow*0.16)); // momentum keeps the door swinging
  if(G.spawnT<=0){
    G.spawnT=interval*rnd(0.85,1.15);
    spawnCustomer();
  }

  /* hidden panic — the restaurant's heartbeat */
  const urgent=G.customers.filter(c=>(c.state==='waiting'||c.state==='queue')&&c.patience/c.maxPat<0.34).length;
  const queueN=G.customers.filter(c=>c.state==='queue').length;
  const plates=G.tables.filter(t=>t.plates>0).length;
  const broken=G.stations.filter(s=>s.state==='broken').length;
  let p= queueN*0.07 + urgent*0.13 + G.fires.length*0.28 + G.rats.filter(r=>!r.ally).length*0.13
       + broken*0.11 + G.puddles.length*0.05 + (G.bin.fill>=G.bin.cap?0.14:0)
       + plates*0.035 + (G.box?0.09:0) + (G.blackout>0?0.2:0) + Math.min(0.22,t/700)
       + G.smoke*0.15 + G.messes.length*0.04 + (G.viralT>0?0.12:0) + Math.min(0.1,G.badReviews*0.02);
  if(G.lastStand>0)p=Math.max(p,0.9); // the finale plays at full volume
  G.panic=clamp(p,0,1);
  G.panicSm+=(G.panic-G.panicSm)*Math.min(1,dt*1.4);
}

/* ============================ UPDATE ============================ */
function updateGame(dt){
  if(G.over){ G.endT+=dt; updateParts(dt); updateFloaters(dt); return; }
  const anim=1+G.panicSm*0.5; // everything gets more frantic
  G.t+=dt;
  director(dt);
  seatCustomers();

  // combo timer
  if(G.comboT>0){ G.comboT-=dt; if(G.comboT<=0)G.combo=0; }
  if(G.boostT>0)G.boostT-=dt;
  if(G.blackout>0)G.blackout-=dt;
  if(G.viralT>0)G.viralT-=dt;
  if(G.morale>0)G.morale-=dt;
  if(G.freshCd>0)G.freshCd-=dt;
  if(G.reactCd>0)G.reactCd-=dt;
  G.chatCd-=dt;
  if(G.calmPulse>0){ G.calmPulse+=dt*1.6; if(G.calmPulse>1)G.calmPulse=0; }
  if(G.panicSm>0.55)G.wasPanicked=true;
  G.flow=Math.max(0,G.flow-dt*0.035);
  G.glow=Math.max(G.glow-dt*0.25,G.flow*0.45); // success is visible
  if(G.flow>0.6&&Math.random()<dt*3&&parts.length<MAXP)
    parts.push({x:rnd(30,450),y:rnd(200,520),vx:rnd(-6,6),vy:rnd(-26,-14),g:-4,s:rnd(1.6,3),l:0,ml:rnd(0.8,1.4),c:'rgba(255,220,130,0.55)',shape:'c'});
  // near-miss heartbeat when someone is about to snap
  const critical=G.customers.some(c=>c.state==='waiting'&&c.patience/c.maxPat<0.15);
  G.gray=(G.gray||0)+((critical?0.14:0)-(G.gray||0))*Math.min(1,dt*(critical?1.2:6));
  G.hbT=(G.hbT||0)-dt;
  if(critical&&G.hbT<=0){ G.hbT=0.85; A.sfx('beat'); }
  /* LAST STAND: one heart left — the movie's third act */
  if(G.hearts===1&&!G.lastStandUsed&&G.lastStand<=0){
    G.lastStandUsed=true; G.lastStand=25;
    banner('⚡ LAST STAND ⚡','#ffd24d'); shake(6,0.4); A.sfx('bell');
    addStory('Down to the last heart. Everything on the line.',3);
  }
  if(G.lastStand>0){
    G.lastStand-=dt;
    if(G.hearts>1){ G.lastStand=0; } // rescued yourself early — stand ends
    else if(G.lastStand<=0){
      if(severeCount()===0){
        G.hearts=Math.min(5,G.hearts+2); G.miracle=true; earnSouv('medal');
        G.glow=1;
        banner('✨ MIRACLE RECOVERY! ✨','#7cf2c0');
        addStory('Against everything, you pulled the diner back from the dead.',5);
        heartPop(240,400,12); sparkle(240,400,'#7cf2c0',16); A.sfx('achieve');
        confetti(160,360,16); confetti(320,360,16); crowdReact(240,380,'clap',500);
        G.panicSm*=0.5;
      } else G.lastStand=6; // the showdown continues until it's clean — or over
    }
  }
  /* COMEBACK: clawed back from chaos to a spotless floor */
  if(G.wasPanicked&&G.freshCd<=0&&G.t>50){
    const clean= G.fires.length===0&&G.rats.length===0&&G.puddles.length===0&&G.messes.length===0
              && !G.tables.some(t=>t.plates>0)&&G.bin.fill<G.bin.cap
              && !G.stations.some(s=>s.state==='broken'||s.ready==='burnt');
    if(clean){
      G.wasPanicked=false; G.freshCd=60;
      G.money+=75; gainHeart(); G.panicSm*=0.4;
      banner('✨ FRESH START! +$75 ✨','#7cf2c0');
      addStory('You dragged the diner back from the brink. Spotless.',3);
      for(const t of G.tables)sparkle(t.x,t.y-20,'#bff0ff',6);
      confetti(240,300,18); crowdReact(240,350,'clap',400);
      A.sfx('achieve');
    }
  }

  /* DAY ROLLOVER: survive to closing time and the diner refuses to close */
  if(G.t>=G.day*240){
    G.day++;
    gainHeart(); confetti(240,260,20); crowdReact(240,350,'clap',500);
    note('🌙 CLOSING TIME → DAY '+G.day+'!','#7cf2c0');
    addStory('You survived the whole day. The diner rolls into Day '+G.day+'.',4);
    if(G.tables.length<5){ G.tables.push({x:240,y:350,customer:null,plates:0,sparkT:1}); note('🪑 New table installed!','#ffd93d'); }
    A.sfx('achieve');
  }
  /* customers */
  const fireFear=G.fires.length>0?1.5:1;
  for(let i=G.customers.length-1;i>=0;i--){
    const c=G.customers[i];
    c.bob+=dt*6*anim;
    const spd=150*anim;
    if(c.state==='leave'&&c.waveT>0){ c.waveT-=dt; }
    else if(c.state==='queue'||c.state==='walk'||c.state==='leave'||c.state==='leaveAngry'){
      const d=dist(c.x,c.y,c.tx,c.ty);
      if(d>3){
        c.x+=(c.tx-c.x)/d*Math.min(d,spd*dt);
        c.y+=(c.ty-c.y)/d*Math.min(d,spd*dt);
        // slipping on puddles
        if(c.slipCd<=0) for(const pd of G.puddles){
          if(pd.s>0.6 && dist(c.x,c.y,pd.x,pd.y)<34){
            c.slipCd=3; c.patience=Math.max(1,c.patience-4);
            floater(c.x,c.y-46,'WHOA!','#6ec6ff',17); A.sfx('slip');
            if(Math.random()<0.25){ floater(c.x,c.y-66,'🥤 nice catch!','#7cf2c0',13); crowdReact(c.x,c.y,'clap',180); }
            puff(c.x,c.y+10,'#bfe4ff',6,70,4,0.4);
            if(Math.random()<0.3)addStory('A customer slipped on the leak.',1);
            break;
          }
        }
      } else if(c.state==='walk'){ c.state='sit'; c.x=c.tx;c.y=c.ty; }
      else if(c.state==='leave'||c.state==='leaveAngry'){ if(d<=3){ G.customers.splice(i,1); continue; } }
    }
    c.slipCd=Math.max(0,c.slipCd-dt);
    if(c.state==='sigh'){ c.sighT-=dt; if(c.sighT<=0)customerAngryLeave(c); }
    if(c.state==='sit'){
      c.thinkT-=dt*anim;
      if(c.thinkT<=0){ c.state='waiting'; c.orderT=0; A.sfx('pop'); }
    }
    if(c.state==='queue'||c.state==='waiting'){
      /* emotional ecosystem: patience drain is shaped by everything nearby */
      let mod=(c.state==='queue'?0.62:1)*fireFear*(G.blackout>0?1.35:1);
      mod*=1+G.smoke*0.35;                       // smoke frays nerves
      if(G.viralT>0)mod*=1.25;                   // bad press in everyone's feed
      for(const o of G.customers){
        if(o===c)continue;
        const d=dist(c.x,c.y,o.x,o.y);
        if(d<150){
          if(o.mood==='angry'&&(o.state==='waiting'||o.state==='leaveAngry'))mod+=0.3; // anger spreads
          else if(o.state==='eat'&&o.mood==='happy')mod-=0.15;                          // contentment soothes
          if(o.type==='grandma'&&(o.state==='waiting'||o.state==='eat'||o.state==='sit'))mod-=0.25; // grandma calms everyone
        }
      }
      for(const r of G.rats) if(!r.ally&&r.state!=='flee'&&dist(c.x,c.y,r.x,r.y)<150){mod+=0.45;break;} // ew ew ew
      if(c.type==='biz'&&(G.fires.length>0||G.rats.length>0))mod*=1.8; // businessmen do not wait around
      if(c.state==='waiting'&&c.orders.some(f=>{const st=G.stations.find(s=>s.id===FOODS[f].station);return st&&st.state==='broken';}))
        mod*=1.3; // they can see their machine smoking
      mod=clamp(mod,0.35,3);
      c.patience-=dt*mod;
      if(c.state==='waiting')c.orderT+=dt;
      const pr=c.patience/c.maxPat;
      c.mood= pr>0.55?'ok': pr>0.28?'worried':'angry';
      if(pr<0.3&&!c.alerted){ c.alerted=true; floater(c.x,c.y-88,'❗','#ff5a5f',24); A.sfx('pop'); }
      if(c.patience<=0){ customerAngryLeave(c); }
    }
    if(c.state==='eat'){
      if(c.foodPhotoT>0){ // blogger frames the shot before a single bite
        c.foodPhotoT-=dt;
        if(c.foodPhotoT<0.5&&!c.angle2){c.angle2=true;A.sfx('photo');sparkle(c.x-14,c.y+4,'#fff',4);} // new angle!
        if(c.foodPhotoT<=0){ A.sfx('photo'); sparkle(c.x+12,c.y+8,'#fff',5); floater(c.x,c.y-58,'📷 *chef\u2019s kiss*','#ffe08a',12); c.mood='happy'; }
        c.eatT+=dt; // eating paused while art happens
      }
      if(c.photoT>0){ c.photoT-=dt; if(c.photoT<=0){A.sfx('photo'); sparkle(c.x,c.y-40,'#ffffff',6); floater(c.x,c.y-64,'#foodie','#ff9bcb',15);} }
      if(c.type==='couple'&&Math.random()<dt*0.12){ floater(c.x+8,c.y-50,'🍴💕','#f4a9b8',12); }
      if(c.type==='family'&&Math.random()<dt*0.22){ spawnMess(c.x,c.y+40); if(Math.random()<0.3)addStory('The kids redecorated the floor with fries.',1); }
      c.eatT-=dt;
      if(c.eatT<=0){
        c.state='leave'; c.tx=DOOR.x; c.ty=DOOR.y; c.mood='happy';
        payAndLeave(c);
        if(c.table){ c.table.customer=null; c.table.plates=1; c.table=null; }
      }
    }
    // influencer is always recording — and she saw THAT
    if(c.def.photo&&!c.witness&&(c.state==='waiting'||c.state==='eat')){
      let saw=false;
      for(const f of G.fires) if(dist(c.x,c.y,f.x,f.y)<230){saw=true;break;}
      if(!saw) for(const r of G.rats) if(!r.ally&&r.state!=='flee'&&dist(c.x,c.y,r.x,r.y)<190){saw=true;break;}
      if(saw){ c.witness=true; floater(c.x,c.y-64,'📱 recording...','#ff9bcb',15); A.sfx('photo');
        addStory('The influencer started filming the disaster.',2); }
    }
    if(c.nibble>0)c.nibble-=dt;
    if(c.bonkCd>0)c.bonkCd-=dt;
    if(c.pointCd>0)c.pointCd-=dt;
    if(c.candyCd>0)c.candyCd-=dt;
    if(c.snapCd>0)c.snapCd-=dt;
    const seatedNow=(c.state==='waiting'||c.state==='eat'||c.state==='sit');
    /* LIVING WORLD: idle acts — nobody stands perfectly still */
    if(c.idleT>0){ c.idleT-=dt; if(c.idleT<=0)c.idleK=null; }
    else if(seatedNow){
      c.idleIn-=dt;
      if(c.idleIn<=0){
        c.idleIn=rnd(3,7);
        c.idleK= c.mood==='worried'?'sigh'
               : c.type==='biz'?(Math.random()<0.35?'phone':'watch')
               : c.type==='grandma'?(Math.random()<0.6?'knit':'look')
               : c.type==='couple'?(Math.random()<0.35?'selfie':pick(['look','hum']))
               : c.type==='blogger'?(Math.random()<0.5?'selfie':'look')
               : pick(['look','stretch','scratch','hum']);
        if(c.idleK==='knit')c.idleT=rnd(1.6,2.4);
        if(c.idleK==='sigh'){c.idleT=0.8;c.squash=Math.max(c.squash,0.35);floater(c.x+10,c.y-52,'…','rgba(255,255,255,0.6)',12);}
        if(c.idleK==='phone'){c.idleT=rnd(1.4,2);A.sfx('mumble');}
        c.idleT= c.idleK==='hum'?0.1:rnd(0.7,1.1);
        if(c.idleK==='hum')floater(c.x+12,c.y-52,'♪','rgba(255,255,255,0.8)',12);
        if(c.idleK==='selfie'){sparkle(c.x+16,c.y-24,'#fff',3);A.sfx('photo');}
      }
    }
    /* kids point excitedly at the rat */
    if((c.type==='family'||c.type==='couple')&&seatedNow&&c.pointCd<=0){
      for(const r of G.rats)if(r.state!=='flee'&&dist(c.x,c.y,r.x,r.y)<240){
        c.pointCd=7; floater(c.x+14,c.y-58,'👉🐀!','#ffd93d',14); A.sfx('laugh'); break;
      }
    }
    /* grandma comforts nearby worried kids */
    if(c.type==='grandma'&&seatedNow&&c.candyCd<=0){
      for(const o of G.customers){
        if(o.type==='family'&&o.state==='waiting'&&o.mood!=='ok'&&dist(c.x,c.y,o.x,o.y)<180){
          c.candyCd=10; o.patience=Math.min(o.maxPat,o.patience+2.5);
          floater((c.x+o.x)/2,(c.y+o.y)/2-46,'🍬','#cda6e0',15);
          break;
        }
      }
    }
    /* blogger accidentally photographs a neighbor */
    if(c.type==='blogger'&&c.state==='waiting'&&c.snapCd<=0){
      c.snapCd=rnd(9,16);
      const near=G.customers.find(o=>o!==c&&(o.state==='waiting'||o.state==='eat')&&dist(c.x,c.y,o.x,o.y)<170);
      if(near&&Math.random()<0.5){
        sparkle(near.x,near.y-14,'#fff',4); A.sfx('photo');
        floater(near.x,near.y-58,'?','#fff',15);
        floater(c.x,c.y-58,'📷 oops','#ffe08a',12);
      }
    }
    // blink
    if(c.blinkP>0)c.blinkP-=dt;
    else{ c.blinkIn-=dt; if(c.blinkIn<=0){c.blinkP=0.12;c.blinkIn=rnd(1.8,4.8);} }
    // SPRINT 4: kids and ice cream — a love story with a sad ending
    if(c.type==='family'&&c.state==='walk'&&!c.iceDone&&Math.random()<dt*0.12){
      c.iceDone=true; spawnMess(c.x,clamp(c.y+26,240,520));
      floater(c.x,c.y-50,'🍦 oops!','#fff',15);
      addStory('A kid dropped their ice cream on the way in.',1);
    }
    if(c.def.vip&&(c.state==='waiting'||c.state==='eat')&&G.fires.length>0)G.mem.vipDuringFire=true;
    c.squash*=Math.pow(0.002,dt);
    // fire under their table? flee
    if((c.state==='waiting'||c.state==='sit'||c.state==='eat')&&c.table&&fireOn('table',c.table)){
      c.fireT=(c.fireT||0)+dt;
      if(c.fireT>2.5){ customerAngryLeave(c); addStory('A customer fled a burning table.',2); }
    }
  }

  /* aroma drifts between tables */
  if(Math.random()<dt*0.12){
    const eater=G.customers.find(c=>c.state==='eat');
    if(eater){
      const sniffer=G.customers.find(c=>c!==eater&&c.state==='waiting'&&dist(c.x,c.y,eater.x,eater.y)<220);
      if(sniffer){
        floater(lerp(eater.x,sniffer.x,0.4),lerp(eater.y,sniffer.y,0.4)-40,'~','rgba(255,217,61,0.7)',15);
        floater(sniffer.x,sniffer.y-56,'👃 mmm','rgba(255,255,255,0.8)',11);
      }
    }
  }
  /* neighbors chat — the room is alive */
  if(G.chatCd<=0){
    G.chatCd=7+rnd(0,7);
    const seated=G.customers.filter(c=>c.state==='waiting'||c.state==='eat'||c.state==='sit');
    outer: for(let a=0;a<seated.length;a++)for(let b=a+1;b<seated.length;b++){
      if(dist(seated[a].x,seated[a].y,seated[b].x,seated[b].y)<170){
        floater(seated[a].x+10,seated[a].y-56,'💬','#fff',13);
        setTimeout(()=>{ if(G&&!G.over&&!paused&&screen==='game')floater(seated[b].x-10,seated[b].y-56,'💬','#fff',13); },500);
        A.sfx('mumble');
        break outer;
      }
    }
  }

  /* stations */
  const cookMult=(G.boostT>0?1.25:1)*(G.blackout>0?0.45:1)*(1-G.smoke*0.35)*(G.morale>0?1.25:1)*(1+G.flow*0.1);
  for(const s of G.stations){
    s.wob*=Math.pow(0.001,dt);
    if(s.state==='cook'){
      const kind=Object.keys(FOODS).find(k=>FOODS[k].station===s.id);
      s.prog+=dt*cookMult/FOODS[kind].time;
      if(s.id==='drinks'){ // cold machine: bubbles & ice, never smoke
        if(Math.random()<dt*5&&parts.length<MAXP)
          parts.push({x:s.x+rnd(-10,10),y:596,vx:rnd(-4,4),vy:-24,g:-10,s:rnd(1.4,2.6),l:0,ml:rnd(0.4,0.7),c:'rgba(180,225,255,0.75)',shape:'c'});
        if(Math.random()<dt*2)sparkle(s.x+rnd(-14,14),580,'#e0f7ff',1);
      } else if(Math.random()<dt*3) smokePuff(s.x+rnd(-14,14),584,1);
      if(s.prog>=1){ s.prog=0; s.state='ready'; s.ready=kind; s.readyAge=0; s.wob=1; noteWear(s.id); A.sfx('pop'); sparkle(s.x,548,'#ffd93d',5); }
    }
    else if(s.state==='ready'&&s.ready&&s.ready!=='burnt'){
      s.readyAge+=dt;
      if(s.readyAge>12){
        s.ready='burnt'; s.wob=1; A.sfx('buzz');
        smokePuff(s.x,548,4);
        floater(s.x,530,'BURNT!','#ff8a5c',16);
        G.mem.burnRecent=G.t; earnSouv('charcoal');
        // CAUSAL: burnt food smolders. Bin it or it ignites.
        schedule(4.5,()=>{ if(s.ready==='burnt'&&!fireOn('station',s))startFire('station',s); },'The burnt food is smoldering...',s);
        addStory('You left food out too long. It became... charcoal.',1);
      }
    }
    else if(s.state==='fixing'){
      s.fixT-=dt;
      if(Math.random()<dt*8)sparkle(s.x+rnd(-20,20),610,'#ffd93d',1);
      if(s.fixT<=0){ s.state='idle'; s.wob=1; A.sfx('fix'); A.sfx('steam'); confetti(s.x,586,8); shake(1.4,0.08);
        puff(s.x,580,'rgba(240,248,255,0.85)',8,70,7,0.8);
        floater(s.x,556,'♪','#7cf2c0',18);
        G.money+=15; floater(s.x,585,'FIXED! +$15','#7cf2c0',16); noteGood(s.x,600);
        G.disasters&&addStory('You wrenched the '+s.label.toLowerCase()+' back to life.',1); }
    }
    else if(s.state==='broken'){
      if(Math.random()<dt*2)sparkle(s.x+rnd(-24,24),606,'#ffd24d',1);
      if(s.id==='drinks'){ if(Math.random()<dt*1.5&&parts.length<MAXP)parts.push({x:s.x+rnd(-14,14),y:590,vx:0,vy:34,g:70,s:2.6,l:0,ml:0.6,c:'rgba(180,225,255,0.8)',shape:'c'}); }
      else if(Math.random()<dt*1.5)smokePuff(s.x+rnd(-14,14),590,1);
    }
  }

  /* fires */
  for(let i=G.fires.length-1;i>=0;i--){
    const f=G.fires[i];
    f.age+=dt; f.size=Math.min(1,f.size+dt*0.15);
    f.spread-=dt;
    if(f.spread<=0){ f.spread=7+rnd(0,3); spreadFire(f); }
    if(Math.random()<dt*6)smokePuff(f.x+rnd(-10,10),f.y-16,1);
    if(f.ttype==='station'&&f.age>18&&f.ref.state!=='broken'){ f.ref.state='broken'; f.ref.ready=null; addStory('The fire wrecked the '+f.ref.label.toLowerCase()+'.',2); }
    // EMERGENT: a nearby puddle steams the fire down
    for(const pd of G.puddles){
      if(pd.s>0.4&&dist(f.x,f.y,pd.x,pd.y)<85){
        f.size-=dt*0.32; pd.s-=dt*0.07;
        if(Math.random()<dt*8)puff(f.x+rnd(-12,12),f.y-8,'rgba(230,240,250,0.7)',1,50,6,0.8);
        if(f.size<0.22){
          G.fires.splice(i,1);
          puff(f.x,f.y,'#e8f2fa',12,90,8,0.8); A.sfx('foam');
          floater(f.x,f.y-16,'STEAMED OUT!','#bfe4ff',17);
          addStory('The leak steamed a fire out. Pure luck.',3);
        }
        break;
      }
    }
  }
  // smoke rises with every flame and burnt plate; the whole kitchen feels it
  const smokeTarget=Math.min(1,G.fires.length*0.4+G.stations.filter(s=>s.ready==='burnt').length*0.12);
  G.smoke+=(smokeTarget-G.smoke)*Math.min(1,dt*(smokeTarget>G.smoke?0.8:0.35));

  /* puddles grow (unless evaporating), messes linger */
  for(let i=G.puddles.length-1;i>=0;i--){
    const pd=G.puddles[i]; pd.t+=dt;
    if(pd.t<2.2) pd.s=Math.min(1,pd.s+dt*0.5);
    if(pd.t>2.5&&pd.s<=0.05){G.puddles.splice(i,1);continue;} // evaporated (never cull newborns)
  }
  for(const m of G.messes) m.s=Math.min(1,m.s+dt*0.8);

  /* rats */
  for(let i=G.rats.length-1;i>=0;i--){
    const r=G.rats[i]; r.t+=dt;
    if(r.state==='ride'){ // ??? (you've never seen this before)
      if(!G.duck){ G.rats.splice(i,1); continue; }
      r.x=G.duck.x-2; r.y=G.duck.y-16; r.dir=1;
      continue;
    }
    if(r.state==='ally'){
      if(r.act){ r.actT-=dt; if(r.actT<=0){r.act=null;r.spin=0;} continue; }
      r.alT-=dt;
      for(const o of G.rats)if(o!==r&&!o.ally&&o.state!=='flee'&&dist(r.x,r.y,o.x,o.y)<170){
        o.state='flee'; o.flee=0; o.carry=null; A.sfx('squeak');
        floater(o.x,o.y-24,'shoo!','#b78bff',13);
        if(!G.mem.allyShoo){G.mem.allyShoo=true;addStory('Kiki chased off a rival rat. Loyalty.',3);}
      }
      let tx,ty;
      if(!r.chore&&r.alT<=0){
        const tb=G.tables.find(t=>t.plates>0);
        if(tb&&G.bin.fill<G.bin.cap&&G.bin.emptying<=0)r.chore={phase:'get',tb};
        else r.alT=6;
      }
      if(r.chore){
        if(r.chore.phase==='get'){ tx=r.chore.tb.x; ty=r.chore.tb.y+10;
          if(dist(r.x,r.y,tx,ty)<16){ if(r.chore.tb.plates>0){r.chore.tb.plates=0;r.chore.tb.sparkT=1;r.carryPlate=true;} r.chore.phase='drop'; } }
        else { tx=G.bin.x; ty=G.bin.y-6;
          if(dist(r.x,r.y,tx,ty)<22){
            if(r.carryPlate&&G.bin.fill<G.bin.cap){G.bin.fill++;G.money+=3;floater(G.bin.x,G.bin.y-46,'🐀 +$3','#b78bff',13);sparkle(G.bin.x,G.bin.y-24,'#b78bff',4);}
            r.carryPlate=false; r.chore=null; r.alT=rnd(16,26);
          } }
      } else { tx=240+Math.sin(r.t*0.6)*140; ty=470+Math.cos(r.t*0.4)*40; }
      const dd=Math.max(1,dist(r.x,r.y,tx,ty));
      r.x+=(tx-r.x)/dd*Math.min(dd,120*dt); r.y+=(ty-r.y)/dd*Math.min(dd,120*dt);
      r.dir=tx>r.x?1:-1;
      if(Math.random()<dt*0.12)heartPop(r.x,r.y-18,1);
      continue;
    }
    if((r.state==='hunt'||r.state==='flee')&&!r.act&&G.duck&&!G.duck.rider&&dist(r.x,r.y,G.duck.x,G.duck.y)<55){
      r.state='ride'; r.carry=null; r.spin=0;
      G.duck.rider=r; G.duck.vx=72;
      floater(r.x,r.y-30,'??!','#fff',20);
      floater(G.duck.x,G.duck.y+16,'...quack.','#ffd93d',13);
      crowdReact(G.duck.x,G.duck.y,'laugh',320);
      G.mem.duckRide=true; earnSouv('ticket');
      addStory('A rat climbed onto the duck and simply... rode away.',5);
      A.sfx('quack'); A.sfx('squee');
      continue;
    }
    if(r.state==='stun'){
      r.stunT-=dt;
      if(Math.random()<dt*6)sparkle(r.x+rnd(-10,10),r.y-18,'#ffd93d',1);
      if(r.stunT<=0)r.state='hunt';
    }
    else if(r.state==='nibble'){
      r.nibT-=dt;
      if(Math.random()<dt*5)puff(r.x,r.y+6,'#c98a4b',1,40,3,0.4);
      if(r.nibT<=0){
        if(r.mess){const mi=G.messes.indexOf(r.mess); if(mi>=0)G.messes.splice(mi,1); r.mess=null;}
        r.state='flee'; r.flee=0;
        if(Math.random()<0.4)addStory('A rat cleaned up the kids\u2019 mess. Gross, but helpful?',2);
      }
    }
    else if(r.state==='hunt'){
      // PERSONALITY: acts pause everything — the rat is performing
      if(r.act){
        r.actT-=dt;
        if(r.act==='wiggle')r.spin=Math.sin(perfT*26)*0.3;
        if(r.actT<=0){r.act=null;r.spin=0;}
        continue;
      }
      r.startleCd=Math.max(0,r.startleCd-dt);
      // startled by a close call with the player's hand
      if(pointer.down&&r.startleCd<=0&&dist(pointer.x,pointer.y,r.x,r.y)<70&&dist(pointer.x,pointer.y,r.x,r.y)>=40){
        r.act='startle'; r.actT=0.5; r.startleCd=3.5;
        floater(r.x,r.y-26,'!','#fff',18); A.sfx('squeak');
        continue;
      }
      // EMERGENT: rats slip on puddles too
      let slipped=false;
      for(const pd of G.puddles){
        if(pd.s>0.5&&dist(r.x,r.y,pd.x,pd.y)<28){
          r.state='stun'; r.stunT=2.2; slipped=true;
          A.sfx('slip'); puff(r.x,r.y,'#bfe4ff',5,60,4,0.4);
          floater(r.x,r.y-24,'SLIP!','#6ec6ff',15);
          if(Math.random()<0.5)addStory('A rat wiped out on the puddle. Karma.',2);
          break;
        }
      }
      if(slipped)continue;
      // primary: counter food; secondary: floor messes
      let tgt=null,td=1e9,ty=548,isMess=false;
      for(const s of G.stations){ if(s.ready&&s.ready!=='burnt'){ const d=dist(r.x,r.y,s.x,548); if(d<td){td=d;tgt=s;isMess=false;ty=548;} } }
      if(!tgt) for(const m of G.messes){ const d=dist(r.x,r.y,m.x,m.y); if(d<td){td=d;tgt=m;isMess=true;ty=m.y;} }
      if(tgt){
        const tx=tgt.x, d=dist(r.x,r.y,tx,ty);
        // PERSONALITY: look both ways before committing the crime
        if(!isMess&&d<70&&!r.sneaked){
          r.sneaked=true; r.act='sneak'; r.actT=1.0; A.sfx('mumble');
          continue;
        }
        r.x+=(tx-r.x)/d*130*dt; r.y+=(ty-r.y)/d*130*dt;
        r.dir=tx>r.x?1:-1;
        if(d<16){
          if(isMess){ r.state='nibble'; r.nibT=1.4; r.mess=tgt; }
          else{
            r.carry=tgt.ready; tgt.ready=null; tgt.state='idle'; r.state='flee'; r.flee=0;
            G.mem.ratFed=true; G.mem.stolen=(G.mem.stolen||0)+1;
            r.act='wiggle'; r.actT=0.5; A.sfx('squee');
            crowdReact(r.x,r.y,'gasp');
            earnSouv('stolenBurger');
            if(G.inspector){G.mem.ratDuringInspection=true; addStory('A rat stole food DURING the health inspection.',4);}
            floater(r.x,r.y-24,'STOLEN!','#ff8a8a',18); A.sfx('squeak');
            addStory('A rat stole the '+r.carry+' right off the counter!',3);
            // customers who watched it happen are horrified
            for(const c of G.customers){
              if((c.state==='waiting'||c.state==='queue')&&dist(c.x,c.y,r.x,r.y)<190){
                c.patience=Math.max(1,c.patience-c.maxPat*0.12);
                floater(c.x,c.y-58,'EW!','#8d99ae',14);
              }
            }
            G.disasters++;
          }
        }
      } else {
        r.x+=Math.cos(r.t*1.4)*60*dt+r.dir*22*dt; r.y+=Math.sin(r.t*2.2)*40*dt;
        r.y=clamp(r.y,240,530);
        if(r.t>11){ r.state='flee'; r.flee=0; }
      }
    } else { // flee
      r.flee+=dt;
      if(r.act){
        r.actT-=dt;
        if(r.act==='guilty'){ r.x+=r.dir*-40*dt; if(r.actT<=0){r.act=null;} }
        else if(r.act==='trip'){ r.spin+=dt*16; r.x+=r.dir*-70*dt; if(Math.random()<dt*10)puff(r.x,r.y+8,'#d9c9a8',1,40,3,0.35); }
        if(r.act==='wave'&&Math.random()<dt*4)sparkle(r.x,r.y-22,'#ffd93d',1);
        if(r.actT<=0){
          if(r.act==='trip'&&r.carry){ // dropped it... and now it's confused
            spawnMess(clamp(r.x,60,420),clamp(r.y,240,520));
            r.carry=null; r.act='confused'; r.actT=0.7; r.spin=0;
            floater(r.x,r.y-26,'?','#fff',20);
            addStory('The rat tripped, dropped the loot, and just... stared at it.',2);
            crowdReact(r.x,r.y,'laugh');
          } else if(r.act==='wave'){ G.rats.splice(i,1); continue; }
          else { r.act=null; r.spin=0; }
        }
        continue;
      }
      // PERSONALITY: occasionally trips over its own feet
      if(!r.tripped&&r.flee>0.4&&Math.random()<dt*0.55){
        r.tripped=true; r.act='trip'; r.actT=0.55; A.sfx('squeak');
        if(!r.carry&&Math.random()<0.6)crowdReact(r.x,r.y,'laugh');
      }
      // RARE GEM: a pigeon mugs the mugger
      else if(r.carry&&!r.mugged&&G.birds.length===0&&r.flee>0.3&&Math.random()<dt*0.3){
        r.mugged=true;
        G.birds.push({x:r.x+rnd(-30,30),y:-24,state:'dive',target:r,carry:null,flap:0});
        A.sfx('chirp');
      }
      // PERSONALITY: waves goodbye at the exit
      else if(!r.waved&&(r.x<14||r.x>W-14)){
        r.waved=true; r.act='wave'; r.actT=0.9;
        floater(r.x,r.y-30,'byeee!','#ffd93d',15); A.sfx('squee');
        continue;
      }
      r.x+=r.dir*-260*dt;
      if(r.x<-40||r.x>W+40) G.rats.splice(i,1);
    }
    // SPRINT 4: grandma's handbag is always loaded
    if(r.state!=='flee'){
      for(const c of G.customers){
        if(!r.ally&&c.type==='grandma'&&(c.state==='sit'||c.state==='waiting'||c.state==='eat')&&(c.bonkCd||0)<=0&&!r.carry&&dist(c.x,c.y,r.x,r.y)<75&&Math.random()<0.12){
          // ...but sometimes, grandma just feeds it.
          c.bonkCd=8; c.squash=0.7;
          floater(lerp(c.x,r.x,0.5),lerp(c.y,r.y,0.5)-30,'🍪','#cda6e0',16);
          r.act='wiggle'; r.actT=0.7; r.state='flee'; r.flee=0; r.tripped=true; r.mugged=true;
          heartPop(r.x,r.y-16,3); A.sfx('squee');
          G.mem.ratFriend=true;
          addStory('Grandma fed the rat a cookie. It left politely.',5);
          crowdReact(c.x,c.y,'laugh',260);
          break;
        }
        if(!r.ally&&c.type==='grandma'&&(c.state==='sit'||c.state==='waiting'||c.state==='eat')&&(c.bonkCd||0)<=0&&dist(c.x,c.y,r.x,r.y)<75){
          c.bonkCd=5; c.squash=1;
          G.mem.grandmaBonk=true; earnSouv('handbag');
          r.act='guilty'; r.actT=0.55; // caught red-pawed
          floater(r.x,r.y-30,'😳','#fff',16);
          scareRat(r);
          floater(c.x,c.y-64,'BONK!','#cda6e0',20);
          sparkle(r.x,r.y-10,'#ffd93d',6);
          A.sfx('thud');
          crowdReact(c.x,c.y,'clap',260);
          addStory('Grandma dispatched a rat with her handbag.',3);
          break;
        }
      }
      if(r.state==='hunt'&&r.t>4&&G.cats.length===0&&Math.random()<dt*0.07) spawnCat(r);
    }
  }
  /* a pigeon perches on the sign sometimes */
  if(!G.perch&&Math.random()<dt*0.012){ G.perch={t:0,dur:rnd(4,7)}; }
  if(G.perch){ G.perch.t+=dt; if(G.perch.t>G.perch.dur){ G.perch=null; puff(72,36,'#c9ced6',3,50,3,0.4); } }
  /* pigeons: nature's pickpockets */
  for(let i=G.birds.length-1;i>=0;i--){
    const b=G.birds[i]; b.flap+=dt*18;
    if(b.state==='dive'){
      const r=b.target;
      if(!r||!G.rats.includes(r)||!r.carry){ b.state='rise'; continue; }
      const d=dist(b.x,b.y,r.x,r.y-10);
      b.x+=(r.x-b.x)/d*380*dt; b.y+=(r.y-10-b.y)/d*380*dt;
      if(d<18){
        b.carry=r.carry; r.carry=null;
        b.state='rise';
        r.act='confused'; r.actT=0.8;
        floater(r.x,r.y-28,'?!','#fff',20);
        G.mem.pigeon=true; earnSouv('feather');
        addStory('A pigeon mugged the rat mid-escape. Crime doesn\u2019t pay.',4);
        crowdReact(b.x,b.y,'laugh',300);
        A.sfx('chirp');
      }
    } else {
      b.y-=300*dt; b.x+=Math.sin(b.flap*0.4)*40*dt;
      if(b.y<-40)G.birds.splice(i,1);
    }
  }
  /* the mystery duck: no reason, no effect, pure joy */
  if(G.duckAt>0&&!G.duck&&G.t>G.duckAt&&G.beat!=='crisis'){
    G.duck={x:-22,y:rnd(460,520),vx:26,bob:0};
  }
  if(G.duck){
    const dk=G.duck; dk.bob+=dt*9;
    dk.x+=dk.vx*dt; dk.y+=Math.sin(dk.bob*0.5)*6*dt;
    if(!G.duckSeen&&dk.x>90){ G.duckSeen=true; crowdReact(dk.x,dk.y,'point',260); }
    if(dk.x>W+24){
      if(dk.rider)addStory('The duck and its rat exited together, forever.',4);
      else{ earnSouv('breadcrumb'); addStory('A duck strolled through the diner. Nobody knows why.',3); }
      G.duck=null; G.duckAt=-1;
    }
  }
  /* stray cats */
  for(let i=G.cats.length-1;i>=0;i--){
    const cat=G.cats[i]; cat.t+=dt;
    if(cat.state==='chase'){
      let tr=null,td=1e9;
      for(const r of G.rats)if(!r.ally&&r.state!=='flee'){const d=dist(cat.x,cat.y,r.x,r.y);if(d<td){td=d;tr=r;}}
      if(tr){
        cat.dir=tr.x>cat.x?1:-1;
        cat.x+=(tr.x-cat.x)/td*310*dt; cat.y+=(tr.y-cat.y)/td*310*dt;
        if(td<80){
          tr.state='flee'; tr.flee=0; tr.carry=null;
          G.mem.catHero=true; earnSouv('whisker');
          floater(tr.x,tr.y-26,'!!','#ff9d5c',18); A.sfx('squeak');
          floater(cat.x,cat.y-26,'MEOW!','#ff9d5c',15);
          crowdReact(cat.x,cat.y,'laugh',280);
          addStory('A stray cat burst in and chased the rat out.',3);
          cat.state='exit';
        }
      } else cat.state='exit';
      if(cat.t>8)cat.state='exit';
    } else {
      cat.x+=cat.dir*300*dt;
      if(cat.x<-40||cat.x>W+40)G.cats.splice(i,1);
    }
  }

  /* bin */
  const b=G.bin;
  if(b.emptying>0){
    b.emptying-=dt;
    if(b.emptying<=0){ b.fill=0; b.overT=0; sparkle(b.x,b.y-20,'#bff0ff',8); A.sfx('ding'); floater(b.x,b.y-56,'CLEAN!','#7cf2c0',16); }
  }
  if(b.fill>=b.cap && b.emptying<=0){
    b.overT+=dt;
    if(b.overT>9){ b.overT=0; spawnRat(); addStory('The overflowing trash attracted a rat.',2); banner('RAT!!','#8d99ae'); }
  }

  /* tools spring back */
  for(const tl of G.tools){
    if(!tl.drag && tl.retT<1){
      tl.retT=Math.min(1,tl.retT+dt*3);
      const k=eo(tl.retT);
      tl.x=lerp(tl.rx,tl.hx,k); tl.y=lerp(tl.ry,tl.hy,k);
    }
  }

  /* inspector — walks, looks, remembers */
  if(G.inspector){
    const ins=G.inspector; ins.t+=dt;
    if(ins.noticeT>0){ins.noticeT-=dt;if(ins.noticeT<=0)ins.notice=null;}
    const notice=(icon,v)=>{ ins.viol+=v; ins.notice=icon; ins.noticeT=1.2; A.sfx('pop'); };
    if(ins.phase==='enter'){
      const w=ins.wp[0], d=dist(ins.x,ins.y,w.x,w.y);
      if(d>3){ ins.x+=(w.x-ins.x)/d*120*dt; ins.y+=(w.y-ins.y)/d*120*dt; }
      else { ins.phase='patrol'; ins.t=0; ins.dwell=1.8; }
    } else if(ins.phase==='patrol'){
      const w=ins.wp[ins.wi], d=dist(ins.x,ins.y,w.x,w.y);
      if(d>4){ ins.x+=(w.x-ins.x)/d*95*dt; ins.y+=(w.y-ins.y)/d*95*dt; }
      else {
        ins.dwell-=dt;
        if(ins.dwell<=0){
          // observe surroundings at this waypoint
          for(const f of G.fires) if(dist(ins.x,ins.y,f.x,f.y)<240){ notice('🔥',2); break; }
          for(const r of G.rats) if(!r.ally&&r.state!=='flee'&&dist(ins.x,ins.y,r.x,r.y)<220){ notice('🐀',2); break; }
          let dirt=0;
          for(const t of G.tables) if(t.plates>0&&dist(ins.x,ins.y,t.x,t.y)<170)dirt++;
          for(const m of G.messes) if(dist(ins.x,ins.y,m.x,m.y)<170)dirt++;
          for(const p of G.puddles) if(dist(ins.x,ins.y,p.x,p.y)<170)dirt++;
          if(dirt>0) notice('🍽',dirt);
          if(ins.wi===0){ // global checks once
            if(G.bin.fill>=G.bin.cap) notice('🗑',1);
            const broken=G.stations.filter(s=>s.state==='broken').length;
            if(broken) notice('⚙',broken);
          }
          ins.wi++;
          if(ins.wi>=ins.wp.length){
            ins.phase='verdict'; ins.t=0;
          } else ins.dwell=1.8;
        }
      }
    } else if(ins.phase==='verdict'){
      if(ins.t>0.8){
        const score=ins.viol-ins.good*2;
        if(score<=0){
          const sp$=MOD().id==='inspection'?225:150;
          G.money+=sp$; gainHeart(); unlockAch('inspect'); G.mem.spotless=true; earnSouv('badge');
          banner('SPOTLESS! +$'+sp$,'#7cd67c');
          addStory('The inspector found nothing. NOTHING. Legendary.',3);
          sparkle(ins.x,ins.y-40,'#7cf2c0',14);
        } else if(score<=2){
          G.money+=60; unlockAch('inspect');
          banner('INSPECTION PASSED +$60','#7cd67c');
          addStory('Passed a health inspection mid-service.',2);
        } else if(score<=5){
          loseHeart(1,ins.x,ins.y-50);
          banner('HEALTH VIOLATION!','#ff5a3c');
          addStory('The inspector logged '+ins.viol+' problems. Yikes.',3);
        } else {
          loseHeart(2,ins.x,ins.y-50);
          banner('SHUTDOWN WARNING!!','#ff5a3c');
          addStory('The inspector nearly shut you down on the spot.',3);
        }
        ins.phase='leave';
      }
    } else {
      const d=dist(ins.x,ins.y,DOOR.x,DOOR.y);
      if(d>3){ ins.x+=(DOOR.x-ins.x)/d*140*dt; ins.y+=(DOOR.y-ins.y)/d*140*dt; }
      else G.inspector=null;
    }
  }

  /* ambience */
  A.ambient(dt,
    G.customers.filter(c=>c.state==='waiting'||c.state==='eat'||c.state==='sit').length,
    G.customers.some(c=>c.type==='blogger'||c.type==='influencer'||c.type==='tourist'),
    G.stations.some(st=>st.state==='cook'));
  /* fx */
  updateParts(dt); updateFloaters(dt);

  /* survival achievements */
  if(G.t>180) unlockAch('three');
  if(G.t>300) unlockAch('five');

  /* contextual hints for first-timers */
  G.hint=null;
  if(!S.data.tut.cook && G.t>1){
    G.hint={x:G.stations[0].x,y:600,s:'TAP a machine to cook'};
  } else if(!S.data.tut.serve){
    const ready=G.stations.find(s=>s.ready&&s.ready!=='burnt');
    const waiting=G.customers.find(c=>c.state==='waiting');
    if(ready) G.hint={x:ready.x,y:540,s:'DRAG food to the customer'};
  } else if(!S.data.tut.plates){
    const t=G.tables.find(t=>t.plates>0);
    if(t) G.hint={x:t.x,y:t.y-10,s:'DRAG plates to the bin'};
  }
}

    cx.fillStyle=th.ink;cx.beginPath();cx.arc(5.6,-8.6,0.9,0,TAU);cx.fill();

    cx.fillStyle='#ffd93d';cx.beginPath();cx.arc(0,26,3,0,TAU);cx.fill();
    cx.restore();
  }
  if(S.data.theme==='space'){ // a porthole view of stars & a drifting planet

      cx.fillStyle='rgba(255,255,255,'+(0.4+0.5*Math.abs(Math.sin(perfT*1.4+i)))+')'; cx.fillRect(sx,sy,2,2); }
    cx.translate(400,74);cx.rotate(perfT*0.05);
    cx.fillStyle='#7de8ff';cx.beginPath();cx.arc(0,0,16,0,TAU);cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.6)';cx.lineWidth=2;cx.beginPath();cx.ellipse(0,0,26,7,-0.3,0,TAU);cx.stroke();

  if(S.data.theme==='candy'){ // an oversized lollipop by the door

    cx.fillStyle='#ff9ecb';cx.beginPath();cx.arc(0,-14,20,0,TAU);cx.fill();

      cx.fillStyle='#c96b3c'; rr(px-9,120,18,14,3);cx.fill();cx.lineWidth=2.6;cx.strokeStyle=th.ink;cx.stroke();
      cx.fillStyle='#5fae5f';
      cx.beginPath();cx.ellipse(px,112,7,10,-0.4,0,TAU);cx.fill();
      cx.beginPath();cx.ellipse(px+5,113,6,9,0.4,0,TAU);cx.fill();
      cx.beginPath();cx.ellipse(px-5,114,6,9,-0.8,0,TAU);cx.fill();cx.stroke();
      cx.restore();
    }
  }
  if(owned('jukebox')){

function drawFace(x,y,mood,s=1,t=0,blink=0){
  const ink=TH().ink;
  cx.save();cx.translate(x,y);cx.scale(s,s);
  cx.fillStyle=ink;
  const ry=Math.max(0.4,3*(1-blink)); // blinking eyes
  const eyes=(r=3)=>{cx.beginPath();cx.ellipse(-8,-3,r,Math.max(0.4,r*(1-blink)),0,0,TAU);cx.ellipse(8,-3,r,Math.max(0.4,r*(1-blink)),0,0,TAU);cx.fill();};
  if(mood==='happy'){
    eyes();
    cx.beginPath();cx.arc(0,3,6.5,0.15,Math.PI-0.15);cx.lineWidth=3;cx.strokeStyle=ink;cx.stroke();
  } else if(mood==='ok'){
    eyes();
    cx.beginPath();cx.moveTo(-5,6);cx.lineTo(5,6);cx.lineWidth=3;cx.strokeStyle=ink;cx.stroke();
  } else if(mood==='worried'){
    eyes(3.4);
    cx.beginPath();cx.arc(0,9,4.5,Math.PI+0.3,TAU-0.3);cx.lineWidth=3;cx.strokeStyle=ink;cx.stroke();
    cx.fillStyle='#6ec6ff';cx.beginPath();cx.ellipse(13,-8+Math.sin(t*8)*2,3,4.5,0.3,0,TAU);cx.fill();
  } else if(mood==='angry'){
    cx.lineWidth=3;cx.strokeStyle=ink;
    cx.beginPath();cx.moveTo(-12,-9);cx.lineTo(-4,-5);cx.moveTo(12,-9);cx.lineTo(4,-5);cx.stroke();
    cx.fillStyle=ink;cx.beginPath();cx.ellipse(-8,-2,3,ry,0,0,TAU);cx.ellipse(8,-2,3,ry,0,0,TAU);cx.fill();
    cx.beginPath();cx.arc(0,10,5,Math.PI+0.3,TAU-0.3);cx.stroke();
  } else if(mood==='eat'){
    cx.beginPath();cx.arc(-8,-3,3,0,TAU);cx.arc(8,-3,3,0,TAU);cx.fill();
    const o=Math.abs(Math.sin(t*9));
    cx.beginPath();cx.ellipse(0,5,4.5,2+4*o,0,0,TAU);cx.fill();
  }
  cx.restore();
}

function drawCustomer(c){
  const bobY=Math.sin(c.bob)* (c.state==='walk'||c.state==='leave'||c.state==='leaveAngry'?3.4:1.6);
  const tremble=c.mood==='angry'?Math.sin(perfT*38+c.bob)*1.3:0;
  const x=c.x+tremble,y=c.y+bobY;
  // shadow
  cx.fillStyle='rgba(0,0,0,0.15)';cx.beginPath();cx.ellipse(c.x,c.y+30,20,6,0,0,TAU);cx.fill();
  // vip glow
  if(c.def.vip){ cx.fillStyle='rgba(255,210,77,0.25)';cx.beginPath();cx.arc(x,y,34,0,TAU);cx.fill(); }
  // squash & stretch on serve
  const sq=c.squash||0;
  cx.save();cx.translate(x,y);cx.scale(1+sq*0.28,1-sq*0.22);cx.translate(-x,-y);
  // body
  cx.fillStyle=c.def.color;
  rr(x-21,y-26,42,56,20); cx.fill();
  cx.lineWidth=4;cx.strokeStyle=TH().ink;cx.stroke();
  cx.fillStyle='rgba(255,255,255,0.3)'; rr(x-15,y-20,12,10,6); cx.fill();
  if(c.state==='sit'&&c.thinkT<0.4){ // a brief hand-raise before the order appears
    const k=1-c.thinkT/0.4;
    cx.save();cx.translate(x+16,y-6);cx.rotate(-0.9*eo(k));
    cx.fillStyle=c.def.color;cx.beginPath();cx.arc(0,-14*eo(k),4.4,0,TAU);cx.fill();cx.lineWidth=2.4;cx.strokeStyle=TH().ink;cx.stroke();
    cx.restore();
  }
  if(c.def.acc==='family'){
    cx.fillStyle=c.def.color; rr(x+14,y+2,26,30,13); cx.fill(); cx.stroke();
    const lg=Math.sin(perfT*7+c.bob)*4; // little legs, always swinging
    cx.lineWidth=3.4;cx.strokeStyle=TH().ink;
    cx.beginPath();cx.moveTo(x+21,y+31);cx.lineTo(x+20,y+37+lg);cx.moveTo(x+32,y+31);cx.lineTo(x+33,y+37-lg);cx.stroke();
    drawFace(x+27,y+12,c.mood==='angry'?'angry':(c.state==='eat'?'eat':'ok'),0.62,G.t,c.blinkP>0?1:0);
  }
  if(c.def.acc==='couple'){
    cx.fillStyle='#b8d8f4'; rr(x+15,y-16,34,46,17); cx.fill(); cx.stroke();
    drawFace(x+32,y-2,c.mood==='angry'?'angry':(c.state==='eat'?'eat':c.mood),0.82,G.t+1.7,c.blinkP>0?1:0);
    if(Math.sin(perfT*1.1+c.bob)>0.93)floater(x+16,y-44,'❤','rgba(244,169,184,0.9)',11);
  }
  /* idle poses */
  if(c.idleK==='stretch'){cx.save();cx.translate(x,y);cx.scale(1,1.06);cx.translate(-x,-y);}
  if(c.idleK==='watch'){
    cx.save();cx.translate(x-20,y-4);cx.rotate(-0.9);
    cx.fillStyle=c.def.color; rr(-3,-13,6,15,3);cx.fill();cx.lineWidth=2.4;cx.strokeStyle=TH().ink;cx.stroke();
    cx.fillStyle='#ffd93d';cx.beginPath();cx.arc(0,-15,4,0,TAU);cx.fill();cx.stroke();
    cx.restore();
  }
  if(c.idleK==='knit'){ // grandma's needles never rest
    cx.save();cx.translate(x,y+14);
    cx.strokeStyle='#8d6e63';cx.lineWidth=2;
    const k=Math.sin(perfT*9)*0.35;
    cx.beginPath();cx.moveTo(-8,2);cx.lineTo(-1,-6+k*4);cx.moveTo(8,2);cx.lineTo(1,-6-k*4);cx.stroke();
    cx.fillStyle='#f48fb1';cx.beginPath();cx.arc(-13,4,4.5,0,TAU);cx.fill();
    cx.lineWidth=1.6;cx.strokeStyle=TH().ink;cx.stroke();
    cx.restore();
  }
  if(c.idleK==='phone'){
    cx.save();cx.translate(x+18,y-12);cx.rotate(-0.2);
    cx.fillStyle='#37474f'; rr(-3,-8,7,13,2.5);cx.fill();
    cx.lineWidth=2;cx.strokeStyle=TH().ink;cx.stroke();cx.restore();
    if(Math.sin(perfT*5)>0.8)floater(x+24,y-34,'…','rgba(255,255,255,0.6)',10);
  }
  if(c.idleK==='scratch'){
    cx.save();cx.translate(x+16,y-26);cx.rotate(Math.sin(perfT*14)*0.3);
    cx.fillStyle=c.def.color; rr(-2.6,-9,5.2,11,2.6);cx.fill();cx.lineWidth=2.2;cx.strokeStyle=TH().ink;cx.stroke();
    cx.restore();
  }
  if(c.idleK==='stretch')cx.restore();
  const lookX=c.idleK==='look'?Math.sin(perfT*6)*2.4:0;
  drawFace(x+lookX,y-8,(c.state==='eat'||c.nibble>0)?'eat':c.mood,1,G.t*(1+G.panicSm),c.blinkP>0?1:0);
  drawAcc(c,x,y-8);
  if(c.state==='leave'&&c.waveT>0){ // waving goodbye
    cx.save();cx.translate(x+22,y-14);cx.rotate(Math.sin(perfT*13)*0.6);
    cx.fillStyle=c.def.color; cx.beginPath();cx.arc(0,-8,5,0,TAU);cx.fill();
    cx.lineWidth=2.6;cx.strokeStyle=TH().ink;cx.stroke();
    cx.restore();
  }
  cx.restore();
  // order bubble
  if(c.state==='waiting'){
    const by=y-58;
    const r=clamp(c.patience/c.maxPat,0,1);
    const col= r>0.55?'#7cd67c': r>0.28?'#ffd24d':'#ff5a5f';
    const pulse=r<0.28?1+Math.sin(G.t*10)*0.06:1;
    cx.save();cx.translate(x,by);cx.scale(pulse,pulse);
    cx.fillStyle='#fff'; cx.beginPath();cx.arc(0,0,22+(c.orders.length>1?6:0),0,TAU);cx.fill();

    cx.beginPath();cx.moveTo(-6,20);cx.lineTo(0,30);cx.lineTo(6,20);cx.fillStyle='#fff';cx.fill();
    if(c.orders.length===1) drawFood(c.orders[0],0,0,0.85);
    else { drawFood(c.orders[0],-11,0,0.6); drawFood(c.orders[1],11,0,0.6); }
    // they can see their machine is broken
    c.orders.forEach((f,oi)=>{
      const st=G.stations.find(s=>s.id===FOODS[f].station);
      if(st&&st.state==='broken'){
        const ox=c.orders.length===1?12:(oi===0?-2:20);
        txtO('✕',ox,-10,15,'#ff5a5f','#fff');
      }
    });
    // patience ring
    cx.lineWidth=5;cx.strokeStyle=col;
    cx.beginPath();cx.arc(0,0,27+(c.orders.length>1?6:0),-Math.PI/2,-Math.PI/2+TAU*r);cx.stroke();
    cx.restore();
  }
  if(c.state==='eat'&&c.photoT>0){
    txtO('📸',x+24,y-40,18,'#fff',TH().ink);
  }
  if(c.state==='leaveAngry'){
    cx.fillStyle='#ff4d6d'; txtO('!!',x,y-48,22,'#ff4d6d',TH().ink);
  }
}

function drawMenuEvents(dt){
  mEventIn-=dt;
  if(!mEvent&&mEventIn<=0){
    mEventIn=rnd(7,14);
    mEvent={kind:pick(['butterfly','wave','balloon','rain','bird']),t:0};
    if(mEvent.kind==='wave')kikiReact=1.4;
  }
  if(kikiReact>0)kikiReact-=dt;
  if(!mEvent)return;
  const e=mEvent; e.t+=dt;
  if(e.kind==='butterfly'){
    const k=Math.min(1,e.t/2.4);
    const bx=lerp(-20,kikiPos.x+2,eo(k))+Math.sin(e.t*7)*14*(1-k);
    const by=lerp(160,kikiPos.y-38,eo(k))+Math.cos(e.t*9)*10*(1-k);
    cx.fillStyle='#ff9bcb';
    const fl=Math.sin(e.t*20)*0.5;
    cx.save();cx.translate(bx,by);
    cx.beginPath();cx.ellipse(-3,0,4,6,fl,0,TAU);cx.ellipse(3,0,4,6,-fl,0,TAU);cx.fill();cx.restore();
    if(e.t>3.4){ // lands on the nose... achoo
      puff(kikiPos.x,kikiPos.y-20,'#fff',5,60,3,0.4);
      floater(kikiPos.x,kikiPos.y-46,'achoo!','#fff',14);
      A.sfx('squee'); mEvent=null;
    }
  } else if(e.kind==='balloon'){
    const by=560-e.t*46, bx=390+Math.sin(e.t*2)*14;
    cx.fillStyle='#ff6b6b';cx.beginPath();cx.ellipse(bx,by,13,16,0,0,TAU);cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.6)';cx.lineWidth=1.4;
    cx.beginPath();cx.moveTo(bx,by+16);cx.quadraticCurveTo(bx+4,by+34,bx,by+46);cx.stroke();
    if(by<-30)mEvent=null;
  } else if(e.kind==='rain'){
    for(let i=0;i<26;i++){
      const rx=(i*53+e.t*260)%W, ry=(i*97+e.t*430)%400;
      cx.strokeStyle='rgba(160,210,255,0.5)';cx.lineWidth=1.6;
      cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(rx-3,ry+11);cx.stroke();
    }
    if(e.t>3.6)mEvent=null;
  } else if(e.kind==='bird'){
    const k=Math.min(1,e.t/1.6);
    const bx=lerp(W+20,kikiPos.x+56,eo(k)), by=lerp(120,kikiPos.y+10,eo(k));
    cx.save();cx.translate(bx,by);cx.scale(-1,1);
    cx.lineWidth=2;cx.strokeStyle='#33345c';cx.fillStyle='#9aa7b5';
    cx.beginPath();cx.ellipse(0,0,7,5,0,0,TAU);cx.fill();cx.stroke();
    cx.beginPath();cx.arc(5,-4,3,0,TAU);cx.fill();cx.stroke();
    cx.fillStyle='#ffb347';cx.beginPath();cx.moveTo(8,-4);cx.lineTo(11,-3.4);cx.lineTo(8,-2.6);cx.closePath();cx.fill();
    cx.restore();
    if(e.t>5){puff(bx,by,'#c9ced6',3,50,3,0.4);mEvent=null;}
  } else if(e.kind==='wave'){ if(e.t>1.5)mEvent=null; }
  // (…and sometimes, someone golden drops by.)
  if(secretAt>0&&menuT>secretAt&&secretT<0)secretT=0;
  if(secretT>=0){
    secretT+=dt;
    const k=Math.min(1,secretT/3);
    const gx=kikiPos.x+60, gy=lerp(-60,kikiPos.y,eo(k));
    // tiny umbrella descent
    if(k<1){
      cx.fillStyle='#ff9bcb';cx.beginPath();cx.arc(gx,gy-44,18,Math.PI,0);cx.fill();
      cx.strokeStyle='#33345c';cx.lineWidth=2;cx.beginPath();cx.moveTo(gx,gy-44);cx.lineTo(gx,gy-26);cx.stroke();
    }
    drawKiki(gx,gy,1.1,k<1?'stand':'wave',true);
    if(Math.random()<0.4)sparkle(gx+rnd(-16,16),gy+rnd(-30,10),'#ffd93d',1);
    if(secretT>3&&secretT<3.06)drawHeart((kikiPos.x+gx)/2,kikiPos.y-46,8,'#ff6b8a');
    if(secretT>5.5){
      confetti(gx,gy-10,14);
      S.data.coins=(S.data.coins||0)+25;S.save();
      note('✨ ...did that just happen? (+25)','#ffd24d');
      secretT=-1;secretAt=-1;
    }
  }
