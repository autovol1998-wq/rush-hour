/* ============================ DRAMA ENGINE ============================ */
/* The director doesn't roll dice. It remembers, foreshadows, and composes.
   Beats: calm → build → crisis → aftermath → (escalate, repeat).
   Every event has a cause the player can learn to read. */

/* schedule(delay, fn, omenText, ref): foreshadow, then make it happen. */
function schedule(delay,fn,omenText,ref){
  G.plan.push({at:G.t+delay,fn,omen:omenText||null,ref:ref||null,born:G.t});
}
function pendingOmen(){
  let best=null;
  for(const p of G.plan) if(p.omen&&(!best||p.at<best.at)) best=p;
  return best;
}
/* the director's memory of this run */
function noteWear(id){ G.mem.wear[id]=(G.mem.wear[id]||0)+1; }
function maxWearStation(){
  let best=G.stations[0],bw=-1;
  for(const s of G.stations){ const w=G.mem.wear[s.id]||0; if(w>bw&&s.state!=='broken'){bw=w;best=s;} }
  return best;
}
function dirtLevel(){
  return G.tables.filter(t=>t.plates>0).length+G.messes.length+G.puddles.length
       +(G.bin.fill>=G.bin.cap?2:0);
}
function severeCount(){
  return G.fires.length+G.rats.filter(r=>!r.ally&&r.state!=='flee'&&r.state!=='parade').length
       +G.stations.filter(s=>s.state==='broken').length;
}

/* ---- crisis scenes: causally composed set-pieces ---- */
function composeCrisis(){
  const cyc=G.cycle, dirt=dirtLevel();
  let scene;
  if(G.mem.burnRecent&&G.t-G.mem.burnRecent<40) scene='meltdown';        // you burned food — the kitchen remembers
  else if(dirt>=3||G.mem.ratFed) scene='infestation';                    // filth invites teeth
  else if(G.puddles.length>0||G.mem.leakRecent) scene='flood';           // water finds the wiring
  else if(G.money>200&&!G.mem.paparazziDone) scene='paparazzi';          // success attracts cameras
  else scene=pick(['meltdown','flood','infestation'].concat(cyc>=2?['blackout']:[]));
  G.sceneName=scene;
  if(scene==='meltdown'){
    const s=maxWearStation();
    schedule(3.5,()=>{ if(s.state!=='broken')breakStation(s); },'The '+s.label.toLowerCase()+' is rattling ominously...',s);
    if(cyc>=1||G.t>110){
      schedule(9,()=>{ const o=G.stations.find(x=>x!==s&&!fireOn('station',x)); if(o)startFire('station',o); },'Something smells like it\u2019s scorching...');
    }
    addStory('The overworked kitchen began to give out.',1);
  }
  else if(scene==='infestation'){
    schedule(3,()=>spawnRat(),'Scratching sounds from the walls...');
    schedule(7.5,()=>spawnRat());
    if((G.mem.reported||MOD().id==='inspection')&&!G.inspector){
      schedule(13,()=>spawnInspector(),'A clipboard glints outside the window...');
      G.mem.reported=false;
    }
  }
  else if(scene==='flood'){
    schedule(3,()=>spawnPuddle(),'You hear dripping somewhere...');
    schedule(8,()=>spawnPuddle());
    if(cyc>=1||G.t>150){
      schedule(12.5,()=>startBlackout(),'The lights are flickering...'); // water + wiring
      addStory('The leak reached the wiring.',2);
    }
  }
  else if(scene==='blackout'){
    schedule(3.5,()=>startBlackout(),'The lights are flickering...');
    schedule(9,()=>{ const st=maxWearStation(); if(st&&st.state!=='broken')breakStation(st); },'Something just popped in the fuse box...');
    addStory('The power gave out mid-shift. Cooking by phone-light.',2);
  }
  else if(scene==='paparazzi'){
    G.mem.paparazziDone=true;
    schedule(3,()=>spawnCustomer('vip'),'Cameras are gathering outside...');
    schedule(4.5,()=>spawnCustomer('influencer'));
    addStory('A VIP arrived with an influencer in tow. No pressure.',2);
  }
}
/* a small causal beat for the BUILD phase */
function buildEvent(){
  const dirt=dirtLevel();
  /* PHASE F: disaster memory -- a diner with a pattern of leaks/fires "remembers" its bad pipes */
  if(!G.escalationUsed){
    G.escalationUsed=true;
    if((S.data.history.leakRuns||0)>=3&&G.cycle===0&&G.puddles.length===0){
      schedule(2.5,()=>spawnPuddle(),'The pipes groan the way they always do here...');
      addStory('The bad pipes strike again. This diner never learns.',2);
      return;
    }
    if((S.data.history.fireRuns||0)>=3&&G.cycle===0){
      const w=maxWearStation();
      schedule(3,()=>{if(w.state!=='broken')breakStation(w);},'That machine has never quite been the same...');
      addStory('The temperamental '+w.label.toLowerCase()+' acts up early, just like always.',2);
      return;
    }
  }
  if(G.mem.reported&&!G.inspector&&Math.random()<0.6){
    schedule(4,()=>spawnInspector(),'A clipboard glints outside the window...');
    G.mem.reported=false; return;
  }
  const w=maxWearStation();
  if((G.mem.wear[w.id]||0)>=(G.hardMode?3:runModEffect('wearThreshold',4))){ schedule(3.5,()=>{if(w.state!=='broken')breakStation(w);},'The '+w.label.toLowerCase()+' is rattling ominously...',w); G.mem.wear[w.id]=0; return; }
  if(dirt>=2&&G.rats.length===0){ schedule(3,()=>spawnRat(),'Scratching sounds from the walls...'); return; }
  if(MOD().id==='rainy'&&G.puddles.length<2){ schedule(3,()=>spawnPuddle(),'You hear dripping somewhere...'); return; }
  if(G.puddles.length===0&&MOD().id!=='sunny'&&Math.random()<0.5){ schedule(3,()=>spawnPuddle(),'You hear dripping somewhere...'); return; }
  // guarantee: if a run has gone through 1+ cycles without any leak ever appearing, bump the odds
  // so mopping stays a real part of the game instead of getting lost in the cascade priority
  if(G.cycle>=1&&G.puddles.length===0&&!G.mem.leakRecent&&MOD().id!=='sunny'&&Math.random()<0.75){
    schedule(3,()=>spawnPuddle(),'You hear dripping somewhere...'); return;
  }
  if(!G.box&&G.boostT<=0){ schedule(3,()=>spawnBox(),'A delivery van is backing up outside...'); return; }
  if(!G.treat&&(G.t-(G.lastTreatAt||-999))>50&&Math.random()<0.3){ G.lastTreatAt=G.t; schedule(2,()=>spawnTreat(),'Kiki is up to something near the pantry...'); return; }
  schedule(3,()=>spawnCustomer('critic'),'Someone with a notepad is reading the menu outside...');
}

function director(dt){
  const t=G.t;
  // scheduled lunch/dinner rushes removed -- rushes now come from random SURVIVAL_EVENTS

  /* ---- run the plan (frozen during a Last Stand — pure showdown) ---- */
  if(G.lastStand>0){ for(const p of G.plan)p.at+=dt; }
  for(let i=G.plan.length-1;i>=0;i--){
    const p=G.plan[i];
    if(p.ref)p.ref.wob=Math.max(p.ref.wob,0.18); // the object itself trembles
    if(G.t>=p.at){ G.plan.splice(i,1); try{p.fn();}catch(e){} }
  }

  /* ---- dramatic beats ---- */
  G.beatT+=dt;
  const mercy=G.panicSm>0.75; // more interesting, never just harder
  if(G.beat==='calm'){
    if(t>(S.data.runs===0?38:20)){ G.beat='build'; G.beatT=0; } // first-ever run gets a longer runway to learn the loop
  } else if(G.beat==='build'){
    if(G.beatT>2&&!G.builtEvent&&!mercy){
      G.builtEvent=true;
      if(S.data.runs===0&&!G.firstRunEventSkipped){ G.firstRunEventSkipped=true; note('👀 Kiki is watching closely tonight.','#b78bff'); }
      else buildEvent();
    }
    const buildLen=15-Math.min(6,G.cycle*1.5);
    if(G.beatT>buildLen&&!mercy){ G.beat='crisis'; G.beatT=0; G.crisisLoss=0; G.builtEvent=false; composeCrisis(); }
  } else if(G.beat==='crisis'){
    const resolved=severeCount()===0&&G.plan.length===0&&G.beatT>10;
    if(resolved||G.beatT>32){
      const clean=resolved&&G.crisisLoss===0;
      G.beat='aftermath'; G.beatT=0;
      if(clean){
        G.kindness=true; // survived clean — the director rewards nerve
        addStory('You held the line through the whole crisis.',2);
        confetti(240,470,16); crowdReact(240,400,'clap',400);
        note('🎉 WE SURVIVED!','#7cf2c0');
        for(const st of G.stations)st.wob=1; // the kitchen does a little hop
        G.chefWipe=1.6; // and the chef wipes their forehead, dramatically
        A.sfx('cheer');
      }
    }
  } else if(G.beat==='aftermath'){
    if(G.kindness&&G.beatT>3){ G.kindness=false;
      if(!G.box)schedule(2,()=>spawnBox(),'A delivery van is backing up outside...');
    }
    if(G.beatT>13){ G.beat='build'; G.beatT=0; G.cycle++; }
  }

  /* ---- customer spawning paced by beat ---- */
  G.spawnT-=dt;
  const baseIv={calm:7.2,build:6.8,crisis:5.6,aftermath:9.5}[G.beat]; // calm tightened -- players feel the loop sooner
  const interval=Math.max(2.8,(baseIv-G.cycle*0.5)*(1-G.flow*0.16)*evtMod('spawnInterval',1)*runModEffect('spawnInterval',1)*(G.hardMode?0.85:1)); // floor lowered: late-game stays genuinely demanding
  if(G.spawnT<=0){
    G.spawnT=interval*rnd(0.85,1.15);
    spawnCustomer();
  }

  /* hidden panic — the restaurant's heartbeat */
  const urgent=G.customers.filter(c=>(c.state==='waiting'||c.state==='queue')&&c.patience/c.maxPat<0.34).length;
  const queueN=G.customers.filter(c=>c.state==='queue').length;
  const plates=G.tables.filter(t=>t.plates>0).length;
  const broken=G.stations.filter(s=>s.state==='broken').length;
  let p= queueN*0.07 + urgent*0.13 + G.fires.length*0.28 + G.rats.filter(r=>!r.ally).length*0.13
       + broken*0.11 + G.puddles.length*0.05 + (G.bin.fill>=G.bin.cap?0.14:0)
       + Math.min(3,plates)*0.07 + (G.box?0.09:0)
       + (G.blackout>0?0.2:0) + Math.min(0.22,t/700)
       + G.smoke*0.15 + G.messes.length*0.06 + (G.viralT>0?0.12:0) + Math.min(0.1,G.badReviews*0.02);
  if(G.lastStand>0)p=Math.max(p,0.9); // the finale plays at full volume
  G.panic=clamp(p,0,1);
  G.panicSm+=(G.panic-G.panicSm)*Math.min(1,dt*1.4*evtMod('panicRate',1)); // cozy events let panic rise slower
}

/* ============================ UPDATE ============================ */
function updateGame(dt){
  if(G.over){ G.endT+=dt; updateParts(dt); updateFloaters(dt); return; }
  const anim=1+G.panicSm*0.5; // everything gets more frantic
  G.t+=dt;
  if(G.serviceFlash>0)G.serviceFlash=Math.max(0,G.serviceFlash-dt*1.8);
  if(G.goalPingCd>0)G.goalPingCd=Math.max(0,G.goalPingCd-dt);
  updateSpecialEvent(dt);
  director(dt);
  updateSurvivalEvents(dt);
  seatCustomers();

  // combo timer
  if(G.comboT>0){ G.comboT-=dt; if(G.comboT<=0)G.combo=0; }
  if(G.boostT>0)G.boostT-=dt;
  if(G.blackout>0)G.blackout-=dt;
  if(G.powerFlickerT>0) G.powerFlickerT = Math.max(0, G.powerFlickerT - dt);
  if(G.viralT>0)G.viralT-=dt;
  if(G.morale>0)G.morale-=dt;
  if(G.freshCd>0)G.freshCd-=dt;
  if(G.reactCd>0)G.reactCd-=dt;
  if(G.lineJamCd>0)G.lineJamCd-=dt;
  if(G.dirtyRatCd>0)G.dirtyRatCd-=dt;
  if(G.pressureTipCd>0)G.pressureTipCd-=dt;
  if(G.kikiToastCd>0)G.kikiToastCd-=dt;
  G.chatCd-=dt;
  if(G.calmPulse>0){ G.calmPulse+=dt*1.6; if(G.calmPulse>1)G.calmPulse=0; }
  if(G.panicSm>0.55)G.wasPanicked=true; // (panicRate applied where panic accumulates, see below)
  G.flow=Math.max(0,G.flow-dt*0.055); // faster decay -- keeping flow up requires steady work, feels earned
  G.glow=Math.max(G.glow-dt*0.25,G.flow*0.45); // success is visible
  if(G.flow>0.6&&Math.random()<dt*3&&parts.length<MAXP)
    parts.push({x:rnd(30,450),y:rnd(200,520),vx:rnd(-6,6),vy:rnd(-26,-14),g:-4,s:rnd(1.6,3),l:0,ml:rnd(0.8,1.4),c:'rgba(255,220,130,0.55)',shape:'c'});

  // near-miss heartbeat when someone is about to snap -- a VIP in the red zone gets a faster, more urgent pulse
  const criticalVip=G.customers.some(c=>c.def.vip&&c.state==='waiting'&&c.patience/c.maxPat<0.3);
  const critical=criticalVip||G.customers.some(c=>c.state==='waiting'&&c.patience/c.maxPat<0.15);
  G.gray=(G.gray||0)+((critical?0.14:0)-(G.gray||0))*Math.min(1,dt*(critical?1.2:6));
  G.hbT=(G.hbT||0)-dt;
  if(critical&&G.hbT<=0){ G.hbT=criticalVip?0.45:0.85; A.sfx('beat'); }
  /* LAST STAND: one heart left — the movie's third act */
  if(G.hearts===1&&!G.lastStandUsed&&G.lastStand<=0){
    G.lastStandUsed=true; G.lastStand=25;
    banner('⚡ LAST STAND ⚡','#ffd24d'); shake(6,0.4); A.sfx('bell');
    addStory('Down to the last heart. Everything on the line.',3);
  }
  if(G.lastStand>0){
    G.lastStand-=dt;
    if(G.hearts>1){ G.lastStand=0; } // rescued yourself early — stand ends
    else if(G.lastStand<=0){
      if(severeCount()===0){
        G.hearts=Math.min(5,G.hearts+2); G.miracle=true; earnSouv('medal');
        G.glow=1;
        banner('✨ MIRACLE RECOVERY! ✨','#7cf2c0');
        addStory('Against everything, you pulled the diner back from the dead.',5);
        heartPop(240,400,12); sparkle(240,400,'#7cf2c0',16); A.sfx('achieve');
        confetti(160,360,16); confetti(320,360,16); crowdReact(240,380,'clap',500);
        G.panicSm*=0.5;
      } else G.lastStand=6; // the showdown continues until it's clean — or over
    }
  }
  /* COMEBACK: clawed back from chaos to a spotless floor */
  if(G.wasPanicked&&G.freshCd<=0&&G.t>50){
    const clean= G.fires.length===0&&G.rats.length===0&&G.puddles.length===0&&G.messes.length===0
              && !G.tables.some(t=>t.plates>0)&&G.bin.fill<G.bin.cap
              && !G.stations.some(s=>s.state==='broken'||s.ready==='burnt'||s.ready==='melted');
    if(clean){
      G.wasPanicked=false; G.freshCd=60;
      G.money+=75; gainHeart(); G.panicSm*=0.4;
      banner('✨ FRESH START! +$75 ✨','#7cf2c0');
      addStory('You dragged the diner back from the brink. Spotless.',3);
      for(const t of G.tables)sparkle(t.x,t.y-20,'#bff0ff',6);
      confetti(240,300,18); crowdReact(240,350,'clap',400);
      A.sfx('achieve');
    }
  }

  /* DAY ROLLOVER: survive to closing time and the diner refuses to close */
  // day rollover / closing time removed -- endless survival now
  /* customers */
  const fireFear=G.fires.length>0?1.5:1;
  for(let i=G.customers.length-1;i>=0;i--){
    const c=G.customers[i];
    c.bob+=dt*6*anim;
    const spd=150*anim;
    if(c.state==='leave'&&c.waveT>0){ c.waveT-=dt; }
    else if(c.state==='queue'||c.state==='walk'||c.state==='leave'||c.state==='leaveAngry'){
      const d=dist(c.x,c.y,c.tx,c.ty);
      if(d>3){
        c.x+=(c.tx-c.x)/d*Math.min(d,spd*dt);
        c.y+=(c.ty-c.y)/d*Math.min(d,spd*dt);
        // slipping on puddles
        if(c.slipCd<=0) for(const pd of G.puddles){
          if(pd.s>0.6 && dist(c.x,c.y,pd.x,pd.y)<34){
            c.slipCd=3; c.patience=Math.max(1,c.patience-4); c.mood='angry';
            floater(c.x,c.y-46,pick(['WHOA!','HEY!','MY SHOES!']),'#6ec6ff',17); A.sfx('slip');
            if(Math.random()<0.25){ floater(c.x,c.y-66,'🥤 nice catch!','#7cf2c0',13); crowdReact(c.x,c.y,'clap',180); }
            else crowdReact(c.x,c.y,Math.random()<0.5?'laugh':'gasp',170);
            puff(c.x,c.y+10,'#bfe4ff',6,70,4,0.4);
            if(Math.random()<0.3)addStory('A customer slipped on the leak.',1);
            break;
          }
        }
      } else if(c.state==='walk'){ c.state='sit'; c.x=c.tx;c.y=c.ty; }
      else if(c.state==='leave'||c.state==='leaveAngry'){ if(d<=3){ G.customers.splice(i,1); continue; } }
    }
    c.slipCd=Math.max(0,c.slipCd-dt);
    if(c.settleT>0){ c.settleT=Math.max(0,c.settleT-dt);
      if(c.settleT<=0&&c.state==='waiting'){ floater(c.x,c.y-56,'!','#ffd93d',15); c.idleK='watch'; c.idleT=0.5; } // "okay, I'm ready to order now"
    }
    if(c.state==='sigh'){ c.sighT-=dt; if(c.sighT<=0)customerAngryLeave(c); }
    if(c.state==='sit'){
      c.thinkT-=dt*anim;
      if(c.thinkT<=0){
        c.state='waiting'; c.orderT=0; A.sfx('pop');
        c.settleT=rnd(2.5,3.5); // settling in -- but not a free pass; the kitchen should be moving
        c.idleK='look'; c.idleT=0.6; // a little "just got comfortable" glance
      }
    }
    if(c.state==='queue'||c.state==='waiting'){
      /* emotional ecosystem: patience drain is shaped by everything nearby.
         Recomputed a few times a second per customer (not every frame) -- the
         crowd doesn't teleport between frames, so this is imperceptibly stale
         and far cheaper during a packed, chaotic house. */
      c.modT=(c.modT||0)-dt;
      if(c.modT<=0){
        c.modT=0.12;
        let mod=(c.state==='queue'?0.82:1)*fireFear; // queue: tables matter -- clean them -- clean tables, don't stall // blackout is atmosphere now, not a patience penalty
        mod*=1+G.smoke*0.35;                       // smoke frays nerves
        if(G.viralT>0)mod*=1.25;                   // bad press in everyone's feed
        for(const o of G.customers){
          if(o===c)continue;
          const d=dist(c.x,c.y,o.x,o.y);
          if(d<150){
            if(o.mood==='angry'&&(o.state==='waiting'||o.state==='leaveAngry'))mod+=0.3; // anger spreads
            else if(o.state==='eat'&&o.mood==='happy')mod-=0.15;                          // contentment soothes
            if(o.type==='grandma'&&(o.state==='waiting'||o.state==='eat'||o.state==='sit'))mod-=0.25; // grandma calms everyone
          }
        }
        for(const r of G.rats) if(!r.ally&&r.state!=='flee'&&r.state!=='parade'&&dist(c.x,c.y,r.x,r.y)<150){mod+=0.45;break;} // ew ew ew
        if(c.type==='biz'&&(G.fires.length>0||G.rats.length>0))mod*=1.8; // businessmen do not wait around
        if(c.state==='waiting'&&c.orders.some(f=>{const st=G.stations.find(s=>s.id===FOODS[f].station);return st&&st.state==='broken';}))
          mod*=1.3; // they can see their machine smoking
        if(c.settleT>0) mod*=0.22; // still gentle, but cook now matters -- drain is real if nothing's happening
    const repEffect=(dinerReputation()||{}).effect;
        mod/=evtMod('patience',1); // events can make the room more forgiving
        if(repEffect==='patience') mod*=0.93; // The Calm Diner: regulars know to expect good service
        if(G.hardMode) mod*=1.15; // Hard Mode: patience runs out faster, full stop
        c.mod=clamp(mod,0.35,3);
      }
      c.patience-=dt*c.mod;
      if(c.state==='waiting')c.orderT+=dt;
      const pr=c.patience/c.maxPat;
      c.mood= pr>0.55?'ok': pr>0.28?'worried':'angry';
      if(pr<0.3&&!c.alerted){ c.alerted=true; floater(c.x,c.y-88,'❗','#ff5a5f',24); A.sfx('pop'); }
      if(c.patience<=0){ customerAngryLeave(c); }
    }
    if(c.state==='eat'){
      if(c.foodPhotoT>0){ // blogger frames the shot before a single bite
        c.foodPhotoT-=dt;
        if(c.foodPhotoT<0.5&&!c.angle2){c.angle2=true;A.sfx('photo');sparkle(c.x-14,c.y+4,'#fff',4);} // new angle!
        if(c.foodPhotoT<=0){ A.sfx('photo'); sparkle(c.x+12,c.y+8,'#fff',5); floater(c.x,c.y-58,'📷 *chef\u2019s kiss*','#ffe08a',12); c.mood='happy'; }
        c.eatT+=dt; // eating paused while art happens
      }
      if(c.photoT>0){ c.photoT-=dt; if(c.photoT<=0){A.sfx('photo'); sparkle(c.x,c.y-40,'#ffffff',6); floater(c.x,c.y-64,'#foodie','#ff9bcb',15);} }
      if(c.type==='couple'&&Math.random()<dt*0.12){ floater(c.x+8,c.y-50,'🍴💕','#f4a9b8',12); }
      if(c.type==='family'&&Math.random()<dt*0.22*evtMod('messMult',1)){ spawnMess(c.x,c.y+40); if(Math.random()<0.3)addStory('The kids redecorated the floor with fries.',1); }
      c.eatT-=dt;
      if(c.eatT<=0){
        c.state='leave'; c.tx=DOOR.x; c.ty=DOOR.y; c.mood='happy';
        payAndLeave(c);
        if(c.table){ c.table.customer=null; c.table.plates=1; c.table.plateT=0; c.table.warned=false; c.table=null; }
      }
    }
    // influencer is always recording — and she saw THAT
    if(c.def.photo&&!c.witness&&(c.state==='waiting'||c.state==='eat')){
      let saw=false;
      for(const f of G.fires) if(dist(c.x,c.y,f.x,f.y)<230){saw=true;break;}
      if(!saw) for(const r of G.rats) if(!r.ally&&r.state!=='flee'&&r.state!=='parade'&&dist(c.x,c.y,r.x,r.y)<190){saw=true;break;}
      if(saw){ c.witness=true; floater(c.x,c.y-64,'📱 recording...','#ff9bcb',15); A.sfx('photo');
        addStory('The influencer started filming the disaster.',2); }
    }
    if(c.nibble>0)c.nibble-=dt;
    if(c.bonkCd>0)c.bonkCd-=dt;
    if(c.pointCd>0)c.pointCd-=dt;
    if(c.candyCd>0)c.candyCd-=dt;
    if(c.snapCd>0)c.snapCd-=dt;
    const seatedNow=(c.state==='waiting'||c.state==='eat'||c.state==='sit');
    /* LIVING WORLD: idle acts — nobody stands perfectly still */
    if(c.idleT>0){ c.idleT-=dt; if(c.idleT<=0)c.idleK=null; }
    else if(seatedNow){
      c.idleIn-=dt;
      if(c.idleIn<=0){
        c.idleIn=rnd(3,7);
        c.idleK= c.mood==='worried'?'sigh'
               : c.type==='biz'?(Math.random()<0.35?'phone':'watch')
               : c.type==='grandma'?(Math.random()<0.6?'knit':'look')
               : c.type==='couple'?(Math.random()<0.35?'selfie':pick(['look','hum']))
               : c.type==='blogger'?(Math.random()<0.5?'selfie':'look')
               : pick(['look','stretch','scratch','hum']);
        if(c.idleK==='knit')c.idleT=rnd(1.6,2.4);
        if(c.idleK==='sigh'){c.idleT=0.8;c.squash=Math.max(c.squash,0.35);floater(c.x+10,c.y-52,'…','rgba(255,255,255,0.6)',12);}
        if(c.idleK==='phone'){c.idleT=rnd(1.4,2);A.sfx('mumble');}
        c.idleT= c.idleK==='hum'?0.1:rnd(0.7,1.1);
        if(c.idleK==='hum')floater(c.x+12,c.y-52,'♪','rgba(255,255,255,0.8)',12);
        if(c.idleK==='selfie'){sparkle(c.x+16,c.y-24,'#fff',3);A.sfx('photo');}
      }
    }
    /* kids point excitedly at the rat */
    if((c.type==='family'||c.type==='couple')&&seatedNow&&c.pointCd<=0){
      for(const r of G.rats)if(r.state!=='flee'&&dist(c.x,c.y,r.x,r.y)<240){
        c.pointCd=7; floater(c.x+14,c.y-58,'👉🐀!','#ffd93d',14); A.sfx('laugh'); break;
      }
    }
    /* grandma comforts nearby worried kids */
    if(c.type==='grandma'&&seatedNow&&c.candyCd<=0){
      for(const o of G.customers){
        if(o.type==='family'&&o.state==='waiting'&&o.mood!=='ok'&&dist(c.x,c.y,o.x,o.y)<180){
          c.candyCd=10; o.patience=Math.min(o.maxPat,o.patience+2.5);
          floater((c.x+o.x)/2,(c.y+o.y)/2-46,'🍬','#cda6e0',15);
          break;
        }
      }
    }
    /* blogger accidentally photographs a neighbor */
    if(c.type==='blogger'&&c.state==='waiting'&&c.snapCd<=0){
      c.snapCd=rnd(9,16);
      const near=G.customers.find(o=>o!==c&&(o.state==='waiting'||o.state==='eat')&&dist(c.x,c.y,o.x,o.y)<170);
      if(near&&Math.random()<0.5){
        sparkle(near.x,near.y-14,'#fff',4); A.sfx('photo');
        floater(near.x,near.y-58,'?','#fff',15);
        floater(c.x,c.y-58,'📷 oops','#ffe08a',12);
      }
    }
    // blink
    if(c.blinkP>0)c.blinkP-=dt;
    else{ c.blinkIn-=dt; if(c.blinkIn<=0){c.blinkP=0.12;c.blinkIn=rnd(1.8,4.8);} }
    // SPRINT 4: kids and ice cream — a love story with a sad ending
    if(c.type==='family'&&c.state==='walk'&&!c.iceDone&&Math.random()<dt*0.12){
      c.iceDone=true; spawnMess(c.x,clamp(c.y+26,240,520));
      floater(c.x,c.y-50,'🍦 oops!','#fff',15);
      addStory('A kid dropped their ice cream on the way in.',1);
    }
    if(c.def.vip&&(c.state==='waiting'||c.state==='eat')&&G.fires.length>0)G.mem.vipDuringFire=true;
    c.squash*=Math.pow(0.002,dt);
    // fire under their table? flee
    if((c.state==='waiting'||c.state==='sit'||c.state==='eat')&&c.table&&fireOn('table',c.table)){
      c.fireT=(c.fireT||0)+dt;
      if(c.fireT>2.5){ customerAngryLeave(c); addStory('A customer fled a burning table.',2); }
    }
  }

  /* aroma drifts between tables */
  if(Math.random()<dt*0.12){
    const eater=G.customers.find(c=>c.state==='eat');
    if(eater){
      const sniffer=G.customers.find(c=>c!==eater&&c.state==='waiting'&&dist(c.x,c.y,eater.x,eater.y)<220);
      if(sniffer){
        floater(lerp(eater.x,sniffer.x,0.4),lerp(eater.y,sniffer.y,0.4)-40,'~','rgba(255,217,61,0.7)',15);
        floater(sniffer.x,sniffer.y-56,'👃 mmm','rgba(255,255,255,0.8)',11);
      }
    }
  }
  /* neighbors chat — the room is alive */
  if(G.chatCd<=0){
    G.chatCd=7+rnd(0,7);
    const seated=G.customers.filter(c=>c.state==='waiting'||c.state==='eat'||c.state==='sit');
    outer: for(let a=0;a<seated.length;a++)for(let b=a+1;b<seated.length;b++){
      if(dist(seated[a].x,seated[a].y,seated[b].x,seated[b].y)<170){
        floater(seated[a].x+10,seated[a].y-56,'💬','#fff',13);
        setTimeout(()=>{ if(G&&!G.over&&!paused&&screen==='game')floater(seated[b].x-10,seated[b].y-56,'💬','#fff',13); },500);
        A.sfx('mumble');
        break outer;
      }
    }
  }

  /* stations */
  const cookMult=(G.boostT>0?1.25:1)*(1-G.smoke*0.35)*(G.morale>0?1.25:1)*(1+G.flow*0.1)*evtMod('cook',1); // blackout no longer slows cooking
  for(const s of G.stations){
    s.wob*=Math.pow(0.001,dt);
    if(s.state==='cook'){
      const kind=STATION_TO_FOOD[s.id];
      s.prog+=dt*cookMult/FOODS[kind].time;
      if(s.id==='drinks'){ // cold machine: bubbles & ice, never smoke
        if(Math.random()<dt*5&&parts.length<MAXP)
          parts.push({x:s.x+rnd(-10,10),y:596,vx:rnd(-4,4),vy:-24,g:-10,s:rnd(1.4,2.6),l:0,ml:rnd(0.4,0.7),c:'rgba(180,225,255,0.75)',shape:'c'});
        if(Math.random()<dt*2)sparkle(s.x+rnd(-14,14),580,'#e0f7ff',1);
      } else if(Math.random()<dt*3) smokePuff(s.x+rnd(-14,14),584,1);
      if(s.prog>=1){ s.prog=0; s.state='ready'; s.ready=kind; s.readyAge=0; s.wob=1; noteWear(s.id); A.sfx('pop'); sparkle(s.x,580,'#ffd93d',5); }
    }
    else if(s.state==='ready'&&s.ready&&s.ready!=='burnt'&&s.ready!=='melted'){
      s.readyAge+=dt;
      if(s.readyAge>12){
        if(s.id==='drinks'){
          s.ready='melted'; s.wob=1; A.sfx('splash');
          puff(s.x,580,'#bfe4ff',8,60,4,0.6); // watery spill, never smoke
          floater(s.x,562,'MELTED!','#6ec6ff',16);
          addStory('A drink sat out too long. It gave up and became a puddle.',1);
        } else {
          s.ready='burnt'; s.wob=1; A.sfx('buzz');
          smokePuff(s.x,580,4);
          floater(s.x,562,'BURNT!','#ff8a5c',16);
          G.mem.burnRecent=G.t; earnSouv('charcoal');
          // CAUSAL: burnt food smolders. Bin it or it ignites.
          schedule(4.5,()=>{ if(s.ready==='burnt'&&!fireOn('station',s))startFire('station',s); },'The burnt food is smoldering...',s);
          addStory('You left food out too long. It became... charcoal.',1);
        }
      }
    }
    else if(s.state==='fixing'){
      s.fixT-=dt;
      if(Math.random()<dt*8)sparkle(s.x+rnd(-20,20),610,'#ffd93d',1);
      if(s.fixT<=0){ s.state='idle'; s.wob=1; A.sfx('fix'); A.sfx('steam'); confetti(s.x,586,8); shake(1.4,0.08);
        puff(s.x,580,'rgba(240,248,255,0.85)',8,70,7,0.8);
        floater(s.x,556,'♪','#7cf2c0',18);
        G.money+=15; floater(s.x,585,'FIXED! +$15','#7cf2c0',16); noteGood(s.x,600);
        G.disasters&&addStory('You wrenched the '+s.label.toLowerCase()+' back to life.',1); }
    }
    else if(s.state==='broken'){
      if(Math.random()<dt*2)sparkle(s.x+rnd(-24,24),606,'#ffd24d',1);
      if(s.id==='drinks'){ if(Math.random()<dt*1.5&&parts.length<MAXP)parts.push({x:s.x+rnd(-14,14),y:590,vx:0,vy:34,g:70,s:2.6,l:0,ml:0.6,c:'rgba(180,225,255,0.8)',shape:'c'}); }
      else if(Math.random()<dt*1.5)smokePuff(s.x+rnd(-14,14),590,1);
    }
  }

  /* fires */
  for(let i=G.fires.length-1;i>=0;i--){
    const f=G.fires[i];
    f.age+=dt; f.size=Math.min(1,f.size+dt*0.15);
    f.spread-=dt;
    if(f.spread<=0){ f.spread=7+rnd(0,3); spreadFire(f); }
    if(Math.random()<dt*6)smokePuff(f.x+rnd(-10,10),f.y-16,1);
    if(f.ttype==='station'&&f.age>18&&f.ref.state!=='broken'){ f.ref.state='broken'; f.ref.ready=null; addStory('The fire wrecked the '+f.ref.label.toLowerCase()+'.',2); }
    // EMERGENT: a nearby puddle steams the fire down
    for(const pd of G.puddles){
      if(pd.s>0.4&&dist(f.x,f.y,pd.x,pd.y)<85){
        f.size-=dt*0.32; pd.s-=dt*0.07;
        if(Math.random()<dt*8)puff(f.x+rnd(-12,12),f.y-8,'rgba(230,240,250,0.7)',1,50,6,0.8);
        if(f.size<0.22){
          G.fires.splice(i,1);
          puff(f.x,f.y,'#e8f2fa',12,90,8,0.8); A.sfx('foam');
          floater(f.x,f.y-16,'STEAMED OUT!','#bfe4ff',17);
          addStory('The leak steamed a fire out. Pure luck.',3);
        }
        break;
      }
    }
  }
  // smoke rises with every flame and burnt plate; the whole kitchen feels it
  const smokeTarget=Math.min(1,G.fires.length*0.4+G.stations.filter(s=>s.ready==='burnt').length*0.12);
  G.smoke+=(smokeTarget-G.smoke)*Math.min(1,dt*(smokeTarget>G.smoke?0.8:0.35));

  /* puddles grow (unless evaporating), messes linger */
  for(let i=G.puddles.length-1;i>=0;i--){
    const pd=G.puddles[i]; pd.t+=dt;
    if(pd.t<2.2) pd.s=Math.min(1,pd.s+dt*0.5);
    if(pd.t>2.5&&pd.s<=0.05){G.puddles.splice(i,1);continue;} // evaporated (never cull newborns)
  }
  for(const m of G.messes) m.s=Math.min(1,m.s+dt*0.8);

  /* rats */
  for(let i=G.rats.length-1;i>=0;i--){
    const r=G.rats[i]; r.t+=dt;
    if(r.state==='ride'){ // ??? (you've never seen this before)
      if(!G.duck){ G.rats.splice(i,1); continue; }
      r.x=G.duck.x-2; r.y=G.duck.y-16; r.dir=1;
      continue;
    }
    if(r.state==='parade'){
      const pdir = r.paradeDir || 1; // backward compatible: existing parade rats stay left-to-right
      r.x += 140 * pdir * dt;
      if(Math.random()<dt*4) sparkle(r.x,r.y-14,'#ffd93d',1);
      if(Math.random()<dt*2){ S.data.coins=(S.data.coins||0)+1; coinBurst(r.x,r.y-10,1); }
      if((pdir > 0 && r.x > W+30) || (pdir < 0 && r.x < -30)){ G.rats.splice(i,1); }
      continue;
    }
    if(r.state==='ally'){
      if(r.act){ r.actT-=dt; if(r.actT<=0){r.act=null;r.spin=0;} continue; }
      r.alT-=dt;
      for(const o of G.rats)if(o!==r&&!o.ally&&o.state!=='flee'&&dist(r.x,r.y,o.x,o.y)<170){
        o.state='flee'; o.flee=0; o.carry=null; A.sfx('squeak');
        floater(o.x,o.y-24,'shoo!','#b78bff',13);
        if(!G.mem.allyShoo){G.mem.allyShoo=true;addStory('Kiki chased off a rival rat. Loyalty.',3);}
      }
      let tx,ty;
      if(!r.chore&&r.alT<=0){
        const tb=G.tables.find(t=>t.plates>0);
        if(tb&&G.bin.fill<G.bin.cap&&G.bin.emptying<=0)r.chore={phase:'get',tb};
        else r.alT=6;
      }
      if(r.chore){
        if(r.chore.phase==='get'){ tx=r.chore.tb.x; ty=r.chore.tb.y+10;
          if(dist(r.x,r.y,tx,ty)<16){ if(r.chore.tb.plates>0){r.chore.tb.plates=0;r.chore.tb.sparkT=1;r.carryPlate=true;} r.chore.phase='drop'; } }
        else { tx=G.bin.x; ty=G.bin.y-6;
          if(dist(r.x,r.y,tx,ty)<22){
            if(r.carryPlate&&G.bin.fill<G.bin.cap){G.bin.fill++;G.money+=3;floater(G.bin.x,G.bin.y-46,'🐀 +$3','#b78bff',13);sparkle(G.bin.x,G.bin.y-24,'#b78bff',4);}
            r.carryPlate=false; r.chore=null; r.alT=rnd(16,26);
          } }
      } else { tx=240+Math.sin(r.t*0.6)*140; ty=470+Math.cos(r.t*0.4)*40; }
      const dd=Math.max(1,dist(r.x,r.y,tx,ty));
      r.x+=(tx-r.x)/dd*Math.min(dd,120*dt); r.y+=(ty-r.y)/dd*Math.min(dd,120*dt);
      r.dir=tx>r.x?1:-1;
      if(Math.random()<dt*0.12)heartPop(r.x,r.y-18,1);
      continue;
    }
    if((r.state==='hunt'||r.state==='flee')&&!r.act&&G.duck&&!G.duck.rider&&dist(r.x,r.y,G.duck.x,G.duck.y)<55){
      r.state='ride'; r.carry=null; r.spin=0;
      G.duck.rider=r; G.duck.vx=72;
      floater(r.x,r.y-30,'??!','#fff',20);
      floater(G.duck.x,G.duck.y+16,'...quack.','#ffd93d',13);
      crowdReact(G.duck.x,G.duck.y,'laugh',320);
      G.mem.duckRide=true; earnSouv('ticket');
      addStory('A rat climbed onto the duck and simply... rode away.',5);
      kikiMoment('Kiki rode the duck out of the diner like it was planned.',5,r.x,r.y-30,'DUCK RIDE!');
      A.sfx('quack'); A.sfx('squee');
      continue;
    }
    if(r.state==='stun'&&r.spinT>0){ r.spinT-=dt; r.spin=(0.5-Math.max(0,r.spinT))/0.5*TAU; if(r.spinT<=0)r.spin=0; }
    if(r.state==='stun'){
      r.stunT-=dt;
      if(Math.random()<dt*6)sparkle(r.x+rnd(-10,10),r.y-18,'#ffd93d',1);
      if(r.stunT<=0)r.state='hunt';
    }
    else if(r.state==='nibble'){
      r.nibT-=dt;
      if(Math.random()<dt*5)puff(r.x,r.y+6,'#c98a4b',1,40,3,0.4);
      if(r.nibT<=0){
        if(r.mess){const mi=G.messes.indexOf(r.mess); if(mi>=0)G.messes.splice(mi,1); r.mess=null;}
        r.state='flee'; r.flee=0;
        if(Math.random()<0.4)addStory('A rat cleaned up the kids\u2019 mess. Gross, but helpful?',2);
      }
    }
    else if(r.state==='hunt'){
      // PERSONALITY: acts pause everything — the rat is performing
      if(r.act){
        r.actT-=dt;
        if(r.act==='wiggle')r.spin=Math.sin(perfT*26)*0.3;
        if(r.actT<=0){r.act=null;r.spin=0;}
        continue;
      }
      r.startleCd=Math.max(0,r.startleCd-dt);
      // startled by a close call with the player's hand
      if(pointer.down&&r.startleCd<=0&&dist(pointer.x,pointer.y,r.x,r.y)<70&&dist(pointer.x,pointer.y,r.x,r.y)>=40){
        r.act='startle'; r.actT=0.5; r.startleCd=3.5;
        floater(r.x,r.y-26,'!','#fff',18); A.sfx('squeak');
        continue;
      }
      // EMERGENT: rats slip on puddles too
      let slipped=false;
      for(const pd of G.puddles){
        if(pd.s>0.5&&dist(r.x,r.y,pd.x,pd.y)<28){
          r.state='stun'; r.stunT=2.2; r.spinT=0.5; slipped=true;
          A.sfx('slip'); puff(r.x,r.y,'#bfe4ff',7,80,4,0.4);
          floater(r.x,r.y-24,'SLIP!','#6ec6ff',15);
          if(r.carry){ spawnMess(r.x,r.y+6); floater(r.x,r.y-40,'dropped it!','#ffd93d',13); r.carry=null; }
          crowdReact(r.x,r.y,'laugh',200);
          if(Math.random()<0.5)addStory('Kiki wiped out on the puddle. Karma.',2);
          kikiMoment('Kiki slipped on the puddle and lost all dignity.',4,r.x,r.y-30,'KIKI SLIP!');
          break;
        }
      }
      if(slipped)continue;
      // primary: counter food; secondary: floor messes
      let tgt=null,td=1e9,ty=580,isMess=false;
      for(const s of G.stations){ if(s.ready&&s.ready!=='burnt'&&s.ready!=='melted'){ const d=dist(r.x,r.y,s.x,580); if(d<td){td=d;tgt=s;isMess=false;ty=580;} } }
      if(!tgt) for(const m of G.messes){ const d=dist(r.x,r.y,m.x,m.y); if(d<td){td=d;tgt=m;isMess=true;ty=m.y;} }
      if(tgt){
        const tx=tgt.x, d=dist(r.x,r.y,tx,ty);
        // PERSONALITY: look both ways before committing the crime
        if(!isMess&&d<70&&!r.sneaked){
          r.sneaked=true; r.act='sneak'; r.actT=1.0; A.sfx('mumble');
          continue;
        }
        r.x+=(tx-r.x)/d*130*dt; r.y+=(ty-r.y)/d*130*dt;
        r.dir=tx>r.x?1:-1;
        if(d<16){
          if(isMess){ r.state='nibble'; r.nibT=1.4; r.mess=tgt; }
          else{
            r.carry=tgt.ready; tgt.ready=null; tgt.state='idle'; r.state='flee'; r.flee=0;
            G.mem.ratFed=true; G.mem.stolen=(G.mem.stolen||0)+1;
            r.act='wiggle'; r.actT=0.5; A.sfx('squee');
            crowdReact(r.x,r.y,'gasp');
            earnSouv('stolenBurger');
            if(G.inspector){G.mem.ratDuringInspection=true; addStory('A rat stole food DURING the health inspection.',4);}
            floater(r.x,r.y-24,'STOLEN!','#ff8a8a',18); A.sfx('squeak');
            addStory('A rat stole the '+r.carry+' right off the counter!',3);
            kikiMoment('Kiki stole the '+r.carry+' in front of everybody.',4,r.x,r.y-30,'HEIST!');
            // customers who watched it happen are horrified
            for(const c of G.customers){
              if((c.state==='waiting'||c.state==='queue')&&dist(c.x,c.y,r.x,r.y)<190){
                c.patience=Math.max(1,c.patience-c.maxPat*0.12);
                floater(c.x,c.y-58,'EW!','#8d99ae',14);
              }
            }
            G.disasters++;
          }
        }
      } else {
        r.x+=Math.cos(r.t*1.4)*60*dt+r.dir*22*dt; r.y+=Math.sin(r.t*2.2)*40*dt;
        r.y=clamp(r.y,240,530);
        if(r.t>11){ r.state='flee'; r.flee=0; }
      }
    } else { // flee
      r.flee+=dt;
      if(r.act){
        r.actT-=dt;
        if(r.act==='guilty'){ r.x+=r.dir*-40*dt; if(r.actT<=0){r.act=null;} }
        else if(r.act==='trip'){ r.spin+=dt*16; r.x+=r.dir*-70*dt; if(Math.random()<dt*10)puff(r.x,r.y+8,'#d9c9a8',1,40,3,0.35); }
        if(r.act==='wave'&&Math.random()<dt*4)sparkle(r.x,r.y-22,'#ffd93d',1);
        if(r.actT<=0){
          if(r.act==='trip'&&r.carry){ // dropped it... and now it's confused
            spawnMess(clamp(r.x,60,420),clamp(r.y,240,520));
            r.carry=null; r.act='confused'; r.actT=0.7; r.spin=0;
            floater(r.x,r.y-26,'?','#fff',20);
            addStory('The rat tripped, dropped the loot, and just... stared at it.',2);
            kikiMoment('Kiki tripped and dropped the evidence.',3,r.x,r.y-28,'EVIDENCE!');
            crowdReact(r.x,r.y,'laugh');
          } else if(r.act==='wave'){ G.rats.splice(i,1); continue; }
          else { r.act=null; r.spin=0; }
        }
        continue;
      }
      // PERSONALITY: occasionally trips over its own feet
      if(!r.tripped&&r.flee>0.4&&Math.random()<dt*0.55){
        r.tripped=true; r.act='trip'; r.actT=0.55; A.sfx('squeak');
        if(!r.carry&&Math.random()<0.6)crowdReact(r.x,r.y,'laugh');
      }
      // RARE GEM: a pigeon mugs the mugger
      else if(r.carry&&!r.mugged&&G.birds.length===0&&r.flee>0.3&&Math.random()<dt*0.3){
        r.mugged=true;
        G.birds.push({x:r.x+rnd(-30,30),y:-24,state:'dive',target:r,carry:null,flap:0});
        A.sfx('chirp');
      }
      // PERSONALITY: waves goodbye at the exit
      else if(!r.waved&&(r.x<14||r.x>W-14)){
        r.waved=true; r.act='wave'; r.actT=0.9;
        floater(r.x,r.y-30,'byeee!','#ffd93d',15); A.sfx('squee');
        continue;
      }
      r.x+=r.dir*-260*dt;
      if(r.x<-40||r.x>W+40) G.rats.splice(i,1);
    }
    // SPRINT 4: grandma's handbag is always loaded
    if(r.state!=='flee'&&r.state!=='parade'){
      for(const c of G.customers){
        if(!r.ally&&c.type==='grandma'&&(c.state==='sit'||c.state==='waiting'||c.state==='eat')&&(c.bonkCd||0)<=0&&!r.carry&&dist(c.x,c.y,r.x,r.y)<75&&Math.random()<0.12){
          // ...but sometimes, grandma just feeds it.
          c.bonkCd=8; c.squash=0.7;
          floater(lerp(c.x,r.x,0.5),lerp(c.y,r.y,0.5)-30,'🍪','#cda6e0',16);
          r.act='wiggle'; r.actT=0.7; r.state='flee'; r.flee=0; r.tripped=true; r.mugged=true;
          heartPop(r.x,r.y-16,3); A.sfx('squee');
          G.mem.ratFriend=true;
          addStory('Grandma fed the rat a cookie. It left politely.',5);
          kikiMoment('Grandma fed Kiki a cookie and restored order.',5,r.x,r.y-22,'COOKIE TRUCE!');
          crowdReact(c.x,c.y,'laugh',260);
          break;
        }
        if(!r.ally&&c.type==='grandma'&&(c.state==='sit'||c.state==='waiting'||c.state==='eat')&&(c.bonkCd||0)<=0&&dist(c.x,c.y,r.x,r.y)<75){
          c.bonkCd=5; c.squash=1;
          G.mem.grandmaBonk=true; earnSouv('handbag');
          r.act='guilty'; r.actT=0.55; // caught red-pawed
          floater(r.x,r.y-30,'😳','#fff',16);
          scareRat(r);
          floater(c.x,c.y-64,'BONK!','#cda6e0',20);
          sparkle(r.x,r.y-10,'#ffd93d',6);
          A.sfx('thud');
          crowdReact(c.x,c.y,'clap',260);
          addStory('Grandma dispatched a rat with her handbag.',3);
          kikiMoment('Grandma bonked Kiki with legendary accuracy.',5,r.x,r.y-24,'BONK LEGEND!');
          break;
        }
      }
      if(r.state==='hunt'&&r.t>4&&G.cats.length===0&&Math.random()<dt*0.07) spawnCat(r);
    }
  }
  /* a pigeon perches on the sign sometimes */
  if(!G.perch&&Math.random()<dt*0.012){ G.perch={t:0,dur:rnd(4,7)}; }
  if(G.perch){ G.perch.t+=dt; if(G.perch.t>G.perch.dur){ G.perch=null; puff(72,36,'#c9ced6',3,50,3,0.4); } }
  /* pigeons: nature's pickpockets */
  for(let i=G.birds.length-1;i>=0;i--){
    const b=G.birds[i]; b.flap+=dt*18;
    if(b.state==='dive'){
      const r=b.target;
      if(!r||!G.rats.includes(r)||!r.carry){ b.state='rise'; continue; }
      const d=dist(b.x,b.y,r.x,r.y-10);
      b.x+=(r.x-b.x)/d*380*dt; b.y+=(r.y-10-b.y)/d*380*dt;
      if(d<18){
        b.carry=r.carry; r.carry=null;
        b.state='rise';
        r.act='confused'; r.actT=0.8;
        floater(r.x,r.y-28,'?!','#fff',20);
        G.mem.pigeon=true; earnSouv('feather');
        addStory('A pigeon mugged the rat mid-escape. Crime doesn\u2019t pay.',4);
        crowdReact(b.x,b.y,'laugh',300);
        A.sfx('chirp');
      }
    } else {
      b.y-=300*dt; b.x+=Math.sin(b.flap*0.4)*40*dt;
      if(b.y<-40)G.birds.splice(i,1);
    }
  }
  /* the mystery duck: no reason, no effect, pure joy */
  if(G.duckAt>0&&!G.duck&&G.t>G.duckAt&&G.beat!=='crisis'){
    G.duck={x:-22,y:rnd(460,520),vx:26,bob:0};
  }
  if(G.duck){
    const dk=G.duck; dk.bob+=dt*9;
    dk.x+=dk.vx*dt; dk.y+=Math.sin(dk.bob*0.5)*6*dt;
    if(!G.duckSeen&&dk.x>90){ G.duckSeen=true; crowdReact(dk.x,dk.y,'point',260); }
    if(dk.x>W+24){
      if(dk.rider)addStory('The duck and its rat exited together, forever.',4);
      else{ earnSouv('breadcrumb'); addStory('A duck strolled through the diner. Nobody knows why.',3); }
      G.duck=null; G.duckAt=-1;
    }
  }
  /* stray cats */
  for(let i=G.cats.length-1;i>=0;i--){
    const cat=G.cats[i]; cat.t+=dt;
    if(cat.state==='chase'){
      let tr=null,td=1e9;
      for(const r of G.rats)if(!r.ally&&r.state!=='flee'&&r.state!=='parade'){const d=dist(cat.x,cat.y,r.x,r.y);if(d<td){td=d;tr=r;}}
      if(tr){
        cat.dir=tr.x>cat.x?1:-1;
        cat.x+=(tr.x-cat.x)/td*310*dt; cat.y+=(tr.y-cat.y)/td*310*dt;
        if(td<80){
          tr.state='flee'; tr.flee=0; tr.carry=null;
          G.mem.catHero=true; earnSouv('whisker');
          floater(tr.x,tr.y-26,'!!','#ff9d5c',18); A.sfx('squeak');
          floater(cat.x,cat.y-26,'MEOW!','#ff9d5c',15);
          crowdReact(cat.x,cat.y,'laugh',280);
          addStory('A stray cat burst in and chased the rat out.',3);
          kikiMoment('The cat chased Kiki out like unpaid security.',4,cat.x,cat.y-24,'CAT SAVE!');
          cat.state='exit';
        }
      } else cat.state='exit';
      if(cat.t>8)cat.state='exit';
    } else {
      cat.x+=cat.dir*300*dt;
      if(cat.x<-40||cat.x>W+40)G.cats.splice(i,1);
    }
  }

  /* bin */
  const b=G.bin;
  if(b.emptying>0){
    b.emptying-=dt;
    if(b.emptying<=0){ b.fill=0; b.overT=0; sparkle(b.x,b.y-20,'#bff0ff',8); A.sfx('ding'); floater(b.x,b.y-56,'CLEAN!','#7cf2c0',16); }
  }
  if(b.fill>=b.cap && b.emptying<=0){
    b.overT+=dt;
    if(b.overT>9){ b.overT=0; spawnRat(); addStory('The overflowing trash attracted a rat.',2); banner('RAT!!','#8d99ae'); }
  }

  /* tools spring back */
  for(const tl of G.tools){
    if(!tl.drag && tl.retT<1){
      tl.retT=Math.min(1,tl.retT+dt*3);
      const k=eo(tl.retT);
      tl.x=lerp(tl.rx,tl.hx,k); tl.y=lerp(tl.ry,tl.hy,k);
    }
  }

  /* inspector — walks, looks, remembers */
  if(G.inspector){
    const ins=G.inspector; ins.t+=dt;
    if(ins.noticeT>0){ins.noticeT-=dt;if(ins.noticeT<=0)ins.notice=null;}
    const notice=(icon,v)=>{ ins.viol+=v; ins.notice=icon; ins.noticeT=1.2; A.sfx('pop'); };
    if(ins.phase==='enter'){
      const w=ins.wp[0], d=dist(ins.x,ins.y,w.x,w.y);
      if(d>3){ ins.x+=(w.x-ins.x)/d*120*dt; ins.y+=(w.y-ins.y)/d*120*dt; }
      else { ins.phase='patrol'; ins.t=0; ins.dwell=1.8; }
    } else if(ins.phase==='patrol'){
      const w=ins.wp[ins.wi], d=dist(ins.x,ins.y,w.x,w.y);
      if(d>4){ ins.x+=(w.x-ins.x)/d*95*dt; ins.y+=(w.y-ins.y)/d*95*dt; }
      else {
        ins.dwell-=dt;
        if(ins.dwell<=0){
          // observe surroundings at this waypoint
          for(const f of G.fires) if(dist(ins.x,ins.y,f.x,f.y)<240){ notice('🔥',2); break; }
          for(const r of G.rats) if(!r.ally&&r.state!=='flee'&&r.state!=='parade'&&dist(ins.x,ins.y,r.x,r.y)<220){ notice('🐀',2); break; }
          let dirt=0;
          for(const t of G.tables) if(t.plates>0&&dist(ins.x,ins.y,t.x,t.y)<170)dirt++;
          for(const m of G.messes) if(dist(ins.x,ins.y,m.x,m.y)<170)dirt++;
          for(const p of G.puddles) if(dist(ins.x,ins.y,p.x,p.y)<170)dirt++;
          if(dirt>0) notice('🍽',dirt);
          if(ins.wi===0){ // global checks once
            if(G.bin.fill>=G.bin.cap) notice('🗑',1);
            const broken=G.stations.filter(s=>s.state==='broken').length;
            if(broken) notice('⚙',broken);
          }
          ins.wi++;
          if(ins.wi>=ins.wp.length){
            ins.phase='verdict'; ins.t=0;
          } else ins.dwell=1.8;
        }
      }
    } else if(ins.phase==='verdict'){
      if(ins.t>0.8){
        const score=ins.viol-ins.good*2;
        if(score<=0){
          const sp$=MOD().id==='inspection'?225:150;
          G.money+=sp$; gainHeart(); unlockAch('inspect'); G.mem.spotless=true; earnSouv('badge');
          banner('SPOTLESS! +$'+sp$,'#7cd67c');
          addStory('The inspector found nothing. NOTHING. Legendary.',3);
          sparkle(ins.x,ins.y-40,'#7cf2c0',14);
        } else if(score<=2){
          G.money+=60; unlockAch('inspect');
          banner('INSPECTION PASSED +$60','#7cd67c');
          addStory('Passed a health inspection mid-service.',2);
        } else if(score<=5){
          loseHeart(1,ins.x,ins.y-50);
          banner('HEALTH VIOLATION!','#ff5a3c');
          addStory('The inspector logged '+ins.viol+' problems. Yikes.',3);
        } else {
          loseHeart(2,ins.x,ins.y-50);
          banner('SHUTDOWN WARNING!!','#ff5a3c');
          addStory('The inspector nearly shut you down on the spot.',3);
        }
        ins.phase='leave';
      }
    } else {
      const d=dist(ins.x,ins.y,DOOR.x,DOOR.y);
      if(d>3){ ins.x+=(DOOR.x-ins.x)/d*140*dt; ins.y+=(DOOR.y-ins.y)/d*140*dt; }
      else G.inspector=null;
    }
  }

  if(G.treat&&!G.treat.drag){
    G.treat.t+=dt;
    if(!G.customers.includes(G.treat.target) || G.treat.t>G.treat.life){
      if(G.treat.t>G.treat.life){ floater(G.treat.x,G.treat.y-30,'Kiki took it. Typical.','rgba(255,255,255,0.7)',12); A.sfx('squeak'); }
      if(G.treat.target)G.treat.target.treatWanted=false;
      G.treat=null;
    }
  }
  /* ambience */
  let _crowdN=0; for(const _c of G.customers) if(_c.state==='waiting'||_c.state==='eat'||_c.state==='sit') _crowdN++;
  A.ambient(dt, _crowdN,
    G.customers.some(c=>c.type==='blogger'||c.type==='influencer'||c.type==='tourist'),
    G.stations.some(st=>st.state==='cook'));
  /* fx */
  updateParts(dt); updateFloaters(dt);

  /* survival achievements */
  if(G.t>180) unlockAch('three');
  if(G.t>300) unlockAch('five');
  checkDailyGoal();

  /* contextual hints for first-timers */
  G.hint=null;
  if(!S.data.tut.cook && G.t>1){
    G.hint={x:G.stations[0].x,y:632,s:'TAP a machine to cook'};
  } else if(!S.data.tut.serve){
    const ready=G.stations.find(s=>s.ready&&s.ready!=='burnt'&&s.ready!=='melted');
    const waiting=G.customers.find(c=>c.state==='waiting');
    if(ready) G.hint={x:ready.x,y:540,s:'DRAG food to the customer'};
  } else if(!S.data.tut.plates){
    const t=G.tables.find(t=>t.plates>0);
    if(t) G.hint={x:t.x,y:t.y-10,s:'DRAG plates to the bin'};
  } else if(!S.data.tut.inspect && G.inspector){
    G.hint={x:G.inspector.x,y:G.inspector.y-30,s:'Inspector! Keep things clean & fires out'};
    S.data.tut.inspect=true; S.save();
  } else if(G.t-(G.lastInputT||0)>8 && S.data.tut.cook && S.data.tut.serve){
    // subtle nudge for experienced players who've stalled -- points to whatever needs doing most
    const readySt=G.stations.find(st=>st.ready&&st.ready!=='burnt'&&st.ready!=='melted');
    const impatient=G.customers.find(c=>c.state==='waiting'&&c.patience/c.maxPat<0.35);
    const dirtyT=G.tables.find(t=>t.plates>0);
    const idleSt=G.stations.find(st=>st.state==='idle');
    if(readySt) G.hint={x:readySt.x,y:540,s:'Food is getting cold!'};
    else if(impatient) G.hint={x:impatient.x,y:impatient.y-70,s:'Customer is losing patience!'};
    else if(dirtyT) G.hint={x:dirtyT.x,y:dirtyT.y-10,s:'Dirty plates need clearing'};
    else if(idleSt&&G.customers.some(c=>c.state==='waiting')) G.hint={x:idleSt.x,y:632,s:'Tap to cook'};
  }
}

function assignHairForCustomer(type){
  const preferred=HAIR_TYPE_TAGS[type]||['normal'];
  let total=0; const pool=[];
  for(const id in HAIR_STYLES){
    const st=HAIR_STYLES[id];
    let w=st.rarity;
    if(st.tags.some(t=>preferred.includes(t))) w*=7; // "often" for a matching archetype
    pool.push([id,w]); total+=w;
  }
  let r=Math.random()*total;
  for(const [id,w] of pool){ if(r<w) return id; r-=w; }
  return pool[pool.length-1][0];
}

    if(Math.sin(perfT*1.1+c.bob)>0.93)floater(x+16,y-44,'❤','rgba(244,169,184,0.9)',11);
  }

    cx.save();cx.translate(x-20,y-4);cx.rotate(-0.9);
    cx.fillStyle=c.def.color; rr(-3,-13,6,15,3);cx.fill();cx.lineWidth=2.4;cx.strokeStyle=TH().ink;cx.stroke();
    cx.fillStyle='#ffd93d';cx.beginPath();cx.arc(0,-15,4,0,TAU);cx.fill();cx.stroke();
    cx.restore();
  }
  if(c.idleK==='knit'){ // grandma's needles never rest

    cx.fillStyle='#f48fb1';cx.beginPath();cx.arc(-13,4,4.5,0,TAU);cx.fill();

  }

    cx.save();cx.translate(x+16,y-26);cx.rotate(Math.sin(perfT*14)*0.3);
    cx.fillStyle=c.def.color; rr(-2.6,-9,5.2,11,2.6);cx.fill();cx.lineWidth=2.2;cx.strokeStyle=TH().ink;cx.stroke();

  drawAcc(c,x,y-8);
  if(c.state==='leave'&&c.waveT>0){ // waving goodbye

    const col= r>0.55?'#7cd67c': r>0.28?'#ffd24d':'#ff5a5f';
    // heartbeat: pulse frequency and amplitude both accelerate as patience approaches zero
    const alarm=r<0.28?clamp(1-r/0.28,0,1):0; // 0 above 0.28, ramps to 1 at 0
    const beatFreq=8+alarm*14; // 8Hz at 0.28, 22Hz near zero
    const beatAmp=0.06+alarm*0.08; // 0.06 at 0.28, 0.14 near zero
    const pulse=alarm>0?1+Math.sin(G.t*beatFreq)*beatAmp:1;
    cx.save();cx.translate(bx,by);cx.scale(pulse,pulse);
    cx.fillStyle='#fff'; cx.beginPath();cx.arc(0,0,22+(c.orders.length>1?6:0),0,TAU);cx.fill();

    // they can see their machine is broken
    c.orders.forEach((f,oi)=>{
      const st=G.stations.find(s=>s.id===FOODS[f].station);

        const ox=c.orders.length===1?12:(oi===0?-2:20);

    });
    // patience ring
    cx.lineWidth=5;cx.strokeStyle=col;
    cx.beginPath();cx.arc(0,0,27+(c.orders.length>1?6:0),-Math.PI/2,-Math.PI/2+TAU*r);cx.stroke();
    cx.restore();
  }
  if(c.state==='eat'&&c.photoT>0){
    txtO('📸',x+24,y-40,18,'#fff',TH().ink);
  }
  if(c.state==='leaveAngry'){
    cx.fillStyle='#ff4d6d'; txtO('!!',x,y-48,22,'#ff4d6d',TH().ink);
  }
}
function drawStation(s){

      cx.beginPath();cx.moveTo(s.x-9,590);cx.lineTo(s.x-9,590+4+Math.sin(perfT*0.5+1)*2);cx.stroke();

    }
    drawFood(s.ready,s.x,580+bob,1.05,s.ready==='burnt');

  cx.restore();
}
function drawFire(f){
  const s=f.size*(1+Math.sin(perfT*11+f.x)*0.1);
  const x=f.x,y=f.y;
  for(let i=0;i<3;i++){
    const off=(i-1)*11*s, sz=(16-(i===1?0:4))*s;
    const fl=Math.sin(perfT*13+i*2)*3;
    cx.fillStyle=i===1?'#ff8a3c':'#ff5a3c';
    cx.beginPath();
    cx.moveTo(x+off-sz*0.7,y+6);
    cx.quadraticCurveTo(x+off-sz*0.9,y-sz*0.5,x+off+fl*0.3,y-sz*1.7-fl);
    cx.quadraticCurveTo(x+off+sz*0.9,y-sz*0.5,x+off+sz*0.7,y+6);
    cx.closePath();cx.fill();
  }
  cx.fillStyle='#ffd93d';
  const fl2=Math.sin(perfT*17)*2;
  cx.beginPath();cx.ellipse(x,y-4+fl2*0.3,8*s,12*s,0,0,TAU);cx.fill();
}

function drawBin(){
  const b=G.bin;
  const x=b.drag?b.dx:b.x, y=b.drag?b.dy:b.y;
  // anticipation wobble: bin trembles slightly when one slot from full
  const preFull=b.fill>=b.cap-1&&b.fill<b.cap;
  const trem=preFull?Math.sin(perfT*22)*1.2:0;
  cx.save();cx.translate(x+trem,y);
  if(b.emptying>0){ cx.globalAlpha=0.35; }
  cx.fillStyle='rgba(0,0,0,0.18)';cx.beginPath();cx.ellipse(0,38,26,7,0,0,TAU);cx.fill();
  cx.fillStyle='#78909c';
  cx.beginPath();cx.moveTo(-24,-22);cx.lineTo(24,-22);cx.lineTo(18,36);cx.lineTo(-18,36);cx.closePath();cx.fill();
  cx.lineWidth=4;cx.strokeStyle=TH().ink;cx.stroke();
  if(b.lidT>0){ b.lidT=Math.max(0,b.lidT-0.06); }
  cx.save();cx.translate(0,-30);cx.rotate(-(b.lidT||0)*0.5);cx.translate(0,30);
  cx.fillStyle='#546e7a'; rr(-28,-30,56,12,5);cx.fill();cx.stroke();
  cx.restore();
  // fill garbage
  const f=b.fill/b.cap;
  if(b.fill>0){
    cx.fillStyle='#8d6e63';
    for(let i=0;i<b.fill;i++){ cx.beginPath();cx.arc(-10+i*7,-26-Math.sin(i*2.7)*4- (f>=1?4:0),6,0,TAU);cx.fill();cx.stroke(); }
  }
  if(f>=1){
    // flies
    for(let i=0;i<3;i++){
      const a=G.t*4+i*2.1;
      cx.fillStyle=TH().ink;cx.beginPath();cx.arc(Math.cos(a)*22,-38+Math.sin(a*1.7)*10,2,0,TAU);cx.fill();
    }
    if(Math.floor(G.t*5)%2===0) txtO('FULL!',0,-52,14,'#ff8a8a',TH().ink);
  } else if(b.fill>=b.cap-1 && b.fill>0){
    // ANTICIPATION: one slot left -- yellow tremor + "1 more" cue
    // this prevents the surprise "wait it's full?" moment
    cx.save();cx.globalAlpha=0.5+0.3*Math.sin(perfT*6);
    cx.strokeStyle='#ffd93d'; cx.lineWidth=3;
    cx.beginPath();cx.moveTo(-26,-24);cx.lineTo(26,-24);cx.lineTo(20,38);cx.lineTo(-20,38);cx.closePath();cx.stroke();
    cx.restore();
    if(Math.floor(G.t*4)%2===0) txtO('1 more',0,-52,12,'#ffd93d',TH().ink);
  }
  cx.globalAlpha=1;
  // fill pips
  for(let i=0;i<b.cap;i++){
    cx.fillStyle=i<b.fill?'#ffd93d':'rgba(255,255,255,0.25)';
    cx.beginPath();cx.arc(-15+i*10,46,3.6,0,TAU);cx.fill();
  }
  if(b.emptying>0) txtO('...',0,0,26,'#fff',TH().ink);
  cx.restore();
}

/* random living-menu events */
function drawMenuEvents(dt){
  mEventIn-=dt;
  if(!mEvent&&mEventIn<=0){
    mEventIn=rnd(7,14);
    mEvent={kind:pick(['butterfly','wave','balloon','rain','bird']),t:0};
    if(mEvent.kind==='wave')kikiReact=1.4;
  }
  if(kikiReact>0)kikiReact-=dt;
  if(!mEvent)return;
  const e=mEvent; e.t+=dt;
  if(e.kind==='butterfly'){
    const k=Math.min(1,e.t/2.4);
    const bx=lerp(-20,kikiPos.x+2,eo(k))+Math.sin(e.t*7)*14*(1-k);
    const by=lerp(160,kikiPos.y-38,eo(k))+Math.cos(e.t*9)*10*(1-k);
    cx.fillStyle='#ff9bcb';

    cx.beginPath();cx.ellipse(-3,0,4,6,fl,0,TAU);cx.ellipse(3,0,4,6,-fl,0,TAU);cx.fill();cx.restore();
    if(e.t>3.4){ // lands on the nose... achoo
      puff(kikiPos.x,kikiPos.y-20,'#fff',5,60,3,0.4);
      floater(kikiPos.x,kikiPos.y-46,'achoo!','#fff',14);
      A.sfx('squee'); mEvent=null;
    }
  } else if(e.kind==='balloon'){
    const by=560-e.t*46, bx=390+Math.sin(e.t*2)*14;
    cx.fillStyle='#ff6b6b';cx.beginPath();cx.ellipse(bx,by,13,16,0,0,TAU);cx.fill();

    cx.beginPath();cx.moveTo(bx,by+16);cx.quadraticCurveTo(bx+4,by+34,bx,by+46);cx.stroke();
    if(by<-30)mEvent=null;
  } else if(e.kind==='rain'){
    for(let i=0;i<26;i++){
      const rx=(i*53+e.t*260)%W, ry=(i*97+e.t*430)%400;
      cx.strokeStyle='rgba(160,210,255,0.5)';cx.lineWidth=1.6;
      cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(rx-3,ry+11);cx.stroke();
    }
    if(e.t>3.6)mEvent=null;
  } else if(e.kind==='bird'){
    const k=Math.min(1,e.t/1.6);
    const bx=lerp(W+20,kikiPos.x+56,eo(k)), by=lerp(120,kikiPos.y+10,eo(k));
    cx.save();cx.translate(bx,by);cx.scale(-1,1);
    cx.lineWidth=2;cx.strokeStyle='#33345c';cx.fillStyle='#9aa7b5';
    cx.beginPath();cx.ellipse(0,0,7,5,0,0,TAU);cx.fill();cx.stroke();

    cx.fillStyle='#ffb347';cx.beginPath();cx.moveTo(8,-4);cx.lineTo(11,-3.4);cx.lineTo(8,-2.6);cx.closePath();cx.fill();
    cx.restore();
    if(e.t>5){puff(bx,by,'#c9ced6',3,50,3,0.4);mEvent=null;}
  } else if(e.kind==='wave'){ if(e.t>1.5)mEvent=null; }
  // (…and sometimes, someone golden drops by.)
  if(secretAt>0&&menuT>secretAt&&secretT<0)secretT=0;

    secretT+=dt;

    if(secretT>3&&secretT<3.06)drawHeart((kikiPos.x+gx)/2,kikiPos.y-46,8,'#ff6b8a');
    if(secretT>5.5){
      confetti(gx,gy-10,14);

function newspaperHeadline(){
  const m=G.mem;
  if(G.miracle) return 'LOCAL HERO SAVES DINER FROM CERTAIN DOOM';
  if(m.duckRide) return 'RAT SPOTTED RIDING DUCK INTO THE SUNSET';
  if(G.day>=2) return 'LOCAL DINER SIMPLY REFUSES TO CLOSE';
  if(m.ratFriend) return 'GRANDMA BEFRIENDS NOTORIOUS DINER RAT';
  if(m.ratDuringInspection) return 'RAT STEALS FOOD DURING HEALTH INSPECTION';
  if(m.viralGood&&(m.fireN||0)>0) return 'INFLUENCER MAKES BURNING DINER FAMOUS';
  if(m.pigeon) return 'PIGEON MUGS RAT IN BROAD DAYLIGHT';
  if(m.grandmaBonk) return 'GRANDMA SINGLE-HANDEDLY STOPS RAT INVASION';
  if(m.catHero) return 'STRAY CAT HAILED AS LOCAL HERO';
  if(m.vipDuringFire) return 'VIP DINES CALMLY THROUGH KITCHEN BLAZE';
  if(m.spotless) return 'HEALTH DEPT: \u201cCLEANEST DINER IN TOWN\u201d';
  if((m.fireN||0)>=3) return 'THE GREAT FIRE OF '+(m.lastFireClock||fmtClock(G.t));
  if((m.stolen||0)>=2) return 'RAT GANG PULLS OFF DARING FOOD HEIST';
  if(m.viralGood) return 'TINY DINER GOES VIRAL OVERNIGHT';
  if(G.angry>=5) return 'DINER MELTDOWN SHOCKS ENTIRE CITY';
  if(G.served>=18) return 'CROWDS FLOCK TO MIRACLE KITCHEN';
  return 'LOCAL DINER SURVIVES ANOTHER DAY';
}
function wrapLines(text,size,maxW){
  cx.font='900 '+size+'px "Arial Rounded MT Bold","Trebuchet MS",sans-serif';
  const words=text.split(' '),lines=[]; let cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(cx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=test;
  }
  if(cur)lines.push(cur);
  return lines;
}
/* PHASE G: replay-moment flashback — a tiny looping scene matching the run's best moment */
function drawMomentFlashback(x,y,size,text){
  const t=perfT;
  cx.save();cx.translate(x,y);
  cx.fillStyle='#fff';rr(-size/2,-size/2,size,size,8);cx.fill();
  cx.lineWidth=2;cx.strokeStyle='#2b2b33';rr(-size/2,-size/2,size,size,8);cx.stroke();
  cx.save();cx.beginPath();rr(-size/2+4,-size/2+4,size-8,size-8,5);cx.clip();
  const bg=cx.createLinearGradient(0,-size/2,0,size/2);
  bg.addColorStop(0,'#2a2d55');bg.addColorStop(1,'#1a1b30');
  cx.fillStyle=bg;cx.fillRect(-size/2,-size/2,size,size);
  const s=size/64; // scale factor so scenes are drawn at a consistent internal 64px reference
  cx.scale(s,s);
  if(/legendary|combo/.test(text)){
    for(let i=0;i<3;i++){const a=t*3+i*2;cx.fillStyle=i%2?'#ffd93d':'#ff6b6b';cx.beginPath();cx.arc(Math.cos(a)*14,Math.sin(a)*14,3,0,TAU);cx.fill();}
    txtO('×'+(G.maxCombo||1),0,2,16,'#ffd93d','#16204b');
  } else if(/one-second|clutch/.test(text)){
    cx.strokeStyle='#7cf2c0';cx.lineWidth=2;cx.beginPath();cx.arc(0,0,16,0,TAU);cx.stroke();
    cx.save();cx.rotate(t*4);cx.strokeStyle='#ff6b6b';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,-13);cx.stroke();cx.restore();
    txtO('!',0,20,10,'#fff','#16204b');
  } else if(/duck/.test(text)){
    const bx=Math.sin(t*1.5)*14;
    cx.fillStyle='#ffd93d';cx.beginPath();cx.ellipse(bx,4,10,6,0,0,TAU);cx.fill();
    cx.fillStyle='#c3ccd8';cx.beginPath();cx.arc(bx-2,-4,5,0,TAU);cx.fill();

/* SPRINT 1: corner notes — small, elegant, stacking, never in the way */
function drawNotes(dt){
  let yTarget=95+(screen==='game'?comboChip:0); // packed near the top pause button, still clears the omen pill (64-88)
  for(let i=notes.length-1;i>=0;i--){
    const n=notes[i]; n.t+=dt;
    if(n.t>3.2){notes.splice(i,1);continue;}
  }
  for(const n of notes){
    const inK=eo(clamp(n.t/0.32,0,1)), outK=eo(clamp((n.t-2.5)/0.7,0,1));
    cx.font='800 12.5px "Arial Rounded MT Bold","Trebuchet MS",sans-serif';
    const tw=Math.min(290,cx.measureText(n.text).width+34);
    const x=W-10-tw+(1-inK)*24;
    if(n.y<0)n.y=yTarget;
    n.y+=(yTarget-n.y)*0.22;
    const y=n.y-outK*8;
    cx.save();cx.globalAlpha=(inK)*(1-outK)*0.55; // softer -- less demanding of attention during gameplay
    cx.shadowColor='rgba(0,0,0,0.35)';cx.shadowBlur=14;cx.shadowOffsetY=2;
    cx.fillStyle='rgba(18,20,42,0.65)'; rr(x,y,tw,24,12); cx.fill();
    cx.shadowColor='transparent';
    cx.fillStyle=n.color; cx.globalAlpha*=0.9; cx.beginPath();cx.arc(x+13,y+12,3.6,0,TAU);cx.fill();
    txtFit(n.text,x+13+ (tw-15)/2, y+12.5, 11,'rgba(230,235,255,0.85)', tw-32);
    cx.restore();
    yTarget+=26;
  }
}

function renderGame(still){
  const th=TH();
  const kws=SETT().gscale;
  if(kws<1){ cx.fillStyle=th.floor||'#242850'; cx.fillRect(0,0,W,H); }
  cx.save();
  // the camera breathes with the room's stress
  if(!still&&SETT().motion)cx.translate(Math.sin(perfT*1.7)*G.panicSm*1.6,Math.cos(perfT*1.3)*G.panicSm*1.8);
  // camera shake
  if(shakeT>0&&!still){
    cx.translate(rnd(-1,1)*shakeMag*(shakeT/0.4),rnd(-1,1)*shakeMag*(shakeT/0.4));
  }
  if(kws!==1){ cx.translate(240,480); cx.scale(kws,kws); cx.translate(-240,-480); }
  drawRoom();
  // puddles
  for(const pd of G.puddles){
    const rx=Math.max(0.5,34*pd.s+Math.sin(G.t*3)*2), ry=Math.max(0.5,20*pd.s);
    cx.fillStyle='rgba(110,198,255,0.75)';
    cx.beginPath();cx.ellipse(pd.x,pd.y,rx,ry,0,0,TAU);cx.fill();
    cx.fillStyle='rgba(255,255,255,0.5)';
    cx.beginPath();cx.ellipse(pd.x-10*pd.s,pd.y-6*pd.s,Math.max(0.5,8*pd.s),Math.max(0.5,4*pd.s),0.4,0,TAU);cx.fill();
  }
  // kid messes (crumbs & spills)
  for(const m of G.messes){
    const s=Math.max(0.1,m.s);
    cx.fillStyle='rgba(201,138,75,0.85)';
    cx.beginPath();cx.ellipse(m.x,m.y,16*s,9*s,0,0,TAU);cx.fill();
    cx.fillStyle='#ffd93d';
    cx.beginPath();cx.arc(m.x-7*s,m.y-2,3*s,0,TAU);cx.arc(m.x+5*s,m.y+2,2.6*s,0,TAU);cx.arc(m.x+1,m.y-4*s,2.2*s,0,TAU);cx.fill();
  }
  for(const t of G.tables)drawTable(t);
  if(G.box)drawBox(G.box);
  if(G.treat)drawTreat(G.treat);
  // customers sorted by y
  const cs=[...G.customers].sort((a,b)=>a.y-b.y);
  for(const c of cs)drawCustomer(c);
  if(G.inspector)drawInspector(G.inspector);
  for(const s of G.stations)drawStation(s);
  drawBin();
  drawTools();
  if(G.duck)drawDuck(G.duck);
  for(const r of G.rats)drawRat(r);
  for(const cat of G.cats)drawCat(cat);
  for(const b of G.birds)drawBird(b);
  for(const f of G.fires)drawFire(f);
  drawParts();
  drawFloaters();
  // dragged food ghost — lags and tilts with movement, snappier on fast drags
  if(drag&&(drag.type==='food'||drag.type==='plates')){
    const wpt=s2w(pointer);
    // velocity-adaptive lerp: 0.42 base, boosted up to 0.72 during fast pointer movement
    // this keeps precision on slow placements but eliminates lag on quick diagonal serves
    const targetX=wpt.x, targetY=wpt.y-32;
    const dxToTarget=targetX-dragVis.x, dyToTarget=targetY-dragVis.y;
    const distToTarget=Math.hypot(dxToTarget,dyToTarget);
    const speedBoost=clamp((distToTarget-40)/120, 0, 1); // 0 near-target, 1 far
    const lerp=0.42+speedBoost*0.30;
    dragVis.x+=dxToTarget*lerp;
    dragVis.y+=dyToTarget*lerp;
    // no tilt on food so it stays visually centered on the finger; plates still tilt for weight-feel
    cx.save();cx.shadowColor='rgba(0,0,0,0.4)';cx.shadowBlur=14;cx.shadowOffsetY=10;
    if(drag.type==='food'){
      cx.translate(dragVis.x,dragVis.y);
      drawFood(drag.food,0,0,1.35,drag.food==='burnt');
    } else {
      const tilt=clamp((wpt.x-dragVis.x)*0.045,-0.4,0.4);
      cx.translate(dragVis.x,dragVis.y);cx.rotate(tilt);
      drawPlate(0,0,1.3);
    }
    cx.restore();
  }
  // drag hand ring (manager's hand — skin colored)
  if(drag){
    cx.lineWidth=5;cx.strokeStyle=SKINS[S.data.skin].body;
    cx.globalAlpha=0.85;cx.beginPath();cx.arc(pointer.x,pointer.y,36,0,TAU);cx.stroke();
    // inner subtle ring for depth
    cx.lineWidth=2;cx.strokeStyle='rgba(255,255,255,0.4)';
    cx.beginPath();cx.arc(pointer.x,pointer.y,36,0,TAU);cx.stroke();
    cx.globalAlpha=1;
    // highlight valid drop targets
    highlightTargets();
  }
  // blackout — but fires light the dark (emergent visibility)
  if(G.blackout>0){
    const bm=G.blackMax||6;
    const kIn=eo(clamp((bm-G.blackout)/1,0,1));      // lights die softly
    const kOut=eo(clamp(G.blackout/1.6,0,1));        // ...and return softly
    const dk=0.5*Math.min(kIn,kOut);
    cx.fillStyle='rgba(10,10,28,'+dk+')';cx.fillRect(-20,-20,W+40,H+40);
    cx.save();cx.globalCompositeOperation='lighter';
    { // emergency lamp over the counter — gameplay stays readable
      if(!window._lampGrad){ const gg=cx.createRadialGradient(240,600,20,240,600,240); gg.addColorStop(0,'rgba(255,190,110,1)'); gg.addColorStop(1,'rgba(255,190,110,0)'); window._lampGrad=gg; }
      cx.save();cx.globalAlpha=0.22*Math.min(kIn,kOut);
      cx.fillStyle=window._lampGrad;cx.beginPath();cx.arc(240,600,240,0,TAU);cx.fill();
      cx.restore();
    }
    if(!window._fireGlowGrad){ const gg=cx.createRadialGradient(0,0,10,0,0,150); gg.addColorStop(0,'rgba(255,150,60,0.4)'); gg.addColorStop(1,'rgba(255,150,60,0)'); window._fireGlowGrad=gg; }
    for(const f of G.fires){
      cx.save();cx.translate(f.x,f.y);
      cx.fillStyle=window._fireGlowGrad;cx.beginPath();cx.arc(0,0,150,0,TAU);cx.fill();
      cx.restore();
    }
    cx.restore();
    txtO('POWER OUT',240,520,20,'#fff9c4','#000');
  }
  // smoke haze — the ceiling fills first
  if(G.smoke>0.03){
    const g=cx.createLinearGradient(0,0,0,H*0.6);
    g.addColorStop(0,'rgba(105,108,120,'+(G.smoke*0.55)+')');
    g.addColorStop(1,'rgba(105,108,120,0)');
    cx.fillStyle=g;cx.fillRect(-20,-20,W+40,H*0.6+20);
  }
  // calm pulse — a wave of relief washes over the room
  if(G.calmPulse>0){
    const k=G.calmPulse, r=k*520;
    cx.lineWidth=14*(1-k);
    cx.strokeStyle='rgba(124,242,192,'+(0.55*(1-k))+')';
    cx.beginPath();cx.arc(240,420,Math.max(1,r),0,TAU);cx.stroke();
  }
  if(G.gray>0.01){ cx.fillStyle='rgba(126,132,148,'+G.gray+')'; cx.fillRect(-20,-20,W+40,H+40); }
  cx.fillStyle='rgba(255,206,140,0.03)'; cx.fillRect(-20,-20,W+40,H+40); // baseline warmth
  if(G.glow>0){ cx.fillStyle='rgba(255,214,120,'+(G.glow*0.05)+')'; cx.fillRect(-20,-20,W+40,H+40); }
  if(G.panicSm>0.3){ cx.fillStyle='rgba(10,10,30,'+((G.panicSm-0.3)*0.12)+')'; cx.fillRect(-20,-20,W+40,H+40); }
  // panic vignette — the room itself sweats
  if(G.panicSm>0.25){
    const a=(G.panicSm-0.25)*0.5*(1+Math.sin(G.t*(2+G.panicSm*6))*0.25);
    if(!window._vig){ const g=cx.createRadialGradient(240,420,220,240,430,560);
      g.addColorStop(0,'rgba(255,40,60,0)'); g.addColorStop(1,'rgba(255,40,60,1)'); window._vig=g; }
    cx.save();cx.globalAlpha=clamp(a,0,0.45);cx.fillStyle=window._vig;cx.fillRect(-20,-20,W+40,H+40);cx.restore();
  }
  if(G.hurtT>0){ // soft red edge-pulse, never a full flash
    G.hurtT-=0.016;
    if(!window._vig){ const g=cx.createRadialGradient(240,420,220,240,430,560);
      g.addColorStop(0,'rgba(255,40,60,0)'); g.addColorStop(1,'rgba(255,40,60,1)'); window._vig=g; }
    cx.save();cx.globalAlpha=0.4*eo(clamp(G.hurtT/0.6,0,1));cx.fillStyle=window._vig;cx.fillRect(-20,-20,W+40,H+40);cx.restore();
  }
  drawSpecialEventEffects();
  drawPhase3Polish();
  cx.restore();
  drawHUD();
  drawPhase3HUD();
  drawDrama();
  drawHint();
}

function drawPhase3Polish(){
  if(!G||G.over)return;
  if(G.serviceFlash>0){
    const a=0.12*eo(clamp(G.serviceFlash,0,1));
    if(!window._serviceGlow){ const gg=cx.createRadialGradient(240,420,20,240,420,360); gg.addColorStop(0,'rgba(255,234,145,1)'); gg.addColorStop(1,'rgba(255,234,145,0)'); window._serviceGlow=gg; }
    cx.save();cx.globalAlpha=a;cx.fillStyle=window._serviceGlow;cx.beginPath();cx.arc(240,420,360,0,TAU);cx.fill();cx.restore();
  }
}
function drawPhase3HUD(){
  if(!G||G.over)return;
  // tiny flow/pressure strip — tells the player why the room feels hot without blocking play
  if(G.flow>0.18||G.panicSm>0.48){
    const x=150,y=64,w=180,h=18;
    cx.save();cx.globalAlpha=0.85;
    cx.fillStyle='rgba(24,26,52,0.78)';rr(x,y,w,h,9);cx.fill();
    cx.fillStyle='rgba(255,255,255,0.12)';rr(x+8,y+7,w-16,4,2);cx.fill();
    cx.fillStyle='#7cf2c0';rr(x+8,y+7,(w-16)*clamp(G.flow,0,1),4,2);cx.fill();
    cx.fillStyle='rgba(255,90,95,0.55)';rr(x+8,y+12,(w-16)*clamp(G.panicSm,0,1),3,2);cx.fill();
    txtFit(G.flow>G.panicSm?'FLOW':'PRESSURE',x+w/2,y+4,8.5,G.flow>G.panicSm?'#7cf2c0':'#ffd24d',w-20);
    cx.restore();
  }
}
/* omens and finales — the movie layer */
function drawDrama(){
  if(G.over)return;
  const om=G.lastStand>0?null:pendingOmen();
  if(om){
    const born=clamp((G.t-om.born)/0.4,0,1);
    const a=0.72*eo(born);
    const label='👀 '+om.omen;
    cx.font='800 13px "Arial Rounded MT Bold","Trebuchet MS",sans-serif';
    const pw=Math.min(440,cx.measureText(label).width+30);
    cx.save();cx.globalAlpha=a*0.75; // softer -- omen is ambient info, not an alarm
    cx.shadowColor='rgba(0,0,0,0.3)';cx.shadowBlur=12;cx.shadowOffsetY=2;
    cx.fillStyle='rgba(18,20,42,0.6)';
    rr(240-pw/2,64,pw,24,12);cx.fill();
    cx.shadowColor='transparent';
    txtFit(label,240,76,11.5,'rgba(255,233,176,0.85)',pw-22);
    cx.restore();
  }
  if(G.chefWipe>0){
    G.chefWipe-=0.016;
    const k=1-Math.abs(G.chefWipe/1.6-0.5)*2; // in-out
    cx.save();cx.globalAlpha=clamp(k*2,0,1);
    drawManagerFace(240,586-14*eo(clamp(k*1.6,0,1)),S.data.skin,0.9);
    cx.save();cx.translate(258,566);cx.rotate(Math.sin(perfT*10)*0.5-0.6);
    cx.fillStyle=SKINS[S.data.skin].body; rr(-3,-12,6,14,3);cx.fill();
    cx.lineWidth=2;cx.strokeStyle='#33345c';cx.stroke();
    cx.restore();
    if(G.chefWipe>1.4)floater(262,540,'😮‍💨','#fff',15);
    cx.restore();
  }
  if(G.lastStand>0){
    const p=0.5+Math.sin(perfT*3)*0.5;
    cx.lineWidth=8;cx.strokeStyle='rgba(255,210,77,'+(0.35+0.3*p)+')';
    rr(5,5,W-10,H-10,22);cx.stroke();
    cx.fillStyle='rgba(24,26,52,0.85)'; rr(146,62,188,32,16);cx.fill();
    txtO('⚡ '+Math.ceil(Math.max(0,G.lastStand))+'s — CLEAR IT!',240,78,14,'#ffd24d','#1c1030');
  }
}
function highlightTargets(){
  const pulse=1+Math.sin(perfT*8)*0.08;
  cx.lineWidth=4; cx.setLineDash([8,7]);
  if(drag.type==='food'&&drag.food!=='burnt'&&drag.food!=='melted'){
    // triage colors: coral for lowest-patience, gold for normal
    // find the customer wanting this food with the lowest patience so we can hue-map relative
    const matches=G.customers.filter(c=>c.state==='waiting'&&c.orders.includes(drag.food));
    for(const c of matches){
      const pr=c.patience/c.maxPat;
      const urgent=pr<0.35;
      const critical=pr<0.18;
      // stronger stroke + coral for critical, orange for urgent, gold for calm
      cx.strokeStyle = critical?'#ff5a5f' : urgent?'#ff9d3c' : '#ffd93d';
      cx.lineWidth = critical?5.5 : urgent?4.6 : 4;
      // extra amplitude on urgent pulses
      const p = critical?(1+Math.sin(perfT*14)*0.14) : urgent?(1+Math.sin(perfT*10)*0.11) : pulse;
      cx.beginPath();cx.arc(c.x,c.y-6,44*p,0,TAU);cx.stroke();
    }
    cx.strokeStyle='#ffd93d'; cx.lineWidth=4; // reset for other branches below
  } else if(drag.type==='plates'||(drag.type==='food'&&(drag.food==='burnt'||drag.food==='melted'))){
    cx.strokeStyle='#ffd93d';
    cx.beginPath();cx.arc(G.bin.x,G.bin.y,52*pulse,0,TAU);cx.stroke();
  } else if(drag.type==='tool'){
    cx.strokeStyle='#ffd93d';
    const k=drag.ref.kind;
    if(k==='ext')for(const f of G.fires){cx.beginPath();cx.arc(f.x,f.y-6,48*pulse,0,TAU);cx.stroke();}
    if(k==='mop'){for(const p of G.puddles){cx.beginPath();cx.arc(p.x,p.y,46*pulse,0,TAU);cx.stroke();}for(const m of G.messes){cx.beginPath();cx.arc(m.x,m.y,40*pulse,0,TAU);cx.stroke();}for(const r of G.rats){cx.beginPath();cx.arc(r.x,r.y,42*pulse,0,TAU);cx.stroke();}}
    if(k==='wrench')for(const s of G.stations)if(s.state==='broken'){cx.beginPath();cx.arc(s.x,648,62*pulse,0,TAU);cx.stroke();}
  } else if(drag.type==='box'){
    cx.strokeStyle='#ffd93d';
    rr(PANTRY.x-4,PANTRY.y-4,PANTRY.w+8,PANTRY.h+8,16);cx.stroke();
  } else if(drag.type==='treat'&&drag.ref.target&&G.customers.includes(drag.ref.target)){
    cx.strokeStyle='#ffd93d';
    cx.beginPath();cx.arc(drag.ref.target.x,drag.ref.target.y,48*pulse,0,TAU);cx.stroke();
  }
  cx.setLineDash([]);
}

/* ============================ MAIN LOOP ============================ */
let lastT=0, perfT=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(ts-lastT)/1000||0.016);
  lastT=ts; perfT+=dt;
  uiRects.length=0;
  // physics (with hitstop micro-freeze on impact moments)
  if(screen==='game'&&!paused&&G){
    let gdt=dt;
    if(G.hitstop>0){ G.hitstop-=dt; gdt=dt*0.18; }
    if(G.resumeCountdown>0){ gdt=0; } // countdown freezes game logic
    updateGame(gdt);
  }
  else { updateParts(dt); updateFloaters(dt); }
  if(shakeT>0){shakeT-=dt;if(shakeT<=0)shakeMag=0;}
  // draw
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#1d1e33'; cx.fillRect(0,0,W,H);
  if(screen==='menu'){ drawMenu(dt); if(menuT>2.4)A.ambient(dt,3,false,true); }
  else if(screen==='wardrobe')drawWardrobe();
  else if(screen==='shop')drawShop();
  else if(screen==='collection')drawCollection();
  else if(screen==='leaderboard')drawLeaderboard();
  else if(screen==='premod')drawPreMod();
  else if(screen==='prestige')drawPrestige();
  else if(screen==='archive')drawArchive();
  else if(screen==='settings')drawSettings();
  else if(screen==='help')drawHelp();
  else if(screen==='game'){
    renderGame(false);
    if(G.over&&G.endT<=0.9){
      cx.fillStyle='rgba(15,16,38,'+clamp(G.endT,0,0.6)+')';cx.fillRect(0,0,W,H);
    }
    if(paused)drawPause();
  }
  else if(screen==='over')drawGameOver();
  drawNotes(dt);
    if(uiFade>0){ uiFade-=dt; cx.fillStyle='rgba(15,16,38,'+clamp(uiFade/0.22,0,1)*0.7+')'; cx.fillRect(0,0,W,H); }
  // music
  A.music(screen==='game'&&!paused&&G&&!G.over?Math.max(G.panicSm,G.flow*0.42):0.05, screen==='game'&&!paused&&G&&!G.over, screen==='game'&&G?getCurrentEventMusicMood():null);
}
document.addEventListener('visibilitychange',()=>{ if(document.hidden&&screen==='game')paused=true; });

S.load().then(()=>{ refreshMenu(); requestAnimationFrame(frame); });

</script>
