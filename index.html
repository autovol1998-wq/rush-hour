'use strict';
/* =====================================================================
   RUSH HOUR — a game about prioritization under pressure.
   Phase 5: restore pre-fairness mechanics + non-balance Kiki moments.
   Single-file HTML5 game. Canvas rendering, procedural WebAudio,
   hidden panic system, dynamic difficulty director.
   Modules (in order): Utils, Audio, Save/Meta, Particles, Art,
   Entities, Input/Drag, Director, Update, Render, Screens, Boot.
   ===================================================================== */

/* ============================ UTILS ============================ */
const TAU = Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndi=(a,b)=>Math.floor(rnd(a,b+1));
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const dist=(x1,y1,x2,y2)=>{const dx=x2-x1,dy=y2-y1;return Math.sqrt(dx*dx+dy*dy);};
const eo=t=>1-Math.pow(1-t,3);                 // ease out cubic
const eb=t=>{const c=1.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}; // back
const fmt$=n=>'$'+Math.round(n);
function fmtClock(t){ // game-day clock: 1 real sec = 3 game minutes, opens 08:00
  const mins=8*60+Math.floor(t*3);
  const h=Math.floor(mins/60)%24, m=mins%60;
  return (h<10?'0':'')+h+':' + (m<10?'0':'')+m;
}
function fmtTime(t){const m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s}

/* Canvas setup — logical portrait 480×854, letterboxed */
const W=480,H=854;
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let viewScale=1,viewOX=0,viewOY=0;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const ww=window.innerWidth, wh=window.innerHeight;
  viewScale=Math.min(ww/W, wh/H);
  cv.width=Math.floor(W*viewScale*dpr); cv.height=Math.floor(H*viewScale*dpr);
  cv.style.width=Math.floor(W*viewScale)+'px'; cv.style.height=Math.floor(H*viewScale)+'px';
  viewOX=(ww-W*viewScale)/2;
  cv.style.marginLeft=viewOX+'px'; cv.style.marginTop=Math.max(0,(wh-H*viewScale)/2)+'px';
  cx.setTransform(viewScale*dpr,0,0,viewScale*dpr,0,0);
}
window.addEventListener('resize',resize); resize();

function rr(x,y,w,h,r){ // rounded rect path
  r=Math.min(r,w/2,h/2);
  cx.beginPath();
  cx.moveTo(x+r,y);
  cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r);
  cx.closePath();
}
let _lastFont='';
function setFont(f){ if(_lastFont!==f){ cx.font=f; _lastFont=f; } }
function txt(s,x,y,size,color,align='center',weight=800,alpha=1){
  cx.save(); cx.globalAlpha=alpha;
  setFont(weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif');
  cx.textAlign=align; cx.textBaseline='middle';
  cx.fillStyle=color; cx.fillText(s,x,y); cx.restore();
}
function txtFit(s,x,y,size,color,maxW,align='center',weight=800){
  setFont(weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif');
  while(size>7&&cx.measureText(s).width>maxW){
    size-=0.5;
    setFont(weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif');
  }
  txt(s,x,y,size,color,align,weight);
}
function txtO(s,x,y,size,color,outline,align='center',weight=900){ // outlined text
  cx.save();
  setFont(weight+' '+size+'px "Arial Rounded MT Bold","Trebuchet MS","Segoe UI",sans-serif');
  cx.textAlign=align; cx.textBaseline='middle';
  cx.lineJoin='round'; cx.lineWidth=size*0.18; cx.strokeStyle=outline;
  cx.strokeText(s,x,y); cx.fillStyle=color; cx.fillText(s,x,y);
  cx.restore();
}

/* ============================ AUDIO ============================ */
/* All sound is synthesized — zero assets. Music intensity follows panic. */
const A={
  ctx:null, master:null, musGain:null, on:true,
  step:0, nextT:0,
  init(){
    if(this.ctx) { if(this.ctx.state==='suspended') this.ctx.resume(); return; }
    try{
      this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain(); this.master.gain.value=0.5; this.master.connect(this.ctx.destination);
      this.musGain=this.ctx.createGain(); this.musGain.gain.value=0.32; this.musGain.connect(this.master);
      this.sfxG=this.ctx.createGain(); this.sfxG.connect(this.master);
      this.ambG=this.ctx.createGain(); this.ambG.connect(this.master);
      this.applyVol();
      this.nextT=this.ctx.currentTime+0.1;
    }catch(e){}
  },
  _noise(){ // cached noise buffer
    if(this._nb) return this._nb;
    const b=this.ctx.createBuffer(1,this.ctx.sampleRate*0.5,this.ctx.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    return this._nb=b;
  },
  tone(f,dur,type='sine',vol=0.2,slide=0,delay=0,gainNode){
    if(!this.ctx||!this.on)return;
    if(!gainNode) f*=0.965+Math.random()*0.07; // humanize sfx, keep music in tune
    const t=this.ctx.currentTime+delay;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f,t);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide),t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(gainNode||this.sfxG||this.master);
    o.start(t);o.stop(t+dur+0.02);
  },
  applyVol(){
    if(!this.ctx)return;
    const st=(typeof SETT==='function')?SETT():{volM:1,volMu:1,volS:1,volA:1};
    this.master.gain.value=0.9*st.volM;
    this.musGain.gain.value=0.32*st.volMu;
    if(this.sfxG)this.sfxG.gain.value=st.volS;
    if(this.ambG)this.ambG.gain.value=st.volA;
  },
  hiss(dur,vol=0.2,hp=800,delay=0,gainNode){
    if(!this.ctx||!this.on)return;
    const t=this.ctx.currentTime+delay;
    const s=this.ctx.createBufferSource();s.buffer=this._noise();s.loop=true;
    const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    s.connect(f);f.connect(g);g.connect(gainNode||this.sfxG||this.master);
    s.start(t);s.stop(t+dur+0.02);
  },
  sfx(n){
    if(!this.ctx||!this.on)return;
    switch(n){
      case 'click': this.tone(600,0.06,'square',0.10); break;
      case 'pop':   this.tone(320,0.08,'sine',0.22,260); break;
      case 'pick':  this.tone(480,0.06,'sine',0.15,120); break;
      case 'ding':  this.tone(880,0.25,'sine',0.20); this.tone(1320,0.3,'sine',0.10,0,0.05); break;
      case 'coin':  this.tone(988,0.09,'square',0.12); this.tone(1319,0.22,'square',0.12,0,0.08); break;
      case 'buzz':  this.tone(160,0.22,'sawtooth',0.16,-70); break;
      case 'sizzle':this.hiss(0.5,0.08,2500); break;
      case 'pour': this.hiss(0.35,0.05,4200); this.tone(1200,0.06,'sine',0.05,60,0.08); break;
      case 'fix':   [440,554,659,880].forEach((f,i)=>this.tone(f,0.1,'square',0.10,0,i*0.06)); break;
      case 'splash':this.hiss(0.25,0.16,600); this.tone(220,0.15,'sine',0.12,-120); break;
      case 'foam':  this.hiss(0.6,0.22,1200); break;
      case 'fire':  this.hiss(0.8,0.12,300); this.tone(90,0.5,'sawtooth',0.08,40); break;
      case 'squeak':this.tone(1400,0.08,'sine',0.14,500); this.tone(1800,0.08,'sine',0.12,600,0.09); break;
      case 'thud':  this.tone(120,0.12,'sine',0.25,-60); break;
      case 'bell':  this.tone(1175,0.3,'triangle',0.16); this.tone(1568,0.4,'triangle',0.10,0,0.02); break;
      case 'slip':  this.tone(900,0.28,'sine',0.14,-620); break;
      case 'angry': this.tone(220,0.16,'sawtooth',0.16,-80); this.tone(180,0.22,'sawtooth',0.14,-90,0.12); break;
      case 'heart': this.tone(300,0.3,'sawtooth',0.2,-160); this.hiss(0.2,0.1,400); break;
      case 'combo': this.tone(700,0.1,'square',0.12,300); this.tone(1050,0.16,'square',0.12,300,0.07); break;
      case 'crash': this.hiss(0.4,0.25,150); this.tone(80,0.3,'sawtooth',0.2,-30); break;
      case 'over':  [523,392,330,262].forEach((f,i)=>this.tone(f,0.32,'triangle',0.16,0,i*0.22)); break;
      case 'achieve':[659,784,1046,1318].forEach((f,i)=>this.tone(f,0.18,'triangle',0.14,0,i*0.09)); break;
      case 'inspectorSting': // a distinct dramatic 3-note entrance -- unlike any other arrival
        this.tone(220,0.14,'sawtooth',0.1,0,0); this.tone(185,0.14,'sawtooth',0.1,0,0.12); this.tone(147,0.26,'sawtooth',0.13,-40,0.24); break;
      case 'legendaryCheer': // bigger than the normal achieve fanfare -- reserved for x15+ combos
        [523,659,784,1046,1318,1568].forEach((f,i)=>this.tone(f,0.22,'triangle',0.15,0,i*0.055));
        this.tone(196,0.5,'sawtooth',0.08,0,0); break;
      case 'photo': this.tone(2000,0.05,'square',0.1); this.hiss(0.06,0.12,3000,0.03); break;
      case 'whistle': this.tone(2093,0.12,'sine',0.14); this.tone(2093,0.12,'sine',0.14,0,0.16); break;
      case 'note':  this.tone(1174,0.08,'sine',0.09); this.tone(1568,0.14,'sine',0.08,0,0.06); break;
      case 'cheer': [784,988,1175,1568].forEach((f,i)=>this.tone(f,0.12,'triangle',0.09,0,i*0.05)); break;
      case 'buy':   this.tone(988,0.09,'square',0.1); this.tone(1319,0.1,'square',0.1,0,0.08); this.tone(1568,0.2,'square',0.1,0,0.16); break;
      case 'laugh': [880,740,880,740].forEach((f,i)=>this.tone(f,0.07,'square',0.07,120,i*0.09)); break;
      case 'clap':  [0,0.09,0.2].forEach(d=>this.hiss(0.045,0.13,2200,d)); break;
      case 'gasp':  this.hiss(0.18,0.1,900); this.tone(500,0.14,'sine',0.07,350); break;
      case 'chirp': this.tone(2200,0.06,'sine',0.1,400); this.tone(2500,0.07,'sine',0.09,300,0.09); break;
      case 'squee': [1500,1800,2100].forEach((f,i)=>this.tone(f,0.06,'sine',0.1,200,i*0.06)); break;
      case 'mumble':this.tone(300,0.07,'sine',0.05,40); this.tone(340,0.07,'sine',0.05,-30,0.1); break;
      case 'steam': this.hiss(0.35,0.12,3000); break;
      case 'beat': this.tone(72,0.14,'sine',0.22,-24); this.tone(66,0.1,'sine',0.14,-20,0.16); break;
      case 'quack': this.tone(520,0.1,'sawtooth',0.12,-120); this.tone(470,0.12,'sawtooth',0.1,-100,0.11); break;
    }
  },
  ambT:2,
  ambient(dt,crowd,cams,cooking){
    if(!this.ctx||!this.on)return;
    this.ambT-=dt;
    if(this.ambT>0)return;
    this.ambT=rnd(2.2,4.5);
    if(crowd<2)return;
    const roll=Math.random();
    if(roll<0.34) this.sfx('mumble');                                  // soft chatter
    else if(roll<0.52){ this.tone(2350,0.05,'sine',0.045); this.tone(2350,0.04,'sine',0.035,0,0.07); } // dishes clink
    else if(roll<0.66&&crowd>=3) [900,760].forEach((f,i)=>this.tone(f,0.05,'square',0.03,90,i*0.08)); // distant giggle
    else if(roll<0.76&&cams) this.sfx('photo');                        // a camera somewhere
    else if(roll<0.9&&cooking) this.hiss(0.3,0.04,2800,0,this.ambG);               // something steams
  },
  /* Adaptive music: kick+bass always; hats, arp, siren layer in with panic. */
  BASS:[0,0,7,0,10,7,5,3],
  ARP:[0,3,7,10,12,10,7,3],
  music(panic,playing,mood){
    if(!this.ctx||!this.on)return;
    const bpm=(mood==='disco'||mood==='festival'?116:mood==='jazz'||mood==='cozy'?88:96)+panic*72;
    const spb=60/bpm/2; // 8th notes
    while(this.nextT<this.ctx.currentTime+0.15){
      const s=this.step, t=this.nextT-this.ctx.currentTime;
      if(playing){
        if(s%2===0){ // kick on beats
          this.tone(130,0.12,'sine',0.5,-95,Math.max(0,t),this.musGain);
        }
        const b=110*Math.pow(2,this.BASS[s%8]/12)/2;
        this.tone(b,spb*0.9,'triangle',0.30,0,Math.max(0,t),this.musGain);
        if(panic>0.22) this.hiss(0.04,0.05+panic*0.06,6000,Math.max(0,t+spb/2));
        if(panic>0.45 && s%1===0){
          const a=220*Math.pow(2,this.ARP[(s*2)%8]/12);
          this.tone(a,spb*0.5,'square',0.06+panic*0.05,0,Math.max(0,t),this.musGain);
        }
        if(panic<0.35&&(typeof S!=='undefined')&&S.data.owned&&S.data.owned.jukebox&&s%4===2){
          const mel=440*Math.pow(2,this.ARP[(s>>2)%8]/12);
          this.tone(mel,spb*1.6,'triangle',0.06,0,Math.max(0,t),this.musGain);
        }
        if(panic>0.8 && s%8===0){
          this.tone(660,spb*4,'sine',0.05,220,Math.max(0,t),this.musGain);
        }
        /* Special Events: distinct mood layers, always gentle, never over the gameplay SFX */
        if(mood==='disco'&&s%2===1) this.tone(2600,0.02,'square',0.045,-90,Math.max(0,t),this.musGain);
        if(mood==='festival'&&s%4===0) this.tone(90,0.1,'triangle',0.14,-80,Math.max(0,t),this.musGain);
        if((mood==='jazz'||mood==='cozy')&&s%8===3) this.tone(523*Math.pow(2,this.ARP[(s>>1)%8]/12),spb*2.2,'sine',0.05,0,Math.max(0,t),this.musGain);
        if(mood==='jazz'&&s%4===2) this.hiss(0.03,0.025,3200,Math.max(0,t),this.musGain);
        if(mood==='birthday'&&s%16<5) this.tone(392*Math.pow(2,[0,2,4,2,0][s%16]/12),spb*1.4,'triangle',0.06,0,Math.max(0,t),this.musGain);
        if(mood==='lucky'&&s%3===0) this.tone(1046,0.05,'sine',0.05,300,Math.max(0,t),this.musGain);
      }
      this.nextT+=spb; this.step++;
    }
  }
};

/* Persists via the artifact storage API when available; falls back to memory. */
const S={
  data:{ bestScore:0,bestTime:0,totalServed:0,totalMoney:0,runs:0,
         ach:{}, theme:'diner', skin:'rookie', sound:true,
         coins:0, owned:{}, souv:{}, set:null, papers:[], kikiOutfit:'classic',
         tut:{cook:false,serve:false,plates:false,inspect:false},
         daily:{date:'',claimed:false},
         history:{leakRuns:0,fireRuns:0,grandmaGood:0,lastLeak:-99,lastFire:-99,calmRuns:0,dangerRuns:0},
         streak:{count:0,best:0},
         leaderboard:[],
         lastRun:null,
         dinerLevel:0, prestige:0 },
  ready:false,
  async load(){
    try{
      if(window.storage){
        const r=await window.storage.get('rushhour:save');
        if(r&&r.value) Object.assign(this.data, JSON.parse(r.value));
      }
    }catch(e){}
    this.ready=true; A.on=this.data.sound;
  },
  save(){
    try{ if(window.storage) window.storage.set('rushhour:save', JSON.stringify(this.data)); }catch(e){}
  }
};

function owned(id){ return !!S.data.owned[id]; }
function itemById(id){ return SHOP_ITEMS.find(it=>it.id===id); }
function shopItemsOwned(){ return SHOP_ITEMS.filter(it=>owned(it.id)).length; }

function kikiOutfitFromItem(id){ return id==='topHat'?'tophat':id==='kikiPirate'?'pirate':id==='kikiChef'?'chef':null; }
function isEquippedItem(it){
  if(!it) return false;
  if(it.cat==='themes') return S.data.theme===it.id;
  if(it.cat==='kiki') return (S.data.kikiOutfit||'classic')===kikiOutfitFromItem(it.id);
  if(it.cat==='music') return (S.data.musicPack||'default')===it.id;
  if(it.cat==='effects') return (S.data.effectPack||'default')===it.id;
  return false;
}
function autoEquipItem(it){
  if(!it) return;
  if(it.cat==='themes') S.data.theme=it.id;

    const o=kikiOutfitFromItem(it.id);
    if(o) S.data.kikiOutfit=o;
  } else if(it.cat==='music') S.data.musicPack=it.id;
  else if(it.cat==='effects') S.data.effectPack=it.id;
}
function nextGoalItem(){
  const goal=itemById(S.data.goal);
  if(goal && !owned(goal.id)) return goal;
  const locked=SHOP_ITEMS.filter(it=>!owned(it.id)).sort((a,b)=>a.price-b.price);
  return locked[0]||null;
}
function equippedMusicMood(){
  const it=itemById(S.data.musicPack);
  return it&&owned(it.id)?it.mood:null;

function equippedFx(){

}
function runStyleBonus(g){
  if(!g) return 0;
  let b=0;
  b+=Math.min(160,Math.max(0,g.maxCombo-1)*8);
  b+=Math.min(120,Math.floor(g.t/30)*10);
  b+=Math.min(100,g.firesOut*14);
  b+=Math.min(120,(g.perfectN||0)*10);
  b+=Math.min(90,(g.clutchN||0)*18);
  b+=Math.min(90,(g.cleanN||0)*4);
  if(g.served>=15) b+=60;
  if(g.angry===0&&g.served>=8) b+=80;
  if(g.miracle) b+=90;
  return Math.round(b);
}

/* ============================ PARTICLES / FLOATERS ============================ */
const parts=[]; const MAXP=320;
function puff(x,y,color,n=8,spd=90,size=6,life=0.6,grav=0){ n=Math.max(1,Math.round(n*SETT().parts));
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    const a=rnd(0,TAU),v=rnd(spd*0.4,spd);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,g:grav,s:rnd(size*0.5,size),l:0,ml:rnd(life*0.6,life),c:color,shape:'c'});
  }
}
function sparkle(x,y,color,n=6){ n=Math.max(1,Math.round(n*SETT().parts));
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    const a=rnd(0,TAU),v=rnd(30,110);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-40,g:60,s:rnd(3,6),l:0,ml:rnd(0.4,0.8),c:color,shape:'star'});
  }
}
function smokePuff(x,y,n=3){
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    parts.push({x:x+rnd(-8,8),y,vx:rnd(-12,12),vy:rnd(-55,-30),g:-10,s:rnd(7,13),l:0,ml:rnd(0.8,1.4),c:'rgba(90,90,100,0.5)',shape:'c'});
  }
}
function heartPop(x,y,n=4){
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    parts.push({x:x+rnd(-14,14),y:y+rnd(-6,6),vx:rnd(-25,25),vy:rnd(-90,-50),g:40,s:rnd(6,10),l:0,ml:rnd(0.6,1),c:'#ff6b8a',shape:'heart'});
  }
}
function coinBurst(x,y,n=4){
  const fx=(typeof equippedFx==='function')?equippedFx():null;
  for(let i=0;i<n;i++){
    if(parts.length>=MAXP)parts.shift();
    const shape=fx==='stars'?'star':fx==='hearts'?'heart':(fx==='confetti'?'c':'coin');
    const col=fx==='hearts'?'#ff6b8a':(fx==='confetti'?pick(['#ff6b6b','#ffd93d','#7cf2c0','#6ec6ff','#ff9bcb']):'#ffd93d');
    parts.push({x,y,vx:rnd(-70,70),vy:rnd(-190,-110),g:420,s:rnd(6,8),l:0,ml:rnd(0.7,1),c:col,shape});
  }
  if(fx==='sparkles') sparkle(x,y,'#fff3a6',Math.max(1,Math.round(n/2)));
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.l+=dt; if(p.l>=p.ml){parts[i]=parts[parts.length-1];parts.pop();continue}
    p.vy+=p.g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
  }
}
function drawParts(){
  for(const p of parts){
    const k=1-p.l/p.ml;
    cx.globalAlpha=k;
    cx.fillStyle=p.c;
    if(p.shape==='c'){ cx.beginPath();cx.arc(p.x,p.y,p.s*k,0,TAU);cx.fill(); }
    else if(p.shape==='coin'){ cx.beginPath();cx.arc(p.x,p.y,p.s,0,TAU);cx.fill(); cx.fillStyle='#e8a500';cx.beginPath();cx.arc(p.x,p.y,p.s*0.55,0,TAU);cx.fill(); }
    else if(p.shape==='heart'){ drawHeart(p.x,p.y,p.s*k,p.c); }
    else if(p.shape==='star'){ drawStar(p.x,p.y,p.s*k,p.c); }
  }
  cx.globalAlpha=1;
}
const floaters=[];
function floater(x,y,s,color='#fff',size=22){
  floaters.push({x,y,s,c:color,size,t:0});
}
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.t+=dt; f.y-=40*dt;
    if(f.t>1.1)floaters.splice(i,1);
  }
}
function drawFloaters(){
  for(const f of floaters){
    const k=f.t<0.15?f.t/0.15:1, a=f.t>0.7?1-(f.t-0.7)/0.4:1;
    cx.save(); cx.globalAlpha=a; cx.translate(f.x,f.y); cx.scale(0.6+0.4*eb(Math.min(1,k)),0.6+0.4*eb(Math.min(1,k)));
    txtO(f.s,0,0,f.size,f.c,'rgba(30,30,60,0.85)');
    cx.restore();
  }
  cx.globalAlpha=1;
}

/* ============================ ART HELPERS ============================ */
function drawHeart(x,y,s,c){
  cx.fillStyle=c; cx.beginPath();
  cx.moveTo(x,y+s*0.9);
  cx.bezierCurveTo(x-s*1.3,y-s*0.1,x-s*0.6,y-s*1.1,x,y-s*0.3);
  cx.bezierCurveTo(x+s*0.6,y-s*1.1,x+s*1.3,y-s*0.1,x,y+s*0.9);
  cx.fill();
}
function drawStar(x,y,s,c){
  cx.fillStyle=c; cx.beginPath();
  for(let i=0;i<5;i++){
    const a=-Math.PI/2+i*TAU/5, a2=a+TAU/10;
    cx.lineTo(x+Math.cos(a)*s,y+Math.sin(a)*s);
    cx.lineTo(x+Math.cos(a2)*s*0.45,y+Math.sin(a2)*s*0.45);
  }
  cx.closePath(); cx.fill();
}

function drawTool(kind,x,y,s=1,ang=0){
  cx.save();cx.translate(x,y);cx.rotate(ang);cx.scale(s,s);
  const ink=TH().ink; cx.lineWidth=2.6;cx.strokeStyle=ink;cx.lineJoin='round';
  if(kind==='mop'){
    // slim navy pole -- matches the reference: pole runs full length with a rounded fluffy head
    cx.fillStyle='#2c3552'; rr(-2.5,-30,5,42,2.5);cx.fill();cx.stroke();
    // small ring where pole meets head
    cx.fillStyle='#2c3552'; rr(-7,10,14,4,2);cx.fill();cx.stroke();
    // round fluffy mop head -- an ellipse with soft scalloped bottom
    cx.fillStyle='#f0edde';
    cx.beginPath();cx.arc(0,20,13,Math.PI,0);cx.lineTo(11,26);
    // scalloped bottom edge
    for(let i=0;i<5;i++){
      const x1=11-i*5.5, x2=8-i*5.5;
      cx.quadraticCurveTo((x1+x2)/2,32,x2,26);
    }
    cx.closePath();cx.fill();cx.stroke();
    // fluffy strand hints inside the head for texture
    cx.strokeStyle='rgba(180,175,150,0.6)'; cx.lineWidth=1.2;
    cx.beginPath();cx.moveTo(-8,18);cx.lineTo(-6,26);
    cx.moveTo(-2,17);cx.lineTo(-1,27);
    cx.moveTo(4,17);cx.lineTo(4,27);
    cx.moveTo(8,18);cx.lineTo(7,26);cx.stroke();

    cx.fillStyle=owned('goldExt')?'#ffd24d':'#ff5a5f'; rr(-9,-16,18,34,8);cx.fill();cx.stroke();
    if(owned('goldExt')){cx.fillStyle='rgba(255,255,255,0.55)'; rr(-6,-13,5,24,3);cx.fill();}
    cx.fillStyle='#2f3061'; rr(-4,-24,8,9,3);cx.fill();
    cx.beginPath();cx.moveTo(0,-20);cx.quadraticCurveTo(14,-22,15,-12);cx.lineWidth=3.5;cx.stroke();
    cx.fillStyle='#fff'; rr(-6,-8,12,12,3);cx.fill();
  }else if(kind==='wrench'){
    // reference: single open-end jaw, diagonal, handle lower-left -> head upper-right
    cx.save();cx.rotate(0.83);
    cx.fillStyle='#c3ccd8';cx.lineWidth=2.6;cx.lineJoin='round';cx.strokeStyle=ink;
    // rounded pill handle
    rr(-5.5,-4,11,34,5.5); cx.fill(); cx.stroke();
    // head: a thick ring with one open jaw (drawn after, so it caps the handle's top seam)
    const hcx=0,hcy=-13,R=12.5,rI=6,gapHalf=0.66,gc=-Math.PI/2;
    const gA=gc-gapHalf, gB=gc+gapHalf;
    cx.beginPath();
    cx.arc(hcx,hcy,R,gB,gA+TAU,false);
    cx.arc(hcx,hcy,rI,gA+TAU,gB,true);
    cx.closePath();
    cx.fill(); cx.stroke();
    cx.restore();
  }
  cx.restore();
}

function runTitle(){
  const m=G.mem;
  if(G.miracle) return 'The Miracle Shift';
  if(G.day>=2) return 'The Endless Shift';
  if((m.fireN||0)>=3) return 'The Great Fire of '+(m.lastFireClock||fmtClock(G.t));
  if((m.stolen||0)>=2) return 'The Rat Heist';
  if(m.spotless) return 'The Spotless Shift';
  if(m.viralGood) return 'The Viral Sensation';
  if(G.angry>=5) return 'The Meltdown';
  if(G.served>=18) return 'The Legendary Rush';
  if((m.fireN||0)>=1&&G.firesOut>=1) return 'Trial by Fire';
  if(G.badReviews>=3) return 'The Rough Crowd';

function endRun(){
  G.over=true; G.endT=0; A.sfx('over');
  G.title=runTitle();
  // meta
  G.coinBase=Math.round(G.money);
  G.coinBonus=runStyleBonus(G);
  S.data.runs++; S.data.totalServed+=G.served; S.data.totalMoney+=Math.round(G.money);
  S.data.coins=(S.data.coins||0)+G.coinBase+G.coinBonus;
  if(G.money>S.data.bestScore){S.data.bestScore=Math.round(G.money); G.newBestScore=true;}
  if(G.t>S.data.bestTime){S.data.bestTime=Math.floor(G.t); G.newBestTime=true;}
  /* the scrapbook: keep the last 8 front pages */
  S.data.papers=S.data.papers||[];
  S.data.papers.unshift({h:newspaperHeadline(),m:Math.round(G.money),s:G.served,tm:fmtTime(G.t),d:todayStr(),dl:0});
  if(S.data.papers.length>8)S.data.papers.length=8;

  /* PHASE C: run-quality streak -- a "clean run" is 0 walkouts and 5+ served */
  const quality = (G.angry===0 && G.served>=5);
  if(quality){ S.data.streak.count=(S.data.streak.count||0)+1; }
  else { S.data.streak.count=0; }
  S.data.streak.best=Math.max(S.data.streak.best||0,S.data.streak.count);
  G.streakThisRun=quality;

  /* PHASE D: local leaderboard -- top 5 runs by max combo */
  S.data.leaderboard=S.data.leaderboard||[];
  S.data.leaderboard.push({combo:G.maxCombo,money:Math.round(G.money),served:G.served,d:todayStr()});
  S.data.leaderboard.sort((a,b)=>b.combo-a.combo);
  S.data.leaderboard.length=Math.min(5,S.data.leaderboard.length);
  G.madeLeaderboard = S.data.leaderboard.some(r=>r.combo===G.maxCombo && r.money===Math.round(G.money) && r.served===G.served);

  /* PHASE F: disaster memory -- the diner remembers a rough run */
  S.data.history=S.data.history||{leakRuns:0,fireRuns:0,grandmaGood:0,lastLeak:-99,lastFire:-99};
  if((G.mem.leakRecent||0)>0){ S.data.history.leakRuns=(S.data.history.leakRuns||0)+1; S.data.history.lastLeak=S.data.runs; }
  else S.data.history.leakRuns=Math.max(0,(S.data.history.leakRuns||0)-1);
  if((G.mem.fireN||0)>0){ S.data.history.fireRuns=(S.data.history.fireRuns||0)+1; S.data.history.lastFire=S.data.runs; }
  else S.data.history.fireRuns=Math.max(0,(S.data.history.fireRuns||0)-1);
  /* PHASE M: reputation -- the diner's personality emerges from its own history */
  if(G.angry===0) S.data.history.calmRuns=(S.data.history.calmRuns||0)+1;
  else S.data.history.calmRuns=Math.max(0,(S.data.history.calmRuns||0)-1);
  if((G.mem.fireN||0)>=3) S.data.history.dangerRuns=(S.data.history.dangerRuns||0)+1;
  else S.data.history.dangerRuns=Math.max(0,(S.data.history.dangerRuns||0)-1);

  /* PHASE E: customer memory -- did grandma have a good visit? */
  if(G.grandmaGoodVisit) S.data.history.grandmaGood=(S.data.history.grandmaGood||0)+1;

  /* PHASE I: soft progression -- the diner grows with total runs played */
  S.data.dinerLevel=Math.min(3,Math.floor(S.data.runs/8));

  /* lastRun snapshot -- powers the reactive Kiki homepage clips */
  S.data.lastRun={fires:G.firesOut||0,combo:G.maxCombo,angry:G.angry,inspected:!!G.mem.spotless,
    clutch:(G.clutchN||0)>0,day:G.day,legendary:!!G.legendaryFired,quality};

  S.save();
  setTimeout(()=>{ if(G&&G.over) screen='over'; },900);
}

/* ---------------- Customers ---------------- */
function pickCustomerType(){
  const t=G.t;
  const pool=[['student',20],['tourist',16],['grandma',14],['biz',14],['influencer',10]];
  if(t>25) pool.push(['couple',13]);
  if(t>35) pool.push(['family',14]);
  if(t>60) pool.push(['blogger',7]);
  if(t>80) pool.push(['critic',6]);
  if(t>40) pool.push(['vip',(dinerReputation()||{}).effect==='vip'?5:3]); // a VIP can now show up on their own -- not just as a punishment
  // word gets around: angry departures attract a tougher, twitchier crowd
  const br=Math.min(G.badReviews,4);
  if(br>0){
    pool.push(['biz',br*6]);
    if(t>100) pool.push(['vip',br*3]);
    if(t>80) pool.push(['critic',br*2]);
  }
  const bias=evtMod('spawnBias',null)||runModEffect('spawnBias',null);
  if(bias){ for(const p of pool) if(p[0]===bias) p[1]*=5;
    if(!pool.some(p=>p[0]===bias)) pool.push([bias,40]); }
  return weighted(pool);
}
function weighted(pool){
  let sum=0; for(const p of pool)sum+=p[1];
  let r=Math.random()*sum;
  for(const p of pool){ r-=p[1]; if(r<=0)return p[0]; }
  return pool[0][0];
}
function spawnCustomer(forceType){
  const inQueue=G.customers.filter(c=>c.state==='queue').length;
  if(inQueue>=QUEUE.length) return null;
  const type=forceType||pickCustomerType();
  const def=CTYPES[type];
  const isFullMeal = !def.orders && G.t>30 && Math.random()<0.1; // rare, single-order types only, not too early
  const nOrders=isFullMeal?3:(def.orders||1);
  const orders=[];
  const keys=Object.keys(FOODS);
  for(let i=0;i<nOrders;i++){
    let f=pick(keys);
    if(nOrders>1){ let tries=0; while(orders.includes(f)&&tries<keys.length){ f=keys[(keys.indexOf(f)+1)%keys.length]; tries++; } }
    orders.push(f);
  }
  const c={
    type, def, orders, fullMeal:isFullMeal, priceSum:orders.reduce((a,f)=>a+FOODS[f].price,0),
    x:DOOR.x, y:DOOR.y, tx:DOOR.x, ty:DOOR.y,
    state:'queue', table:null, patience:def.patience, maxPat:def.patience,
    eatT:0, thinkT:rnd(0.5,1.0), payT:0, bob:rnd(0,TAU), slipCd:0, photoT:0,
    orderT:0, // time waiting since order shown
    leaveT:0, mood:'ok', witness:false, alerted:false, squash:0,
    blinkIn:rnd(1.5,4.5), blinkP:0, waveT:0,
    idleIn:rnd(2.5,6), idleK:null, idleT:0, pointCd:rnd(2,5), candyCd:6, snapCd:rnd(6,12),
    modT:rnd(0,0.12), mod:1,
    hairStyle: assignHairForCustomer(type),
    hairColor: rollHairColor(),
    partnerHair: type==='couple' ? (Math.random()<0.5 ? null : assignHairForCustomer('couple')) : null,
  };
  G.customers.push(c);
  A.sfx('bell');
  if(def.vip){
    banner('★ VIP ARRIVED! ★','#ffd24d'); addStory('A VIP swept through the doors.',2);
    sparkle(c.x,c.y-30,'#ffd24d',10); shake(2,0.15); A.sfx('achieve'); // a real arrival moment, not just a text line
  }
  if(def.critic){ banner('THE FOOD CRITIC IS HERE','#8d86c9'); addStory('The food critic came to judge you.',2); }
  if(type==='grandma'&&(S.data.history.grandmaGood||0)>=3){
    c.recognizesKiki=true;
    note('👵 "Oh, it\u2019s you again!"','#cda6e0');
  }
  return c;
}
function freeTable(){
  return G.tables.find(t=>!t.customer && t.plates===0 && !fireOn('table',t));
}
function fireOn(type,ref){ return G.fires.find(f=>f.ttype===type&&f.ref===ref); }

function seatCustomers(){
  if(G.box) return; // delivery blocks the door
  const q=G.customers.filter(c=>c.state==='queue');
  for(const c of q){
    const t=freeTable();
    if(!t)break;
    t.customer=c; c.table=t; c.state='walk';
    c.tx=t.x; c.ty=t.y-62;
  }
  // compact queue positions
  const q2=G.customers.filter(c=>c.state==='queue');
  q2.forEach((c,i)=>{ c.tx=QUEUE[Math.min(i,QUEUE.length-1)].x; c.ty=QUEUE[i]?QUEUE[i].y:QUEUE[3].y; });
}

function serveFood(c,foodKind){
  const i=c.orders.indexOf(foodKind);
  if(i<0)return false;
  c.orders.splice(i,1);
  A.sfx('ding'); hap(12); // tactile confirmation on the game's most rewarding action

  if(c.orders.length>0){

    if(G.combo===10){ crowdReact(c.x,c.y,'clap',420); confetti(240,300,14); }
    if(G.combo>=15&&!G.legendaryFired){ // a genuine "legendary" moment -- independent of the milestone list, the whole room reacts
      G.legendaryFired=true;

      S.data.coins=(S.data.coins||0)+50; note('+$50 legendary bonus','#ffd93d');

    }
    if([3,5,8,12,16,20].includes(G.combo)&&G.combo>G.lastMilestone){
      G.lastMilestone=G.combo;

      if(G.combo>=8)note('🔥 ×'+G.combo+' combo — locked in!','#ffd93d');
      recordMoment('A ×'+G.combo+' combo had the whole room watching.',3);
    }
    if(G.combo>=15&&G.combo%5===0){ shake(3,0.15); confetti(c.x,c.y-40,12); note('⚡ ×'+G.combo+' — the room is electric!','#ffd93d'); }
    if(G.combo%3===0) triggerCalm(); // rhythm becomes recovery
  } else {
    G.combo=0;
    // regular (slow) serve — still register a modest reward so the tap doesn't feel ignored
    sparkle(c.x,c.y-40,'rgba(255,220,120,0.7)',3);
    floater(c.x,c.y-58,'ok','rgba(255,255,255,0.6)',13);
  }
  const saved=patPre/c.maxPat<0.18; // saved at the brink

    G.perfectN=(G.perfectN||0)+1;

    recordMoment('Perfect service made the diner sparkle.',2);
  }
  c.clutch=patPre<1.2; // ...saved at the LAST second
  if(c.clutch){
    G.clutchN=(G.clutchN||0)+1;
    G.serviceFlash=Math.max(G.serviceFlash,0.8);
    G.hitstop=Math.max(G.hitstop,0.4*SETT().hit); hap(28);

  puff(c.x,c.y-14,'rgba(255,255,255,0.85)',6,140,3,0.3);
  if(c.table)c.table.bump=1;

function payAndLeave(c){

  const mult=(1+comboGrowth)*evtMod('comboMult',1)*runModEffect('comboMult',1);
  const patBonus=c.patience/c.maxPat>0.5?1.2:1;
  amount=Math.round(amount*mult*patBonus);
  if(c.type==='biz'&&c.orderT<5.5){ amount=Math.round(amount*1.4); floater(c.x,c.y-84,'💼 generous tip!','#90a4bd',13); }

    amount*=2;

  if(G.lastStand>0){ amount=Math.round(amount*1.5); }
  G.flow=Math.min(1,G.flow+0.05);
  G.money+=amount; G.served++;
  coinBurst(c.x,c.y-20,5); heartPop(c.x,c.y-50,3);
  if(equippedFx()==='stars')sparkle(c.x,c.y-28,'#ffd93d',6);

    if(c.patience/c.maxPat>0.55){ gainHeart(); banner('★★★★★ RAVE REVIEW!','#8d86c9'); addStory('The critic left a five-star review.',3); }
    else addStory('The critic left... unimpressed but fed.',1);
  }
  if(c.def.vip){
    if(c.patience/c.maxPat<0.25){
      gainHeart(); banner('VIP RESCUED!','#ffd24d'); earnSouv('goldSpoon');
      addStory('You saved the VIP with seconds to spare.',3);
      sparkle(c.x,c.y-40,'#ffd24d',12);

      unlockAch('vipsave');

      recordMoment('The VIP was saved with seconds to spare.',4);
    } else addStory('You kept the VIP happy. Barely.',2);
  }
  c.waveT=0.6; floater(c.x,c.y-56,'👋','#fff',15); // a little goodbye
  if(c.type==='grandma'&&c.patience/c.maxPat>0.4){ // served her well -- Kiki's memory grows fonder
    G.grandmaGoodVisit=true;
    if(c.recognizesKiki)floater(c.x,c.y-90,'💕','#f8bbd0',18);
  }
  if(c.def.photo) resolveInfluencer(c,true);
  G.served===1 && unlockAch('first');
  if(G.served>=15) unlockAch('ten');
  if(G.money>=600) unlockAch('rich');
  if(!S.data.tut.serve){S.data.tut.serve=true;S.save();}

function customerAngryLeave(c){

    c.sighed=true; c.state='sigh'; c.sighT=0.55; c.mood='angry';

function startFire(ttype,ref){
  if(fireOn(ttype,ref))return;
  const pos=hazardPos(ttype,ref);
  G.fires.push({ttype,ref,x:pos.x,y:pos.y,age:0,spread:6+rnd(0,3),size:0.6});
  G.mem.fireN=(G.mem.fireN||0)+1; G.mem.lastFireClock=fmtClock(G.t);
  banner('FIRE!!','#ff5a3c'); shake(8,0.4); A.sfx('fire');
  addStory('Something caught fire.',2);
  G.disasters++;
}
function hazardPos(ttype,ref){
  if(ttype==='station')return{x:ref.x,y:ref.y-34};
  if(ttype==='table')return{x:ref.x,y:ref.y-10};
  return{x:BIN.x,y:BIN.y-30};
}
function spreadFire(f){
  if(G.fires.length>=3)return;
  // choose a neighbor target
  const cands=[];
  for(const s of G.stations) if(!fireOn('station',s)) cands.push({ttype:'station',ref:s,d:dist(f.x,f.y,s.x,648)});
  for(const t of G.tables) if(!fireOn('table',t)) cands.push({ttype:'table',ref:t,d:dist(f.x,f.y,t.x,t.y)});
  cands.sort((a,b)=>a.d-b.d);
  if(cands[0]&&cands[0].d<260){
    const c=cands[0];
    const pos=hazardPos(c.ttype,c.ref);
    G.fires.push({ttype:c.ttype,ref:c.ref,x:pos.x,y:pos.y,age:0,spread:6+rnd(0,3),size:0.5});
    A.sfx('fire'); addStory('The fire is spreading!',2);
  }
}
function extinguishFire(f){
  const i=G.fires.indexOf(f); if(i<0)return;
  G.fires.splice(i,1);
  puff(f.x,f.y,'#eef3f8',14,120,8,0.7);
  puff(f.x,f.y,'#cfd8e3',10,80,10,0.9);
  A.sfx('foam'); G.hitstop=Math.max(G.hitstop,0.05*SETT().hit); shake(2,0.1);
  // PARTIAL PROGRESS: remaining fires lose momentum
  for(const f2 of G.fires){ f2.spread+=4; f2.size=Math.max(0.3,f2.size-0.15); }
  if(G.fires.length)floater(f.x,f.y-44,'spread slowed!','#bfe4ff',14);
  // SPRINT 4: the crowd cheers
  let cheered=false;
  for(const c of G.customers){
    if((c.state==='waiting'||c.state==='eat'||c.state==='sit')&&dist(c.x,c.y,f.x,f.y)<240){
      c.patience=Math.min(c.maxPat,c.patience+c.maxPat*0.08);
      c.squash=Math.max(c.squash,0.7);
      if(!cheered||Math.random()<0.5)floater(c.x,c.y-64,'🎉','#ffd93d',16);
      cheered=true;
    }
  }
  if(cheered){A.sfx('cheer'); if(Math.random()<0.4)addStory('The whole room cheered when the fire died.',2);}
  G.firesOut++; G.money+=25;
  floater(f.x,f.y-20,'CRISIS AVERTED +$25','#7cf2c0',18);
  if(f.age<6 && G.fires.length===0){
    G.morale=12;
    note('💪 Morale boost! Cooking faster','#7cf2c0');
    addStory('You killed the fire before it spread. The kitchen roared back.',2);
  } else {
    addStory('You beat back the flames.',2);
    // CAUSAL: a long fight means a lot of foam — it leaves a slick
    if(f.age>5&&G.puddles.length<3){
      const px=clamp(f.x,60,420), py=clamp(f.y+44,240,520);

      floater(px,py-14,'foam slick!','#bfe4ff',14);
      addStory('The extinguisher foam left a slick behind.',1);
    }
  }
  noteGood(f.x,f.y); markCleanAction(f.x,f.y,'fire');
  if(G.firesOut>=3){ unlockAch('fire'); earnSouv('emptyExt'); }
}

function crowdReact(x,y,kind,radius=240){
  if(G.reactCd>0)return;
  G.reactCd=1.3;
  let shown=0,sfxDone=false;
  for(const c of G.customers){
    if(shown>=5)break;
    if(!(c.state==='waiting'||c.state==='sit'||c.state==='eat'||c.state==='queue'))continue;
    if(dist(c.x,c.y,x,y)>radius)continue;

    c.squash=Math.max(c.squash,0.55);
    let em;
    if(kind==='gasp'){ em=c.type==='biz'?'tsk.':'😱'; if(!sfxDone){A.sfx('gasp');sfxDone=true;} }
    else if(kind==='clap'){ em=c.type==='biz'?'hm.':'👏'; if(!sfxDone){A.sfx('clap');sfxDone=true;} }
    else if(kind==='point'){ em=c.type==='influencer'?'📱':'👉'; if(!sfxDone){A.sfx('laugh');sfxDone=true;} }
    else { // laugh
      if(c.type==='biz')em='hmph.';
      else if(c.type==='grandma')em='👏';
      else if(c.type==='influencer')em='📱';
      else if(c.type==='tourist'){em='📷';sparkle(c.x+14,c.y-20,'#ffffff',3);}
      else if(c.type==='family')em='HA HA!';
      else em='HA!';

    }
    floater(c.x+rnd(-6,6),c.y-62,em,c.type==='biz'?'#aab4c0':'#ffd93d',c.type==='family'?15:14);
  }
}

/* ================================ SURVIVAL EVENTS ================================
   Replaces time-of-day scheduling. Random pressure events during endless survival.
   warning → short delay → chaos → auto-finish.
================================================================================== */
const SURVIVAL_EVENTS = {
  rushWave:        {id:'rushWave',        name:'Rush Wave',        warning:'Rush incoming...',              color:'#ffb347', weight:18},
  officeBreak:     {id:'officeBreak',     name:'Office Break',     warning:'Office break incoming...',      color:'#90a4bd', weight:13},
  kikiRaid:        {id:'kikiRaid',        name:'Kiki Raid',        warning:'Scratching in the walls...',    color:'#b78bff', weight:14},
  deliveryJam:     {id:'deliveryJam',     name:'Delivery Jam',     warning:'Delivery van outside...',       color:'#c98a4b', weight:12},
  fireDrill:       {id:'fireDrill',       name:'Fire Drill',       warning:'Something smells hot...',       color:'#ff8a5c', weight:12},
  machineBreakdown:{id:'machineBreakdown',name:'Machine Breakdown',warning:'A machine is rattling...',      color:'#ffab4c', weight:11},
  inspectorWalkIn: {id:'inspectorWalkIn', name:'Inspector Walk-In',warning:'Clipboard outside...',          color:'#7cd67c', weight:9},
  schoolTrip:      {id:'schoolTrip',      name:'School Trip',      warning:'Tiny footsteps incoming...',    color:'#6ec6ff', weight:11},
  vipDoubleBooking:{id:'vipDoubleBooking',name:'VIP Double Booking',warning:'VIP reservation conflict...',   color:'#ffd24d', weight:7},
  kikiChaosParade: {id:'kikiChaosParade', name:'Kiki Chaos Parade', warning:'Tiny footsteps lining up...',   color:'#b78bff', weight:6},
  powerFlicker:    {id:'powerFlicker',    name:'Power Flicker',     warning:'Lights are flickering...',      color:'#6b72a8', weight:7}
};

function survivalEventInterval(){
  const t = G.t;
  if(t < 60)  return rnd(38,52);
  if(t < 150) return rnd(30,44);
  if(t < 300) return rnd(24,36);
  return rnd(20,32);
}

function canStartSurvivalEvent(){
  if(!G || G.over) return false;
  if(G.survivalEvent) return false;
  if(G.lastStand > 0) return false;
  if(G.hearts <= 1) return false;
  if(G.panicSm > 0.82) return false;
  if(G.fires.length >= 2) return false;
  const queueN = G.customers.filter(c => c.state === 'queue').length;
  if(queueN >= QUEUE.length) return false;
  return true;
}

function survivalEventAllowed(id){
  const queueN = G.customers.filter(c => c.state === 'queue').length;
  const broken = G.stations.filter(s => s.state === 'broken').length;
  const activeRats = G.rats.filter(r => !r.ally && r.state !== 'flee' && r.state !== 'parade').length;
  if(id === 'inspectorWalkIn' && G.inspector) return false;
  if(id === 'fireDrill' && G.fires.length > 0) return false;
  if(id === 'machineBreakdown' && broken >= 2) return false;
  if(id === 'deliveryJam' && G.box) return false;
  if(id === 'kikiRaid' && activeRats >= 2) return false;
  if(id === 'officeBreak' && queueN > 2) return false;
  if(id === 'schoolTrip' && queueN > 2) return false;
  // NEW EVENTS
  if(id === 'vipDoubleBooking'){
    if(G.fires.length > 0) return false;
    if(queueN > 1) return false;
    if(broken >= 2) return false;
    if(G.viralT > 0) return false;
    if(G.box) return false;
  }
  if(id === 'kikiChaosParade'){
    if(activeRats >= 2) return false;
    if(G.fires.length >= 2) return false;
    if(G.panicSm > 0.7) return false;
  }
  if(id === 'powerFlicker'){
    if(G.blackout > 0) return false;
    if(G.fires.length >= 2) return false;
    if(G.panicSm > 0.78) return false;
  }
  return true;
}

function pickSurvivalEvent(){
  let ids = Object.keys(SURVIVAL_EVENTS);
  ids = ids.filter(id => id !== G.lastSurvivalEvent);
  ids = ids.filter(id => survivalEventAllowed(id));
  if(!ids.length) ids = Object.keys(SURVIVAL_EVENTS).filter(id => id !== G.lastSurvivalEvent && survivalEventAllowed(id));
  if(!ids.length) ids = Object.keys(SURVIVAL_EVENTS).filter(id => survivalEventAllowed(id));
  if(!ids.length) ids = Object.keys(SURVIVAL_EVENTS);
  let total = 0;
  for(const id of ids) total += SURVIVAL_EVENTS[id].weight;
  let r = Math.random() * total;
  for(const id of ids){
    r -= SURVIVAL_EVENTS[id].weight;
    if(r <= 0) return id;
  }
  return ids[0];
}

function startRandomSurvivalEvent(){
  const id = pickSurvivalEvent();
  startSurvivalEvent(id);
}

function startSurvivalEvent(id){
  const ev = SURVIVAL_EVENTS[id];
  if(!ev) return;
  G.survivalEvent = { id, t:0, phase:'warning', fired:false, spawned:0, pulses:0, dur:0, target:null };
  G.lastSurvivalEvent = id;
  G.survivalEventCount++;
  banner(ev.warning, ev.color, typeof NOTE_PRIORITY !== 'undefined' ? NOTE_PRIORITY.HIGH : undefined, 'survival-'+id+'-warning');
  addStory(ev.name + ' is coming.', 1);
}

function finishSurvivalEvent(){
  if(!G || !G.survivalEvent) return;
  G.survivalEvent = null;
  G.survivalEventCd = survivalEventInterval();
  if(G.hearts > 0){
    note('Survived the event', '#7cf2c0', typeof NOTE_PRIORITY !== 'undefined' ? NOTE_PRIORITY.LOW : undefined, 'survival-event-end');
  }
}

function updateSurvivalEvents(dt){
  if(!G || G.over) return;
  if(G.survivalEvent){
    updateCurrentSurvivalEvent(dt);
    return;
  }
  G.survivalEventCd -= dt;
  if(G.survivalEventCd <= 0){
    if(canStartSurvivalEvent()){
      startRandomSurvivalEvent();
    } else {
      G.survivalEventCd = rnd(5,10);
    }
  }
}

function updateCurrentSurvivalEvent(dt){
  const e = G.survivalEvent;
  if(!e) return;
  e.t += dt;
  if(e.phase === 'warning' && e.t >= 2.8){
    e.phase = 'active';
    e.t = 0;
    triggerSurvivalEvent(e.id);
  }
  updateActiveSurvivalEvent(dt);
}

function triggerSurvivalEvent(id){
  const e = G.survivalEvent;
  const ev = SURVIVAL_EVENTS[id];
  const shortLabels = {
    rushWave:'RUSH WAVE!', officeBreak:'OFFICE BREAK!', kikiRaid:'KIKI RAID!',
    deliveryJam:'DELIVERY JAM!', fireDrill:'FIRE DRILL!', machineBreakdown:'MACHINE BROKE!',
    inspectorWalkIn:'INSPECTOR!', schoolTrip:'SCHOOL TRIP!'
  };
  banner(shortLabels[id] || ev.name, ev.color, typeof NOTE_PRIORITY !== 'undefined' ? NOTE_PRIORITY.HIGH : undefined, 'survival-active-'+id);

  if(id === 'rushWave')         e.dur = 9;
  else if(id === 'officeBreak') e.dur = 8;
  else if(id === 'kikiRaid')    e.dur = 12;
  else if(id === 'deliveryJam') e.dur = 12;
  else if(id === 'fireDrill')   e.dur = 3.2;
  else if(id === 'machineBreakdown') e.dur = 2.7;
  else if(id === 'inspectorWalkIn')  e.dur = 0.6;
  else if(id === 'schoolTrip')  e.dur = 8;
  else if(id === 'vipDoubleBooking') e.dur = 8;
  else if(id === 'kikiChaosParade')  e.dur = 8.5;
  else if(id === 'powerFlicker')     e.dur = 5.5;

  // event-specific one-shot preparation
  if(id === 'fireDrill' || id === 'machineBreakdown'){
    const candidates = G.stations.filter(s => s.state !== 'broken' && !fireOn('station', s));
    if(candidates.length){
      e.target = (typeof maxWearStation === 'function' ? maxWearStation() : null) || pick(candidates);
      if(!candidates.includes(e.target)) e.target = pick(candidates);
      if(id === 'fireDrill') floater(e.target.x, e.target.y-70, 'smoking...', '#ff8a5c', 15);
      else floater(e.target.x, e.target.y-70, 'rattling...', '#ffab4c', 15);
      e.target.wob = 1;
    } else {
      finishSurvivalEvent();
      return;
    }
  }
  if(id === 'deliveryJam'){
    if(typeof spawnBox === 'function') spawnBox();
  }
  if(id === 'inspectorWalkIn'){
    if(typeof spawnInspector === 'function') spawnInspector();
  }
  if(id === 'vipDoubleBooking'){
    // banner + prep -- update loop spawns customers
    A.sfx('bell');
  }
  if(id === 'kikiChaosParade'){
    A.sfx('squeak');
  }
  if(id === 'powerFlicker'){
    // short controlled blackout for atmosphere; gameplay stays readable
    G.powerFlickerT = 5.5;
    G.blackout = Math.max(G.blackout || 0, 3.5);
    G.blackMax = Math.max(G.blackMax || 0, 3.5);
    A.sfx('crash');
    for(const st of G.stations) st.wob = Math.max(st.wob || 0, 0.4);
  }
}

function updateActiveSurvivalEvent(dt){
  const e = G.survivalEvent;
  if(!e || e.phase !== 'active') return;
  if(e.id === 'rushWave')            updateRushWaveEvent(dt, e);
  else if(e.id === 'officeBreak')    updateOfficeBreakEvent(dt, e);
  else if(e.id === 'kikiRaid')       updateKikiRaidEvent(dt, e);
  else if(e.id === 'deliveryJam')    updateDeliveryJamEvent(dt, e);
  else if(e.id === 'fireDrill')      updateFireDrillEvent(dt, e);
  else if(e.id === 'machineBreakdown') updateMachineBreakdownEvent(dt, e);
  else if(e.id === 'inspectorWalkIn')  updateInspectorWalkInEvent(dt, e);
  else if(e.id === 'schoolTrip')     updateSchoolTripEvent(dt, e);
  else if(e.id === 'vipDoubleBooking') updateVipDoubleBookingEvent(dt, e);
  else if(e.id === 'kikiChaosParade')  updateKikiChaosParadeEvent(dt, e);
  else if(e.id === 'powerFlicker')     updatePowerFlickerEvent(dt, e);
}

function updateRushWaveEvent(dt, e){
  e.pulseT = (e.pulseT || 0) - dt;
  if(e.pulseT <= 0 && e.spawned < 5){
    const c = spawnCustomer();
    if(c) e.spawned++;
    e.pulseT = 1.2;
  }
  if(e.spawned >= 5 || e.t >= e.dur) finishSurvivalEvent();
}

function updateOfficeBreakEvent(dt, e){
  e.pulseT = (e.pulseT || 0) - dt;
  if(e.pulseT <= 0 && e.spawned < 4){
    const c = spawnCustomer('biz');
    if(c) e.spawned++;
    e.pulseT = 1.5;
  }
  if(e.spawned >= 4 || e.t >= e.dur) finishSurvivalEvent();
}

function updateKikiRaidEvent(dt, e){
  e.pulseT = (e.pulseT || 0) - dt;
  const activeRats = G.rats.filter(r => !r.ally).length;
  if(e.pulseT <= 0 && e.spawned < 3 && activeRats < 2){
    spawnRat();
    e.spawned++;
    e.pulseT = 2.3;
  }
  if(e.spawned >= 3 && e.t >= e.dur) finishSurvivalEvent();
  else if(e.t >= e.dur) finishSurvivalEvent();
}

function updateDeliveryJamEvent(dt, e){
  if(!G.box) { finishSurvivalEvent(); return; }
  if(e.t >= e.dur) finishSurvivalEvent();
}

function updateFireDrillEvent(dt, e){
  if(!e.fired && e.target && e.t >= 3){
    if(G.stations.includes(e.target) && e.target.state !== 'broken' && !fireOn('station', e.target)){
      startFire('station', e.target);
    }
    e.fired = true;
  }
  if(e.fired) finishSurvivalEvent();
}

function updateMachineBreakdownEvent(dt, e){
  if(!e.fired && e.target && e.t >= 2.5){
    if(G.stations.includes(e.target) && e.target.state !== 'broken'){
      breakStation(e.target);
    }
    e.fired = true;
  }
  if(e.fired) finishSurvivalEvent();
}

function updateInspectorWalkInEvent(dt, e){
  if(e.t >= e.dur) finishSurvivalEvent();
}

function updateSchoolTripEvent(dt, e){
  e.pulseT = (e.pulseT || 0) - dt;
  if(e.pulseT <= 0 && e.spawned < 3){
    const c = spawnCustomer('family');
    if(c){
      e.spawned++;
      floater(DOOR.x+30, DOOR.y+60, 'field trip!', '#6ec6ff', 13);
    }
    e.pulseT = 1.6;
  }
  if(e.spawned >= 3 || e.t >= e.dur) finishSurvivalEvent();
}

/* ==== EVENT 9: VIP DOUBLE BOOKING ==== */
function updateVipDoubleBookingEvent(dt, e){
  e.pulseT = (e.pulseT || 0) - dt;
  if(e.spawned === 0){
    const vip = spawnCustomer('vip');
    if(vip){
      e.spawned++;
      floater(vip.x, vip.y-48, 'VIP!', '#ffd24d', 18);
    }
  }
  if(e.spawned === 1 && e.t >= 2.5){
    const type = pick(['biz','couple','influencer']);
    const c = spawnCustomer(type);
    if(c){
      e.spawned++;
      floater(c.x, c.y-48, 'double booked!', '#ffd24d', 13);
    }
  }
  if(e.spawned >= 2 || e.t > e.dur) finishSurvivalEvent();
}

/* ==== EVENT 10: KIKI CHAOS PARADE ==== */
function spawnParadeRat(){
  const py = rnd(455, 535);
  const fromLeft = Math.random() < 0.5;
  G.rats.push({
    x: fromLeft ? -24 : W+24, y: py,
    vx:0, vy:0, state:'parade', carry:null, t:0, flee:0,
    dir: fromLeft ? 1 : -1, act:null, actT:0,
    sneaked:false, tripped:false, waved:false, mugged:false,
    startleCd:0, spin:0, paradeDir: fromLeft ? 1 : -1
  });
}
function updateKikiChaosParadeEvent(dt, e){
  e.pulseT = (e.pulseT || 0) - dt;
  if(e.pulseT <= 0 && e.spawned < 3){
    e.pulseT = 1.2;
    spawnParadeRat();
    e.spawned++;
    floater(rnd(120,360), rnd(440,520), '🐀 parade!', '#b78bff', 13);
  }
  const activeStealers = G.rats.filter(r => !r.ally && r.state !== 'flee' && r.state !== 'parade').length;
  if(!e.firstStealer && e.t > 2 && activeStealers < 2){
    e.firstStealer = true;
    spawnRat();
  }
  if(!e.secondStealer && G.t > 180 && e.t > 5 && G.panicSm < 0.65 && activeStealers < 2){
    e.secondStealer = true;
    spawnRat();
  }
  if(!e.reactDone && e.t > 1){
    e.reactDone = true;
    crowdReact(240, 480, 'laugh', 360);
  }
  if(e.t > e.dur) finishSurvivalEvent();
}

/* ==== EVENT 11: POWER FLICKER ==== */
function updatePowerFlickerEvent(dt, e){
  if(e.t > e.dur) finishSurvivalEvent();
}




/* ============================ INPUT & DRAG ============================ */
let pointer={x:0,y:0,down:false,sx:0,sy:0,moved:0};
let drag=null; // {type, ref, food?, offx, offy}
let dragVis={x:0,y:0}; // lagged visual position for dragged items
let dragVel={x:0,y:0}; // for velocity-adaptive lerp
let tweens=[]; // spring-back animations for foods
const uiRects=[]; // rebuilt each frame by drawBtn

function evtPos(e){
  const r=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);
  return {x:(t.clientX-r.left)/viewScale, y:(t.clientY-r.top)/viewScale};
}
cv.addEventListener('pointerdown',e=>{e.preventDefault();A.init();onDown(evtPos(e));},{passive:false});
cv.addEventListener('pointermove',e=>{e.preventDefault();onMove(evtPos(e));},{passive:false});
cv.addEventListener('pointerup',e=>{e.preventDefault();onUp(evtPos(e));},{passive:false});
cv.addEventListener('pointercancel',e=>{onUp(evtPos(e));},{passive:false});

function onDown(p){
  pointer.down=true; pointer.x=p.x;pointer.y=p.y; pointer.sx=p.x;pointer.sy=p.y; pointer.moved=0;
  if(G&&screen==='game')G.lastInputT=G.t;
  if(screen!=='game'||paused||!G||G.over) return;
  p=s2w(p);
  drag=pickDraggable(p.x,p.y);
  if(drag){ A.sfx('pick'); hap(4); dragVis.x=p.x; dragVis.y=p.y-32; puff(p.x,p.y,'rgba(255,255,255,0.7)',4,110,2.5,0.22); }
}
function onMove(p){
  pointer.moved+=dist(pointer.x,pointer.y,p.x,p.y);
  pointer.x=p.x;pointer.y=p.y;
  if(drag){
    const wp=s2w(p);
    if(drag.type==='tool'){drag.ref.x=wp.x;drag.ref.y=wp.y;}
    else if(drag.type==='bin'){drag.ref.dx=wp.x;drag.ref.dy=wp.y;}
    else if(drag.type==='box'){drag.ref.x=wp.x;drag.ref.y=wp.y;}
    else if(drag.type==='treat'){drag.ref.x=wp.x;drag.ref.y=wp.y;}
  }
}
function onUp(p){
  pointer.down=false;
  const isTap=pointer.moved<15; // slightly more forgiving so quick taps don't misregister as drags
  if(drag){ const wp=s2w(p); resolveDrop(drag,wp.x,wp.y); drag=null; return; }
  // UI buttons (all screens)
  if(isTap){
    for(let i=uiRects.length-1;i>=0;i--){
      const b=uiRects[i];
      if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ A.sfx('click'); hap(6); b.cb(); return; }
    }
    if(screen==='game'&&!paused&&G&&!G.over){ const wp=s2w(p); gameTap(wp.x,wp.y); }
  }
}
function gameTap(x,y){
  // quack
  if(G.duck&&dist(x,y,G.duck.x,G.duck.y)<44){
    A.sfx('quack'); G.duck.vx=Math.min(90,G.duck.vx+22);
    floater(G.duck.x,G.duck.y-26,'QUACK!','#ffd93d',16);
    return;
  }
  // tap rat to scare it
  for(const r of G.rats){
    if(dist(x,y,r.x,r.y)<46){ scareRat(r); return; }
  }
  // tap station to cook -- pick the CLOSEST station within a generous 74px radius
  // this eliminates the fryer-drinks fumble (they were 152px apart with 62px hit zones = 28px gap)
  if(y>592 && y<708){
    let closest=null, closestD=1e9;
    for(const s of G.stations){
      const d=Math.abs(x-s.x);
      if(d<74 && d<closestD){ closestD=d; closest=s; }
    }
    if(closest){ tapStation(closest); return; }
  }
}
function tapStation(s){
  if(s.state==='broken'){ floater(s.x,622,'BROKEN!','#ffab4c',18); A.sfx('buzz'); return; }
  if(fireOn('station',s)){ floater(s.x,622,'ON FIRE!','#ff5a3c',18); A.sfx('buzz'); return; }
  if(s.state==='cook' && s.prog<0.15){ // early-cancel window (~1s) -- undo an accidental start, no penalty
    s.state='idle'; s.prog=0;
    A.sfx('click'); floater(s.x,596,'cancelled','rgba(255,255,255,0.7)',13);
    puff(s.x,586,'rgba(255,255,255,0.5)',3,50,3,0.3);
    return;
  }
  if(s.state==='idle'){
    s.state='cook'; s.prog=0; A.sfx(s.id==='drinks'?'pour':'sizzle');
    if(Math.random()<0.8)sparkle(s.x,584,'#ffd93d',2);
    if(s.id==='drinks'){ puff(s.x,586,'rgba(190,230,255,0.8)',6,80,4,0.5); sparkle(s.x,580,'#e0f7ff',3); }
    else smokePuff(s.x,586,2);
    if(!S.data.tut.cook){S.data.tut.cook=true;S.save();}
  }
}
function pickDraggable(x,y){
  // priority: ready food > plates > tools > box > bin
  for(const s of G.stations){
    if(s.ready && dist(x,y,s.x,580)<46) return {type:'food',ref:s,food:s.ready};
  }
  for(const t of G.tables){
    if(t.plates>0 && dist(x,y,t.x,t.y-6)<44) return {type:'plates',ref:t};
  }
  for(const tl of G.tools){
    if(dist(x,y,tl.x,tl.y)<44){ tl.drag=true; return {type:'tool',ref:tl}; }
  }
  if(G.box && dist(x,y,G.box.x,G.box.y)<44){ G.box.drag=true; return {type:'box',ref:G.box}; }
  if(G.treat && dist(x,y,G.treat.x,G.treat.y)<40){ G.treat.drag=true; return {type:'treat',ref:G.treat}; }
  if(G.bin.emptying<=0 && dist(x,y,G.bin.x,G.bin.y)<44 && G.bin.fill>0){
    G.bin.drag=true; G.bin.dx=x; G.bin.dy=y; return {type:'bin',ref:G.bin};
  }
  return null;
}
function resolveDrop(d,x,y){
  if(d.type==='food'){
    const s=d.ref, kind=d.food;
    // KIKI STEAL FIX: a dragged food item is only valid while it still exists on its source station.
    // If Kiki steals it after the player has picked it up, the source station is cleared,
    // so the player can no longer deliver a duplicate copy to the customer.
    if(!s || s.ready!==kind){
      A.sfx('squeak');
      floater(x,y-28,'Kiki got it!','#ff8a8a',16);
      return;
    }
    if(dist(x,y,G.bin.x,G.bin.y)<58){ depositTrash(s,kind!=='burnt'&&kind!=='melted'); return; }
    if(kind==='burnt'||kind==='melted'){ A.sfx('buzz'); return; } // stays on station -- must be binned
    /* KIKI'S FAVOR: sacrifice the dish to the rat instead */
    if(kind!=='burnt'&&kind!=='melted')for(const r of G.rats){
      if(!r.ally&&r.state!=='flee'&&r.state!=='ride'&&r.state!=='parade'&&dist(x,y,r.x,r.y)<55){
        s.ready=null; if(s.state!=='broken') s.state='idle';
        r.ally=true; r.state='ally'; r.carry=null; r.act='wiggle'; r.actT=0.7; r.alT=rnd(6,10); r.chore=null;
        heartPop(r.x,r.y-18,5); A.sfx('squee'); A.sfx('ding');
        note('🐀❤ Kiki joined the team!','#b78bff');
        addStory('You fed Kiki your '+kind+' mid-rush. She works here now.',4);
        kikiMoment('You fed Kiki a '+kind+' and she switched teams.',5,r.x,r.y-24,'KIKI HIRED!');
        crowdReact(r.x,r.y,'laugh',240);
        return;
      }
    }
    for(const c of G.customers){
      if((c.state==='waiting') && (dist(x,y,c.x,c.y)<68 || (c.table&&dist(x,y,c.table.x,c.table.y)<68))){
        if(c.orders.includes(kind)){ s.ready=null; if(s.state!=='broken') s.state='idle'; c.orderT_last=c.orderT; serveFood(c,kind); return; }
        else { floater(c.x,c.y-58,'Not my order!','#ff8a8a',16); A.sfx('buzz'); return; }
      }
    }
    // dropped in empty space — clearer feedback at the drop point so player sees it happened
    A.sfx('pop');
    puff(x,y,'rgba(255,255,255,0.7)',4,60,3,0.35); // at drop location
    floater(x,y-20,'too far','rgba(255,255,255,0.6)',12); // gentle "why nothing happened" cue
    // and a soft "return" trail from drop point back to station
    for(let i=0;i<3;i++){
      const k=i/2;
      sparkle(x+(s.x-x)*k, y+(580-y)*k, 'rgba(255,220,120,0.6)', 1);
    }
  }
  else if(d.type==='plates'){
    if(dist(x,y,G.bin.x,G.bin.y)<58){
      if(G.bin.emptying>0){ floater(G.bin.x,G.bin.y-50,'Busy!','#fff',16); A.sfx('buzz'); return; }
      if(G.bin.fill>=G.bin.cap){ floater(G.bin.x,G.bin.y-50,'BIN FULL!','#ff8a8a',16); A.sfx('buzz'); return; }
      d.ref.plates=0; d.ref.plateT=0; d.ref.warned=false; G.bin.fill++; A.sfx('thud');
      puff(G.bin.x,G.bin.y-24,'#9aa7b5',5,60,4,0.4);
      // TABLE CLEAR DELIGHT: a satisfying green flash on the table + coin burst + bigger sparkle
      d.ref.sparkT=1.0; sparkle(d.ref.x,d.ref.y-8,'#bff0ff',9);
      d.ref.clearFlash=0.6; // fresh table glow that fades over 0.6s
      coinBurst(d.ref.x,d.ref.y-12,3);
      hap(10); // tactile confirmation matching the serve
      A.sfx('ding');
      G.money+=3; floater(d.ref.x,d.ref.y-24,'+$3','#7cf2c0',13);
      noteGood(G.bin.x,G.bin.y); relief(d.ref.x,d.ref.y); markCleanAction(d.ref.x,d.ref.y,'plates');
      if(!S.data.tut.plates){S.data.tut.plates=true;S.save();}
      return;
    }
    A.sfx('buzz');
  }
  else if(d.type==='tool'){
    const tl=d.ref; tl.drag=false;
    let used=false;
    if(tl.kind==='mop'){
      for(const pd of G.puddles){ if(dist(x,y,pd.x,pd.y)<50){
        G.puddles.splice(G.puddles.indexOf(pd),1);
        sparkle(pd.x,pd.y,'#bff0ff',8); A.sfx('splash');
        const mp=MOD().id==='rainy'?20:10;
        G.money+=mp; floater(pd.x,pd.y-16,'+$'+mp,'#7cf2c0',16); noteGood(pd.x,pd.y); relief(pd.x,pd.y); markCleanAction(pd.x,pd.y,'puddle'); used=true; break; } }
      if(!used) for(const m of G.messes){ if(dist(x,y,m.x,m.y)<46){
        G.messes.splice(G.messes.indexOf(m),1);
        sparkle(m.x,m.y,'#ffe0b2',7); A.sfx('splash');
        const mopBonus=8+evtMod('cleanBonus',0);
        G.money+=mopBonus; floater(m.x,m.y-14,'+$'+mopBonus,'#7cf2c0',15); noteGood(m.x,m.y); relief(m.x,m.y); markCleanAction(m.x,m.y,'mess'); used=true; break; } }
      if(!used) for(const r of G.rats){ if(dist(x,y,r.x,r.y)<50){ scareRat(r); used=true; break; } }
    }
    else if(tl.kind==='ext'){
      for(const f of G.fires){ if(dist(x,y,f.x,f.y)<68){ extinguishFire(f); used=true; break; } }
    }
    else if(tl.kind==='wrench'){
      for(const s of G.stations){ if(s.state==='broken' && Math.abs(x-s.x)<60 && y>556 && y<680){
        s.state='fixing'; s.fixT=0.9; used=true;

        for(const c of G.customers){
          if(c.state==='waiting'&&c.orders.some(f=>FOODS[f].station===s.id)){
            c.patience=Math.min(c.maxPat,c.patience+c.maxPat*0.12);
            floater(c.x,c.y-58,'help is coming!','#7cf2c0',13);
          }
        }
        break; } }
    }
    if(!used) A.sfx('buzz');
    // spring back home
    tl.retT=0; tl.rx=tl.x; tl.ry=tl.y;
  }
  else if(d.type==='box'){
    const b=d.ref; b.drag=false;
    if(x>PANTRY.x-10&&x<PANTRY.x+PANTRY.w+10&&y>PANTRY.y-10&&y<PANTRY.y+PANTRY.h+10){
      G.box=null; G.boostT=25; G.money+=30;
      sparkle(PANTRY.x+PANTRY.w/2,PANTRY.y+30,'#ffd93d',10);
      floater(PANTRY.x+PANTRY.w/2,PANTRY.y,'FRESH STOCK! +$30','#7cf2c0',17);
      note('📦 Fresh stock — cooking 25% faster!','#ffd93d');
      A.sfx('fix');
      addStory('Restocked mid-chaos like a pro.',1);
    } else { A.sfx('buzz'); b.x=DOOR.x+6;b.y=DOOR.y+64; }
  }
  else if(d.type==='treat'){
    const tr=d.ref; tr.drag=false;
    const tgt=tr.target;
    if(tgt&&G.customers.includes(tgt)&&dist(x,y,tgt.x,tgt.y)<60){

      recordMoment('A surprise dessert saved the moment.',2);
    } else { A.sfx('buzz'); tr.x=PANTRY.x+PANTRY.w/2; tr.y=PANTRY.y-10; }
  }
  else if(d.type==='bin'){
    const b=d.ref; b.drag=false;
    if(b.fill>0){
      b.emptying=1.4; A.sfx('thud');
      floater(b.x,b.y-56,'Taking out trash...','#fff',15);
    }
  }
}
function depositTrash(station,fresh){
  if(G.bin.fill>=G.bin.cap){ floater(G.bin.x,G.bin.y-50,'BIN FULL!','#ff8a8a',16); A.sfx('buzz'); return; }
